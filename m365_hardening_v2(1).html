 "default": "1 — Standard", "license": "EOP", "applies": "All users", "notes": "Controls sensitivity of ML phishing detection. Level 4 catches more phishing but may increase false positives. Monitor and adjust. Levels: 1=Standard, 2=Aggressive, 3=More aggressive, 4=Most aggressive."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable spoof intelligence", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Leave enabled. Spoof intelligence identifies and allows legitimate senders who spoof your domain (e.g. approved third parties) while blocking illegitimate ones."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Honor DMARC record policy when message is detected as spoof", "recommended": "On / Quarantine or Reject", "default": "Off", "license": "EOP", "applies": "All users", "notes": "Critical setting. Forces Exchange to respect the sending domain's DMARC p= policy. If sender's DMARC is p=reject, message is rejected. If p=quarantine, it is quarantined. Leave off only if causing legitimate mail loss."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "If message is detected as spoof by spoof intelligence — Action", "recommended": "Quarantine the message", "default": "Move to Junk", "license": "EOP", "applies": "All users", "notes": "Tighten from default Junk to Quarantine. Spoofed messages are high-confidence threats and should not reach the inbox."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable first contact safety tip", "recommended": "On", "default": "Off", "license": "EOP", "applies": "All users", "notes": "Shows a safety tip in Outlook when a user receives email from a sender they haven't corresponded with before. Low-cost, high-awareness control."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Show (?) for unauthenticated senders for spoof", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Displays a question mark on sender avatar in Outlook when SPF/DKIM don't pass. Leave enabled — visible trust indicator for users."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Show 'via' tag for unauthenticated senders", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Shows 'via' tag when display name differs from authenticated domain. Helps users spot display name spoofing."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable user impersonation protection", "recommended": "On — configure protected users list", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Add executives, finance staff, IT admins, board members. Anyone likely to be impersonated in BEC attacks. Maintain per tenant."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "If message is detected as user impersonation — Action", "recommended": "Quarantine the message", "default": "Don't apply any action", "license": "MDO Plan 1", "applies": "All users", "notes": "Default is no action — change to Quarantine for protected users. BEC impersonation of protected users is high-confidence malicious."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable domain impersonation protection", "recommended": "On — add owned + key partner domains", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Add your org's domains plus any key partner/vendor domains frequently spoofed in targeted attacks. Catches typosquatting and lookalike domains."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "If message is detected as domain impersonation — Action", "recommended": "Quarantine the message", "default": "Don't apply any action", "license": "MDO Plan 1", "applies": "All users", "notes": "Same as user impersonation — tighten to Quarantine."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable mailbox intelligence", "recommended": "On", "default": "On", "license": "MDO Plan 1", "applies": "All users", "notes": "Uses ML to build a communication graph per user. Reduces false positives on impersonation by understanding who users normally correspond with."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable mailbox intelligence impersonation protection", "recommended": "On", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Acts on mailbox intelligence findings. Must be on to get value from mailbox intelligence."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "If message is detected as mailbox intelligence impersonation — Action", "recommended": "Move to Junk OR Quarantine", "default": "Don't apply any action", "license": "MDO Plan 1", "applies": "All users", "notes": "Start with Move to Junk — mailbox intelligence can have false positives. Promote to Quarantine after tuning."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Enable impersonation safety tips", "recommended": "On (all three tips)", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Enable all three: user impersonation tip, domain impersonation tip, unusual characters tip. Reinforces user awareness at point of delivery."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Trusted senders and domains (impersonation exclusions)", "recommended": "Configure per tenant — approved senders who legitimately spoof", "default": "Empty", "license": "MDO Plan 1", "applies": "All users", "notes": "Add third-party senders that legitimately send as your domain or impersonate protected users. Review quarterly. Keep list minimal."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Policy name", "recommended": "Hardened Anti-Spam Policy", "default": "Default", "license": "EOP", "applies": "All users / all domains", "notes": "Apply to all accepted domains. Microsoft's default policy is permissive — this tightens it."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Spam detection action", "recommended": "Move to Junk", "default": "Move to Junk", "license": "EOP", "applies": "All users", "notes": "Default is acceptable but consider Quarantine for high-confidence spam environments. Monitor false positive rate."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "High confidence spam action", "recommended": "Quarantine the message", "default": "Move to Junk", "license": "EOP", "applies": "All users", "notes": "Tighten from Junk to Quarantine. High-confidence spam is very unlikely to be legitimate mail."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Phishing action", "recommended": "Quarantine the message", "default": "Quarantine the message", "license": "EOP", "applies": "All users", "notes": "Default is Quarantine — confirm this is set and not overridden."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "High confidence phishing action", "recommended": "Quarantine the message — restrict user from releasing", "default": "Quarantine the message", "license": "EOP", "applies": "All users", "notes": "Apply the most restrictive quarantine policy — user cannot self-release. Admin review required."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Bulk email action", "recommended": "Move to Junk", "default": "Move to Junk", "license": "EOP", "applies": "All users", "notes": "Acceptable at default. Consider Quarantine if org receives heavy targeted bulk campaigns."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Bulk email threshold (BCL)", "recommended": "5", "default": "7", "license": "EOP", "applies": "All users", "notes": "Lower = more aggressive bulk filtering. 5 catches more bulk mail. Default of 7 is too permissive post-breach. Tune down to 5 or 6."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Spam safety tips", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Confirm enabled. Displays safety tip on messages that land in junk."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Zero-hour auto purge (ZAP) for spam", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Critical. ZAP retroactively moves messages to Junk/Quarantine if they are determined to be spam after delivery. Never disable."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Zero-hour auto purge (ZAP) for phishing", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Same as spam ZAP — retroactively quarantines phishing messages detected post-delivery. Never disable."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Zero-hour auto purge (ZAP) for malware", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Retroactively quarantines messages found to contain malware after delivery. Never disable."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Quarantine retention period", "recommended": "30 days", "default": "30 days", "license": "EOP", "applies": "All users", "notes": "Keep at 30 days. Shortening this reduces the window to investigate and recover quarantined legitimate mail."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Quarantine policy for high confidence phishing", "recommended": "AdminOnlyAccessPolicy (most restrictive)", "default": "DefaultFullAccessPolicy", "license": "EOP", "applies": "All users", "notes": "Users should NOT be able to self-release high-confidence phishing. Admin must review and release. Change quarantine policy to AdminOnlyAccessPolicy."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Allow list — senders", "recommended": "Empty / minimal", "default": "Empty", "license": "EOP", "applies": "All users", "notes": "Avoid populating. Allow-listed senders bypass spam filtering entirely. Use mail flow rule exceptions or safe sender lists only when absolutely necessary and document each entry."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Allow list — domains", "recommended": "Empty", "default": "Empty", "license": "EOP", "applies": "All users", "notes": "Never add your own domain. Never add large provider domains (gmail.com, outlook.com). This is a common misconfiguration that creates a wide-open bypass."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Block list — senders", "recommended": "Populate with known threat actor sender addresses from IR", "default": "Empty", "license": "EOP", "applies": "All users", "notes": "Post-breach: add known attacker sending addresses here. Maintain and prune as threat actor infrastructure changes."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "Block list — domains", "recommended": "Populate with known threat actor domains from IR", "default": "Empty", "license": "EOP", "applies": "All users", "notes": "Post-breach: add threat actor domains identified during incident. Cross-reference with MFR block rules to avoid duplication."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "International spam — filter email from specific countries", "recommended": "Enable for high-risk countries not relevant to business", "default": "Off", "license": "EOP", "applies": "All users", "notes": "Optional. If org has no business in specific high-risk countries, filter email originating from those countries. Coordinate with geo-IP CA policy."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "International spam — filter email in specific languages", "recommended": "Enable for languages org does not operate in", "default": "Off", "license": "EOP", "applies": "All users", "notes": "Optional. Filter languages not used in org communications. Low false positive rate if org is English-only."}, {"section": "ANTI-SPAM POLICY", "policy": "Hardened Anti-Spam Policy", "type": "Anti-Spam", "setting": "End-user spam notification", "recommended": "Enable — every 3 days", "default": "Disabled", "license": "EOP", "applies": "All users", "notes": "Notifies users of quarantined messages so legitimate mail is not permanently lost. Set to every 3 days. Ensure quarantine policy allows users to view (not necessarily release) their quarantine."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Policy name", "recommended": "Hardened Anti-Malware Policy", "default": "Default", "license": "EOP", "applies": "All users / all domains", "notes": "Apply to all accepted domains."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Enable the common attachments filter", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Blocks known malicious file types regardless of content scanning. Confirm enabled — this is your first line of defense."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Common attachment filter — file types", "recommended": "Default list + additions: .exe, .bat, .cmd, .vbs, .js, .jse, .ps1, .psm1, .reg, .scr, .pif, .iso, .img, .vhd, .vhdx, .lnk, .hta, .jar, .wsf, .wsh, .msi, .msp, .com, .pif, .application, .gadget, .xlsm, .docm, .pptm, .xlsb", "default": "Default list (subset of above)", "license": "EOP", "applies": "All users", "notes": "Expand the default list to include all types blocked in MFR rules. Ensure consistency between MFR-03 and this policy. Anti-malware fires on all mail; MFR is an additional layer."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Common attachment filter action", "recommended": "Reject the message with NDR", "default": "Quarantine the message", "license": "EOP", "applies": "All users", "notes": "Tighten from Quarantine to Reject with NDR. Common attachment file types have no legitimate inbound business use in most orgs. Sender receives notification their message was blocked."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Zero-hour auto purge (ZAP) for malware", "recommended": "On", "default": "On", "license": "EOP", "applies": "All users", "notes": "Never disable. Retroactively quarantines messages found to contain malware after delivery — critical for catching threats that evade initial scanning."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Quarantine policy for malware", "recommended": "AdminOnlyAccessPolicy", "default": "AdminOnlyAccessPolicy", "license": "EOP", "applies": "All users", "notes": "Confirm set to AdminOnlyAccessPolicy. Users must never be able to self-release malware-quarantined messages."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Admin notifications — notify admin on undelivered messages from internal senders", "recommended": "On — configure admin email address", "default": "Off", "license": "EOP", "applies": "All admins", "notes": "Alert security/IT when an internal user sends a message that contains malware. Potential indicator of compromised endpoint or account."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Admin notifications — notify admin on undelivered messages from external senders", "recommended": "On — configure admin email address", "default": "Off", "license": "EOP", "applies": "All admins", "notes": "Alert on inbound malware detections at volume. Useful for identifying targeted campaigns."}, {"section": "ANTI-MALWARE POLICY", "policy": "Hardened Anti-Malware Policy", "type": "Anti-Malware", "setting": "Customize notification — internal sender notification text", "recommended": "Include IR contact info and ticket instructions", "default": "Default Microsoft text", "license": "EOP", "applies": "Internal senders", "notes": "Customize so internal users know exactly who to contact if their message is blocked. Reduces helpdesk confusion."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Policy name", "recommended": "Hardened Safe Links Policy", "default": "Default", "license": "MDO Plan 1", "applies": "All users / all domains", "notes": "Safe Links is not included in EOP — requires MDO Plan 1 minimum. If tenant is EOP-only, document as gap."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Action on potentially malicious URLs in email", "recommended": "On — rewrite and check URLs", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Core Safe Links function. Rewrites URLs at delivery and checks them at click-time. Must be enabled."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Action on potentially malicious URLs in Teams", "recommended": "On", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Extends Safe Links protection to URLs shared in Teams messages and channels. Enable if org uses Teams."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Apply real-time URL scanning for suspicious links and links that point to files", "recommended": "On", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Detonates suspicious URLs in a sandbox before allowing user to proceed. Higher latency but significantly better detection. Enable."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Wait for URL scanning to complete before delivering the message", "recommended": "On", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Holds message delivery until URL detonation completes. Prevents race condition where user clicks URL before detonation finishes. Enable — latency is acceptable tradeoff."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Apply Safe Links to email messages sent within the organization", "recommended": "On", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Applies Safe Links to internal mail. Catches lateral phishing from compromised internal accounts. Critical post-breach."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Do not track user clicks", "recommended": "Off (track clicks)", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Leave tracking ON (setting Off = tracking enabled — double negative in UI). Click tracking is essential for IR — you need to know who clicked what and when."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Do not let users click through to original URL", "recommended": "On (block click-through)", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Prevents users from bypassing Safe Links warning pages. Critical — without this, users can click 'Proceed anyway' on malicious URLs."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Display the organization branding on notification pages", "recommended": "On — configure org branding", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Optional but recommended — branded warning pages look less suspicious to users and increase trust that the block is legitimate."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Do not rewrite the following URLs (exclusion list)", "recommended": "Minimal — only verified business-critical URLs", "default": "Empty", "license": "MDO Plan 1", "applies": "All users", "notes": "Keep exclusion list as short as possible. Every excluded URL bypasses Safe Links entirely. Document each entry with business justification and review quarterly."}, {"section": "SAFE LINKS POLICY", "policy": "Hardened Safe Links Policy", "type": "Safe Links", "setting": "Safe Links policy priority", "recommended": "Higher than default policy", "default": "Default", "license": "MDO Plan 1", "applies": "All users", "notes": "Ensure this hardened policy takes precedence over any existing default or legacy Safe Links policies."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Policy name", "recommended": "Hardened Safe Attachments Policy", "default": "Default", "license": "MDO Plan 1", "applies": "All users / all domains", "notes": "Safe Attachments requires MDO Plan 1 minimum. Document as gap if EOP-only tenant."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Safe Attachments unknown malware response", "recommended": "Block", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Sets the action when Safe Attachments detects malware. Block prevents delivery entirely. Do not use Monitor (delivers message while scanning) in a hardened posture."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Quarantine policy for blocked messages", "recommended": "AdminOnlyAccessPolicy", "default": "AdminOnlyAccessPolicy", "license": "MDO Plan 1", "applies": "All users", "notes": "Confirm users cannot self-release Safe Attachments quarantined messages. Admin review required."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Redirect attachment on detection — enable redirect", "recommended": "On — redirect to security/SOC mailbox", "default": "Off", "license": "MDO Plan 1", "applies": "Security team", "notes": "Sends a copy of the blocked attachment to a designated security mailbox for analysis. Essential for IR — gives you the sample without risk of execution."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Redirect attachment on detection — redirect address", "recommended": "SOC or security team mailbox address", "default": "Empty", "license": "MDO Plan 1", "applies": "Security team", "notes": "Configure a dedicated mailbox (e.g. security-samples@contoso.com). Do not use a personal mailbox. Ensure mailbox is monitored."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Apply Safe Attachments detection response if scanning cannot complete (timeout or error)", "recommended": "Block", "default": "Block", "license": "MDO Plan 1", "applies": "All users", "notes": "Fail closed — if scanning times out or errors, block the message. Never set to Pass (deliver without scanning) in a hardened posture."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Safe Attachments for SharePoint, OneDrive, and Teams", "recommended": "On (tenant-wide setting)", "default": "Off", "license": "MDO Plan 1", "applies": "All users", "notes": "Enables async scanning of files uploaded to SharePoint/OneDrive/Teams. Blocks malicious files from being downloaded even if not delivered via email. Enable at tenant level in addition to per-policy."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Safe Documents (Office clients)", "recommended": "On", "default": "Off", "license": "MDO Plan 2", "applies": "Licensed E5 users", "notes": "Checks documents opened in Protected View in Office clients against Microsoft Defender for Endpoint. Requires MDO Plan 2 + MDE. Document as gap if not licensed."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Allow people to click through Protected View even if Safe Documents identified the file as malicious", "recommended": "Off (block click-through)", "default": "Off", "license": "MDO Plan 2", "applies": "All users", "notes": "Never allow users to bypass Safe Documents warnings. Keep off."}, {"section": "SAFE ATTACHMENTS POLICY", "policy": "Hardened Safe Attachments Policy", "type": "Safe Attachments", "setting": "Safe Attachments policy priority", "recommended": "Higher than default policy", "default": "Default", "license": "MDO Plan 1", "applies": "All users", "notes": "Ensure hardened policy applies before any default or legacy Safe Attachments policies."}], "defender_config": [{"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Create hardened policy", "portal": "Threat Policies → Anti-phishing → + Create", "steps": "Click '+ Create' to create a new policy. Name it 'Hardened Anti-Phish Policy'. Apply to all accepted domains. Set priority to 1 (above the default Office365 AntiPhish Default policy).", "powershell": "New-AntiPhishPolicy -Name 'Hardened Anti-Phish Policy'\nNew-AntiPhishRule -Name 'Hardened Anti-Phish Rule' -AntiPhishPolicy 'Hardened Anti-Phish Policy' -RecipientDomainIs contoso.com -Priority 0", "gotchas": "The default 'Office365 AntiPhish Default' policy cannot be deleted. Your custom policy must have a lower priority number (higher priority) to take effect. Confirm priority order after creation."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Phishing email threshold", "portal": "Threat Policies → Anti-phishing → Edit policy → Phishing threshold & protection", "steps": "Under 'Phishing email threshold' drag slider to 4 (Most aggressive). This controls ML sensitivity — level 4 may increase false positives initially. Monitor quarantine closely for first 2 weeks.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -PhishThresholdLevel 4", "gotchas": "Level 4 is the most aggressive setting. If false positive rate is too high, drop to level 3. Never go below 2 in a hardened posture."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Honor DMARC policy", "portal": "Threat Policies → Anti-phishing → Edit policy → Phishing threshold & protection", "steps": "Enable 'Honor DMARC record policy when message is detected as spoof'. Set 'If DMARC policy is quarantine' → Quarantine. Set 'If DMARC policy is reject' → Reject.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -HonorDmarcPolicy $true -DmarcQuarantineAction Quarantine -DmarcRejectAction Reject", "gotchas": "If this setting is not visible in the portal, the tenant may need a few days to provision. Use PowerShell as a fallback. Requires tenant DMARC records to be configured — assess DNS before enabling."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Spoof action", "portal": "Threat Policies → Anti-phishing → Edit policy → Actions", "steps": "Under 'If message is detected as spoof by spoof intelligence' change action from 'Move message to Junk' to 'Quarantine the message'. Assign quarantine policy to DefaultFullAccessWithNotificationPolicy.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -AuthenticationFailAction Quarantine", "gotchas": "Default is Move to Junk — this is too permissive. Quarantine ensures spoofed messages are not accessible without admin review."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "User impersonation protection", "portal": "Threat Policies → Anti-phishing → Edit policy → Impersonation tab", "steps": "Toggle on 'Enable users to protect'. Click '+ Add users'. Add executives, finance team, IT admins, HR leads, board members. Set action to 'Quarantine the message'.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -EnableTargetedUserProtection $true -TargetedUserProtectionAction Quarantine -TargetedUsersToProtect @('John Smith;john.smith@contoso.com','Jane CEO;jane@contoso.com')", "gotchas": "The impersonation tab is a separate page within the policy editor — easy to miss. User list must be maintained manually per tenant. Format for PowerShell: 'DisplayName;email@domain.com'."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Domain impersonation protection", "portal": "Threat Policies → Anti-phishing → Edit policy → Impersonation tab", "steps": "Toggle on 'Enable domains to protect'. Check 'Include domains I own'. Optionally add custom domains (key partner/vendor domains). Set action to 'Quarantine the message'.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -EnableTargetedDomainsProtection $true -EnableOrganizationDomainsProtection $true -TargetedDomainProtectionAction Quarantine", "gotchas": "EnableOrganizationDomainsProtection covers your own domains automatically. Add partner domains in TargetedDomainsToProtect array. Typosquatted domains of key partners are a common BEC vector."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Mailbox intelligence", "portal": "Threat Policies → Anti-phishing → Edit policy → Impersonation tab", "steps": "Enable 'Enable mailbox intelligence'. Enable 'Enable mailbox intelligence for impersonation protection'. Set action to 'Move to Junk' initially — promote to Quarantine after tuning.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -EnableMailboxIntelligence $true -EnableMailboxIntelligenceProtection $true -MailboxIntelligenceProtectionAction MoveToJmf", "gotchas": "MailboxIntelligenceProtectionAction values: NoAction, MoveToJmf, Redirect, Quarantine, Delete, BccMessage. Start with MoveToJmf (Junk). Action: Quarantine = -MailboxIntelligenceProtectionAction Quarantine."}, {"section": "ANTI-PHISHING — Configuration Steps", "type": "Anti-Phish", "area": "Safety tips", "portal": "Threat Policies → Anti-phishing → Edit policy → Impersonation tab", "steps": "Enable all three safety tips: 'Show user impersonation safety tip', 'Show domain impersonation safety tip', 'Show user impersonation unusual characters safety tip'. Also enable 'Show first contact safety tip' on the Actions tab.", "powershell": "Set-AntiPhishPolicy -Identity 'Hardened Anti-Phish Policy' -EnableFirstContactSafetyTips $true -EnableSimilarUsersSafetyTips $true -EnableSimilarDomainsSafetyTips $true -EnableUnusualCharactersSafetyTips $true", "gotchas": "Safety tips are low-impact and high-value. All should be on. The first contact safety tip is on the Actions tab, not the Impersonation tab — do not miss it."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "Create hardened inbound policy", "portal": "Threat Policies → Anti-spam → + Create policy → Inbound", "steps": "Click '+ Create policy' and select 'Inbound'. Name it 'Hardened Anti-Spam Policy'. Apply to all accepted domains. Set priority above the default policy.", "powershell": "New-HostedContentFilterPolicy -Name 'Hardened Anti-Spam Policy'\nNew-HostedContentFilterRule -Name 'Hardened Anti-Spam Rule' -HostedContentFilterPolicy 'Hardened Anti-Spam Policy' -RecipientDomainIs contoso.com -Priority 0", "gotchas": "There are two built-in inbound policies (Default and Connection filter). Your custom policy must be higher priority than both. The Connection filter policy controls IP allow/block lists at the connection layer — configure separately."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "Bulk threshold & verdict actions", "portal": "Threat Policies → Anti-spam → Edit policy → Bulk email threshold & spam properties", "steps": "Set bulk email threshold to 5 (down from default 7). Set High confidence spam action → Quarantine. Set Phishing action → Quarantine. Set High confidence phishing action → Quarantine.", "powershell": "Set-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -BulkThreshold 5 -HighConfidenceSpamAction Quarantine -PhishSpamAction Quarantine -HighConfidencePhishAction Quarantine -SpamAction MoveToJmf", "gotchas": "SpamAction MoveToJmf = Move to Junk folder. BulkThreshold of 5 may flag some newsletters — monitor and adjust to 6 if false positive rate is too high. Never go above 7."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "Quarantine policies per verdict", "portal": "Threat Policies → Anti-spam → Edit policy → Actions section", "steps": "For each verdict, click 'Select quarantine policy'. Assign: High confidence phishing → AdminOnlyAccessPolicy. Phishing → AdminOnlyAccessPolicy. High confidence spam → DefaultFullAccessWithNotificationPolicy. Spam → DefaultFullAccessWithNotificationPolicy.", "powershell": "Set-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -HighConfidencePhishQuarantineTag AdminOnlyAccessPolicy -PhishQuarantineTag AdminOnlyAccessPolicy -HighConfidenceSpamQuarantineTag DefaultFullAccessWithNotificationPolicy -SpamQuarantineTag DefaultFullAccessWithNotificationPolicy", "gotchas": "Quarantine policy assignment is per-verdict — easy to miss that each verdict has its own dropdown. DefaultFullAccessWithNotificationPolicy sends end-user quarantine digest notifications. AdminOnlyAccessPolicy suppresses user notifications entirely."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "ZAP (Zero-Hour Auto Purge)", "portal": "Threat Policies → Anti-spam → Edit policy → Zero-hour auto purge (ZAP) section", "steps": "Confirm all three ZAP toggles are On: 'Enable ZAP for spam messages', 'Enable ZAP for phishing messages'. Malware ZAP is in the Anti-Malware global settings.", "powershell": "Set-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -SpamZapEnabled $true -PhishZapEnabled $true", "gotchas": "ZAP retroactively acts on messages already delivered to mailboxes. It is one of the most important controls — never disable. Malware ZAP is a separate toggle in Anti-Malware global settings."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "Allow & block lists", "portal": "Threat Policies → Anti-spam → Edit policy → Allow & block lists section", "steps": "Allowed senders: keep empty or minimal. Allowed domains: NEVER add your own domain or large providers (gmail.com). Blocked senders/domains: populate with threat actor infrastructure identified during IR.", "powershell": "# Add blocked sender:\nSet-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -BlockedSenders @{Add='attacker@evil.com'}\n# Add blocked domain:\nSet-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -BlockedSenderDomains @{Add='evil-domain.com'}", "gotchas": "Adding your own domain to the allowed list is one of the most dangerous and common misconfigurations in M365. It bypasses spam filtering for all mail claiming to be from your domain. Check for this on every tenant assessment."}, {"section": "ANTI-SPAM — Configuration Steps", "type": "Anti-Spam", "area": "End-user quarantine notifications", "portal": "Threat Policies → Quarantine policies → Edit policy → Quarantine notification", "steps": "Edit the quarantine policy assigned to spam verdicts. Enable 'Quarantine notification'. Set frequency to every 3 days. This is configured on the QUARANTINE POLICY, not the spam policy itself.", "powershell": "Set-QuarantinePolicy -Identity 'DefaultFullAccessWithNotificationPolicy' -EndUserQuarantinePermissionsValue 23 -EsnEnabled $true -MultiLanguageCustomDisclaimer 'Contact IT@contoso.com for assistance.'", "gotchas": "End-user notifications are set on the Quarantine Policy, not the Anti-Spam policy. Many admins look for this setting in the wrong place. The QuarantinePermissionsValue 23 = View + Delete + Release request (not self-release)."}, {"section": "ANTI-MALWARE — Configuration Steps", "type": "Anti-Malware", "area": "Create hardened policy", "portal": "Threat Policies → Anti-malware → + Create", "steps": "Click '+ Create'. Name it 'Hardened Anti-Malware Policy'. Apply to all accepted domains. Set priority above default.", "powershell": "New-MalwareFilterPolicy -Name 'Hardened Anti-Malware Policy'\nNew-MalwareFilterRule -Name 'Hardened Anti-Malware Rule' -MalwareFilterPolicy 'Hardened Anti-Malware Policy' -RecipientDomainIs contoso.com -Priority 0", "gotchas": "The built-in 'Default' malware policy cannot be deleted. Custom policy must be higher priority. Confirm priority after creation."}, {"section": "ANTI-MALWARE — Configuration Steps", "type": "Anti-Malware", "area": "Common attachment filter", "portal": "Threat Policies → Anti-malware → Edit policy → Protection settings", "steps": "Toggle on 'Enable the common attachments filter'. Click 'Customize file types'. Add all required extensions beyond the defaults: .iso, .img, .vhd, .vhdx, .ps1, .psm1, .psd1, .lnk, .hta, .jar, .wsf, .wsh, .xlsm, .docm, .pptm, .xlsb, .msp. Set action to 'Reject the message with an NDR'.", "powershell": "Set-MalwareFilterPolicy -Identity 'Hardened Anti-Malware Policy' -EnableFileFilter $true -FileFilterAction Reject -FileTypes 'ace','ani','app','bat','cab','cmd','com','cpl','docm','exe','hta','img','iso','jar','js','jse','lnk','msi','msp','ps1','psm1','psd1','reg','scr','vhd','vhdx','vbs','wsf','wsh','xlsb','xlsm','xll','pptm'", "gotchas": "The portal UI shows a checkbox list — scroll down to confirm all types are checked. The Reject action sends an NDR to the sender. If you choose Quarantine instead, assign AdminOnlyAccessPolicy to the quarantine policy."}, {"section": "ANTI-MALWARE — Configuration Steps", "type": "Anti-Malware", "area": "Admin notifications", "portal": "Threat Policies → Anti-malware → Edit policy → Notification section", "steps": "Enable 'Notify an admin about undelivered messages from internal senders'. Enter security team email. Enable 'Notify an admin about undelivered messages from external senders'. Enter security team email.", "powershell": "Set-MalwareFilterPolicy -Identity 'Hardened Anti-Malware Policy' -EnableInternalSenderAdminNotifications $true -InternalSenderAdminAddress 'security@contoso.com' -EnableExternalSenderAdminNotifications $true -ExternalSenderAdminAddress 'security@contoso.com'", "gotchas": "Internal sender notifications are critical post-breach — they alert you when a potentially compromised internal account sends malware. Use a monitored security mailbox, not a personal address."}, {"section": "ANTI-MALWARE — Configuration Steps", "type": "Anti-Malware", "area": "Redirect on detection", "portal": "Threat Policies → Anti-malware → Edit policy → Notification section", "steps": "Check 'Redirect messages that contain undelivered attachments to a specified email address'. Enter SOC/security sample mailbox address. This sends a copy of the blocked attachment for analysis.", "powershell": "Set-MalwareFilterPolicy -Identity 'Hardened Anti-Malware Policy' -Action Redirect -RedirectAddress 'security-samples@contoso.com'", "gotchas": "The redirect address field only appears after the checkbox is checked. Use a dedicated security mailbox — not a shared inbox. Ensure the mailbox is monitored and has appropriate access controls. Do not use a personal mailbox."}, {"section": "ANTI-MALWARE — Configuration Steps", "type": "Anti-Malware", "area": "ZAP for malware (global setting)", "portal": "Threat Policies → Anti-malware → Global settings", "steps": "Click 'Global settings' at the top of the Anti-malware page. Confirm 'Enable zero-hour auto purge (ZAP) for malware' is toggled On. This is a tenant-wide setting separate from per-policy configuration.", "powershell": "Set-MalwareFilterPolicy -Identity 'Default' -ZapEnabled $true", "gotchas": "ZAP for malware is configured on the Default policy at tenant level, not per custom policy. This is a separate setting from spam/phishing ZAP. Confirm it is on even if you have a custom policy."}, {"section": "SAFE LINKS — Configuration Steps", "type": "Safe Links", "area": "Create hardened policy", "portal": "Threat Policies → Safe Links → + Create", "steps": "Click '+ Create'. Name it 'Hardened Safe Links Policy'. Apply to all accepted domains. Set priority above any existing policies.", "powershell": "New-SafeLinksPolicy -Name 'Hardened Safe Links Policy'\nNew-SafeLinksRule -Name 'Hardened Safe Links Rule' -SafeLinksPolicy 'Hardened Safe Links Policy' -RecipientDomainIs contoso.com -Priority 0", "gotchas": "Safe Links requires MDO Plan 1 minimum. If not licensed, document as a gap. EOP-only tenants do not have Safe Links."}, {"section": "SAFE LINKS — Configuration Steps", "type": "Safe Links", "area": "Core URL scanning settings", "portal": "Threat Policies → Safe Links → Edit policy → URL & click protection settings", "steps": "Enable: 'On: Safe Links checks a list of known, malicious links when users click links in email'. Enable: 'Apply Safe Links to email messages sent within the organization'. Enable: 'Apply real-time URL scanning for suspicious links and links that point to files'. Enable: 'Wait for URL scanning to complete before delivering the message'.", "powershell": "Set-SafeLinksPolicy -Identity 'Hardened Safe Links Policy' -EnableSafeLinksForEmail $true -EnableForInternalSenders $true -ScanUrls $true -DeliverMessageAfterScan $true", "gotchas": "DeliverMessageAfterScan = $true means messages are held until URL detonation completes. This adds latency (usually seconds) but prevents race conditions. Users may notice slight delivery delays — set expectations."}, {"section": "SAFE LINKS — Configuration Steps", "type": "Safe Links", "area": "Teams & Office protection", "portal": "Threat Policies → Safe Links → Edit policy → URL & click protection settings", "steps": "Enable 'On: Safe Links checks a list of known, malicious links when users click links in Microsoft Teams'. Enable 'On: Safe Links checks a list of known, malicious links in Office apps'.", "powershell": "Set-SafeLinksPolicy -Identity 'Hardened Safe Links Policy' -EnableSafeLinksForTeams $true -EnableSafeLinksForOffice $true", "gotchas": "Teams Safe Links requires the policy to be applied AND Teams to be selected as a protected workload. Office app protection covers Word, Excel, PowerPoint, Visio when opening links. Both are off by default."}, {"section": "SAFE LINKS — Configuration Steps", "type": "Safe Links", "area": "Click tracking & click-through blocking", "portal": "Threat Policies → Safe Links → Edit policy → URL & click protection settings", "steps": "UNCHECK 'Do not track user clicks' (leave tracking ON — double negative). CHECK 'Do not let users click through to the original URL' (blocks proceed-anyway button).", "powershell": "Set-SafeLinksPolicy -Identity 'Hardened Safe Links Policy' -TrackClicks $true -AllowClickThrough $false", "gotchas": "The UI uses double negatives — 'Do not track' should be UNCHECKED to enable tracking. 'Do not let users click through' should be CHECKED to block bypass. This confuses nearly everyone. TrackClicks $true = tracking on. AllowClickThrough $false = no bypass allowed."}, {"section": "SAFE LINKS — Configuration Steps", "type": "Safe Links", "area": "Global settings — exclusion list", "portal": "Threat Policies → Safe Links → Global settings", "steps": "Click 'Global settings' at the top of the Safe Links page. Review 'Do not rewrite the following URLs' list. Remove any unnecessary entries. Each entry bypasses Safe Links entirely. Document each with business justification.", "powershell": "# View current exclusion list:\nGet-SafeLinksPolicy -Identity 'Hardened Safe Links Policy' | Select DoNotRewriteUrls\n# Add exclusion (use sparingly):\nSet-SafeLinksPolicy -Identity 'Hardened Safe Links Policy' -DoNotRewriteUrls @{Add='https://trusted-partner.com/*'}", "gotchas": "Global settings apply across ALL Safe Links policies. The exclusion list is a common place to find overly broad bypasses left by previous admins. Audit it on every engagement — entries like '*.com' or '*' will completely neuter Safe Links."}, {"section": "SAFE ATTACHMENTS — Configuration Steps", "type": "Safe Attachments", "area": "Create hardened policy", "portal": "Threat Policies → Safe Attachments → + Create", "steps": "Click '+ Create'. Name it 'Hardened Safe Attachments Policy'. Apply to all accepted domains. Set priority above any existing policies.", "powershell": "New-SafeAttachmentPolicy -Name 'Hardened Safe Attachments Policy'\nNew-SafeAttachmentRule -Name 'Hardened Safe Attachments Rule' -SafeAttachmentPolicy 'Hardened Safe Attachments Policy' -RecipientDomainIs contoso.com -Priority 0", "gotchas": "Safe Attachments requires MDO Plan 1 minimum. Document as gap if EOP-only. Dynamic Delivery is a good pilot mode — delivers message body immediately, replaces attachment with placeholder during scanning, then delivers attachment after."}, {"section": "SAFE ATTACHMENTS — Configuration Steps", "type": "Safe Attachments", "area": "Action & redirect configuration", "portal": "Threat Policies → Safe Attachments → Edit policy → Safe Attachments unknown malware response", "steps": "Set action to 'Block'. Check 'Redirect attachment on detection'. Enter SOC/security mailbox address. Confirm 'Apply the Safe Attachments detection response if scanning can't complete' is checked.", "powershell": "Set-SafeAttachmentPolicy -Identity 'Hardened Safe Attachments Policy' -Action Block -Redirect $true -RedirectAddress 'security-samples@contoso.com' -ActionOnError $true", "gotchas": "Action options: Off / Monitor / Block / Replace / Dynamic Delivery. Never use Off or Monitor in a hardened posture. ActionOnError $true = fail closed if scanning times out. The redirect field only appears after the redirect checkbox is checked."}, {"section": "SAFE ATTACHMENTS — Configuration Steps", "type": "Safe Attachments", "area": "SharePoint, OneDrive & Teams protection (GLOBAL)", "portal": "Threat Policies → Safe Attachments → Global settings", "steps": "Click 'Global settings' at the top of the Safe Attachments page. Toggle ON 'Turn on Defender for Office 365 for SharePoint, OneDrive, and Microsoft Teams'. This is a TENANT-WIDE setting — not per-policy.", "powershell": "Set-AtpPolicyForO365 -EnableATPForSPOTeamsODB $true", "gotchas": "This is the most commonly missed Safe Attachments setting. It is not in the per-policy editor — it is in Global settings. Without this, files uploaded to SharePoint/OneDrive/Teams are not scanned. Enable on every tenant."}, {"section": "SAFE ATTACHMENTS — Configuration Steps", "type": "Safe Attachments", "area": "Safe Documents (global)", "portal": "Threat Policies → Safe Attachments → Global settings", "steps": "Toggle ON 'Turn on Safe Documents for Office clients'. Ensure 'Allow people to click through Protected View even if Safe Documents identified the file as malicious' is OFF.", "powershell": "Set-AtpPolicyForO365 -EnableSafeDocs $true -AllowSafeDocsOpen $false", "gotchas": "Safe Documents requires MDO Plan 2 AND Microsoft Defender for Endpoint. If either is missing, this setting has no effect. Document as gap if not licensed. AllowSafeDocsOpen $false is critical — never allow bypass."}, {"section": "SAFE ATTACHMENTS — Configuration Steps", "type": "Safe Attachments", "area": "Quarantine policy for detections", "portal": "Threat Policies → Safe Attachments → Edit policy → Quarantine policy", "steps": "Assign AdminOnlyAccessPolicy to Safe Attachments detections. Users must not be able to self-release messages blocked by Safe Attachments.", "powershell": "Set-SafeAttachmentPolicy -Identity 'Hardened Safe Attachments Policy' -QuarantineTag AdminOnlyAccessPolicy", "gotchas": "Safe Attachments detections are high-confidence threats. AdminOnlyAccessPolicy ensures all releases are admin-reviewed. This is non-negotiable in a hardened posture."}, {"section": "QUARANTINE POLICIES — Configuration Steps", "type": "Quarantine", "area": "Assign AdminOnlyAccessPolicy to high-risk verdicts", "portal": "Threat Policies → Quarantine policies", "steps": "Review built-in quarantine policies. AdminOnlyAccessPolicy: user has no access. DefaultFullAccessPolicy: user can view, release, delete. DefaultFullAccessWithNotificationPolicy: same + quarantine digest emails. Assign AdminOnlyAccessPolicy to: malware, high-confidence phishing, Safe Attachments detections.", "powershell": "# View quarantine policies:\nGet-QuarantinePolicy | Select Name, QuarantinePolicyType\n# Assign to spam policy verdict:\nSet-HostedContentFilterPolicy -Identity 'Hardened Anti-Spam Policy' -HighConfidencePhishQuarantineTag AdminOnlyAccessPolicy", "gotchas": "Quarantine policy assignment is done per-verdict within each threat policy. You must check all five policy types (spam, phish, malware, Safe Links, Safe Attachments) and assign appropriately. A single misconfigured verdict can allow users to self-release malware."}, {"section": "QUARANTINE POLICIES — Configuration Steps", "type": "Quarantine", "area": "Configure end-user notifications", "portal": "Threat Policies → Quarantine policies → Edit DefaultFullAccessWithNotificationPolicy", "steps": "Edit the quarantine policy used for spam/bulk verdicts. Enable quarantine notifications. Set language. Set frequency to every 3 days. Customize disclaimer to include IT contact info.", "powershell": "Set-QuarantinePolicy -Identity 'DefaultFullAccessWithNotificationPolicy' -EsnEnabled $true -EndUserQuarantinePermissionsValue 23 -MultiLanguageSetting 'Default' -MultiLanguageCustomDisclaimer 'Contact IT at helpdesk@contoso.com for assistance.'", "gotchas": "EndUserQuarantinePermissionsValue 23 = DefaultFullAccessPolicy — includes self-release, view, delete, and block sender. This is correct for spam verdicts where users should be able to self-release. Value 15 = request-only (no self-release). Value 31 = full access plus notify. Do not use 23 for phishing or malware verdicts — use AdminOnlyAccessPolicy for those."}, {"section": "QUARANTINE POLICIES — Configuration Steps", "type": "Quarantine", "area": "Audit quarantine release history", "portal": "Threat Policies → Quarantine (review portal) OR PowerShell", "steps": "Regularly review what has been released from quarantine, by whom, and what verdict it was released from. Flag any admin-released malware or high-confidence phishing for IR review.", "powershell": "# View recent quarantine releases:\nGet-QuarantineMessage -Released $true -StartReceivedDate (Get-Date).AddDays(-7) | Select SenderAddress, Subject, Type, ReleasedBy, ReleasedTime\n# View all quarantined malware:\nGet-QuarantineMessage -Type Malware | Select SenderAddress, Subject, ReceivedTime", "gotchas": "Quarantine release history is a critical IR artifact. Attackers who compromise admin accounts sometimes release quarantined phishing or malware to reach target mailboxes. Review release history as part of every post-breach assessment."}, {"section": "DEPLOYMENT — PowerShell Setup & Verification", "type": "Deployment", "area": "Connect to Exchange Online PowerShell", "portal": "PowerShell (local or Cloud Shell)", "steps": "Install the ExchangeOnlineManagement module and connect before running any PowerShell commands. Required for all EXO and Defender policy management via PowerShell.", "powershell": "# Install module (run as admin):\nInstall-Module -Name ExchangeOnlineManagement -Force\n\n# Connect:\nConnect-ExchangeOnline -UserPrincipalName admin@contoso.com\n\n# Verify connection:\nGet-OrganizationConfig | Select DisplayName", "gotchas": "All PowerShell commands on this sheet require an active ExchangeOnlineManagement session. The module requires PowerShell 5.1+ or PowerShell 7+. Use MFA-enabled admin accounts — basic auth to EXO PowerShell is deprecated."}, {"section": "DEPLOYMENT — PowerShell Setup & Verification", "type": "Deployment", "area": "Export current policy state before changes", "portal": "PowerShell", "steps": "Before making any changes, export the current state of all Defender policies to a JSON or XML file for rollback reference.", "powershell": "# Export anti-phish policies:\nGet-AntiPhishPolicy | ConvertTo-Json | Out-File 'C:\\IR\\AntiPhish_Baseline.json'\n# Export spam policies:\nGet-HostedContentFilterPolicy | ConvertTo-Json | Out-File 'C:\\IR\\AntiSpam_Baseline.json'\n# Export malware policies:\nGet-MalwareFilterPolicy | ConvertTo-Json | Out-File 'C:\\IR\\AntiMalware_Baseline.json'\n# Export Safe Links:\nGet-SafeLinksPolicy | ConvertTo-Json | Out-File 'C:\\IR\\SafeLinks_Baseline.json'\n# Export Safe Attachments:\nGet-SafeAttachmentPolicy | ConvertTo-Json | Out-File 'C:\\IR\\SafeAttach_Baseline.json'", "gotchas": "Always export baseline before changes. This is your rollback reference if a hardened setting causes unexpected impact. Store exports in your IR case folder with timestamp in filename."}, {"section": "DEPLOYMENT — PowerShell Setup & Verification", "type": "Deployment", "area": "Pilot group deployment", "portal": "All five policy types → Applies to → Conditions", "steps": "Before applying to all users, scope each new hardened policy to a pilot group (IT team, security team). Run for 48-72 hours. Review quarantine for false positives. Then expand to all users.", "powershell": "# Scope policy to pilot group:\nNew-AntiPhishRule -Name 'Hardened Anti-Phish Rule PILOT' -AntiPhishPolicy 'Hardened Anti-Phish Policy' -SentToMemberOf 'Pilot-Security-Group' -Priority 0\n\n# Expand to all domains after pilot:\nSet-AntiPhishRule -Identity 'Hardened Anti-Phish Rule PILOT' -RecipientDomainIs contoso.com", "gotchas": "Pilot deployment is especially important for Safe Attachments (Block mode causes delivery delays) and Anti-Phish (level 4 may catch legitimate mail). Never push hardened settings to all users without a pilot phase in production tenants."}, {"section": "DEPLOYMENT — PowerShell Setup & Verification", "type": "Deployment", "area": "Verify policy application via test message", "portal": "Microsoft Remote Connectivity Analyzer OR PowerShell", "steps": "After deploying, send test messages to verify policies are firing correctly. Use the Message Trace tool to confirm policy application.", "powershell": "# Check message trace for policy hits:\nGet-MessageTrace -SenderAddress 'test@external.com' -RecipientAddress 'user@contoso.com' -StartDate (Get-Date).AddHours(-1) | Get-MessageTraceDetail | Where {$_.Event -eq 'Receive'}\n\n# Check quarantine for test messages:\nGet-QuarantineMessage -RecipientAddress 'user@contoso.com' -StartReceivedDate (Get-Date).AddHours(-1)", "gotchas": "Message Trace is in the M365 admin center under Mail flow → Message trace. Defender portal also has an email entity page that shows all policies applied to a specific message. Use both to confirm hardened policies are applying as expected."}, {"section": "DEPLOYMENT — PowerShell Setup & Verification", "type": "Deployment", "area": "Monitor quarantine post-deployment", "portal": "security.microsoft.com → Review → Quarantine", "steps": "For the first 2 weeks post-deployment, review the quarantine daily. Look for: legitimate mail caught by phishing/impersonation rules, business partners blocked by attachment rules, internal alerts triggering admin notifications.", "powershell": "# Daily quarantine summary:\nGet-QuarantineMessage -StartReceivedDate (Get-Date).AddDays(-1) | Group-Object Type | Select Name, Count\n\n# View high-confidence phish quarantine:\nGet-QuarantineMessage -Type HighConfPhish | Select SenderAddress, Subject, ReceivedTime | Sort ReceivedTime -Descending", "gotchas": "High false positive rate in the first week is normal — it identifies misconfigured allow lists, trusted partner domains missing from exclusions, and mail flows you were not aware of. Tune rather than roll back. Document every adjustment."}], "mail_flow": [{"section": "INBOUND CONTROLS", "id": "MFR-01", "name": "Block-Inbound-DomainSpoofExternal", "direction": "Inbound", "conditions": "Sender domain matches org domain(s) AND sender is external (outside the organization)", "action": "Reject message — return NDR: 'This message appears to spoof our domain and has been blocked.'", "exceptions": "Deploy in audit/log mode first for 48–72hrs. Identify legitimate third-party senders (marketing, HR, CRM, payroll) hitting the rule before enforcing. Add exceptions for approved senders/connectors.", "dns": "⚠️ Critical if DMARC is p=none. Redundant if DMARC is p=reject. Always assess SPF/DKIM/DMARC posture before deploying. Document DMARC policy in tenant notes.", "overlap": "Partial", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-02", "name": "Prepend-Inbound-ExternalEmailBanner", "direction": "Inbound", "conditions": "Sender is external (outside the organization) AND message is not from authenticated internal relay", "action": "Prepend HTML warning banner to message body: 'This email originated from outside the organization. Do not click links or open attachments unless expected.'", "exceptions": "Exclude known trusted partner domains if banner creates noise. Exclude internal relay connectors. Consider suppressing for encrypted/signed messages.", "dns": "None — purely cosmetic/awareness control", "overlap": "No", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-03", "name": "Block-Inbound-ExecutableAttachments", "direction": "Inbound", "conditions": "Any attachment file extension matches: .exe, .bat, .cmd, .com, .vbs, .js, .jse, .ps1, .psm1, .psd1, .msi, .reg, .scr, .pif, .application", "action": "Reject message — NDR to sender: 'Attachments of this type are not permitted.'", "exceptions": "No standard exceptions recommended. If a business case exists for receiving specific types (e.g. .ps1 for IT vendor), route through a dedicated monitored mailbox instead.", "dns": "", "overlap": "Partial", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-04", "name": "Block-Inbound-DoubleExtensionFiles", "direction": "Inbound", "conditions": "Attachment file name matches pattern: *.*.* (double extension — e.g. invoice.pdf.exe, report.docx.js). Use regex: \\.[a-zA-Z0-9]{2,4}\\.[a-zA-Z0-9]{2,4}$", "action": "Reject message — NDR to sender: 'Attachments with multiple file extensions are not permitted.'", "exceptions": "Very low false positive rate — double extension filenames have almost no legitimate use case. Log rejections for 24hrs before enforcing to confirm.", "dns": "", "overlap": "Partial", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-05", "name": "Block-Inbound-DiskImageAttachments", "direction": "Inbound", "conditions": "Any attachment file extension matches: .iso, .img, .vhd, .vhdx, .vmdk, .bin", "action": "Reject message — NDR to sender: 'Disk image attachments are not permitted.'", "exceptions": "Rare legitimate business use. If needed (e.g. IT vendor software delivery), route to a dedicated IT mailbox with monitoring instead of blanket exception.", "dns": "", "overlap": "Partial", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-06", "name": "Block-Inbound-FileShareURLs", "direction": "Inbound", "conditions": "Message body or subject contains URLs matching domains: dropbox.com, wetransfer.com, gofile.io, mediafire.com, sendspace.com, transfernow.net, smash.com, filemail.com (maintain and expand list)", "action": "Reject message OR quarantine for admin review — NDR: 'Messages containing links to external file sharing services are not permitted.'", "exceptions": "Consider quarantine over hard block initially — some legitimate vendors use these services. Review quarantine regularly and expand/contract the domain list based on org need. WeTransfer and Dropbox most commonly abused.", "dns": "None — URL filtering for file sharing domains is not covered natively by Safe Links", "overlap": "No", "status": "Deploy"}, {"section": "INBOUND CONTROLS", "id": "MFR-07", "name": "Block-Inbound-NewlyRegisteredDomainURLs", "direction": "Inbound", "conditions": "Message contains URLs where the sending domain was registered within the last 30 days. NOTE: Native EXO mail flow rules cannot check domain registration age — this requires a third-party email security gateway or Defender for Office 365 Plan 2 with URL detonation.", "action": "Quarantine for admin review", "exceptions": "Cannot be implemented as a native Exchange mail flow rule alone. Requires Defender for Office 365 Plan 2 (URL detonation + threat intelligence) or a third-party SEG (Proofpoint, Mimecast, etc.). Document as a gap if neither is present.", "dns": "None directly", "overlap": "Yes", "status": "Assess"}, {"section": "INBOUND CONTROLS", "id": "MFR-08", "name": "Block-Inbound-IPAddressURLs", "direction": "Inbound", "conditions": "Message body contains URLs where the hostname is a raw IP address (IPv4 or IPv6) instead of a domain name. Regex pattern: https?:\\/\\/(\\d{1,3}\\.){3}\\d{1,3}|https?:\\/\\/\\[?[0-9a-fA-F:]+\\]?", "action": "Reject message — NDR: 'Messages containing links to raw IP addresses are not permitted.'", "exceptions": "Extremely low false positive rate for inbound email. Raw IP URLs in email are almost universally malicious or suspicious. Safe to enforce without extended audit period.", "dns": "", "overlap": "Partial", "status": "Deploy"}, {"section": "OUTBOUND / DLP CONTROLS", "id": "MFR-09", "name": "Block-Outbound-CreditCardPatterns", "direction": "Outbound", "conditions": "Message body or attachments match credit card number patterns (DLP): Visa (4[0-9]{12,15}), Mastercard (5[1-5][0-9]{14}), Amex (3[47][0-9]{13}), Discover (6011[0-9]{12}). Use built-in M365 DLP sensitive info type: 'Credit Card Number'.", "action": "Block and notify sender: 'Your message may contain payment card data and has been blocked. Contact IT if this is a legitimate business need.' Notify compliance team.", "exceptions": "Use M365 DLP policy with the built-in Credit Card sensitive info type rather than a raw regex MFR where possible — DLP has higher accuracy and handles context better. The MFR is a fallback if DLP is not licensed.", "dns": "", "overlap": "Yes", "status": "Deploy"}, {"section": "OUTBOUND / DLP CONTROLS", "id": "MFR-10", "name": "Block-Outbound-SSNPatterns", "direction": "Outbound", "conditions": "Message body or attachments match US SSN patterns (DLP): [0-9]{3}-[0-9]{2}-[0-9]{4} or [0-9]{9}. Use built-in M365 DLP sensitive info type: 'U.S. Social Security Number (SSN)'.", "action": "Block and notify sender: 'Your message may contain Social Security Numbers and has been blocked. Contact IT if this is a legitimate business need.' Notify compliance team.", "exceptions": "Same as MFR-09 — prefer M365 DLP sensitive info type over raw regex. High false positive risk with raw regex (any 9-digit number matches). DLP context-aware detection is significantly more accurate.", "dns": "", "overlap": "Yes", "status": "Deploy"}, {"section": "OUTBOUND / DLP CONTROLS", "id": "MFR-11", "name": "Block-Outbound-SensitiveKeywords", "direction": "Outbound", "conditions": "Message body, subject, or attachments contain keywords from a configurable sensitive word list. Examples: 'confidential', 'proprietary', 'trade secret', 'attorney-client', 'do not distribute', 'internal only'. List must be defined and maintained per tenant.", "action": "Quarantine for compliance review OR block with sender notification. Action depends on org risk tolerance.", "exceptions": "Word list MUST be customized per tenant — a generic list will cause high false positive rates. Start with quarantine (not block) and tune the list before enforcing. Works best as a complement to sensitivity labels rather than a standalone control.", "dns": "", "overlap": "Partial", "status": "Assess"}, {"section": "INTERNAL CONTROLS", "id": "MFR-12", "name": "Block-Internal-ExecutableAttachments", "direction": "Internal", "conditions": "Sender and recipient are both internal (within the organization) AND any attachment file extension matches: .exe, .bat, .cmd, .com, .vbs, .js, .jse, .ps1, .msi, .reg, .scr", "action": "Reject message — NDR to sender: 'Attachments of this type cannot be sent internally. Use a managed file share or IT-approved delivery method.'", "exceptions": "IT and security teams may have legitimate need to share scripts internally. Create a dedicated exception group (e.g. CA-EX-ITAdmins or a mail-enabled security group) scoped to IT staff with documented approval.", "dns": "", "overlap": "Partial", "status": "Deploy"}, {"section": "INTERNAL CONTROLS", "id": "MFR-13", "name": "Block-Internal-AutoForwardExternal", "direction": "Internal / Outbound", "conditions": "Message class is auto-forward (X-MS-Exchange-Inbox-Rules-Loop header present OR message type is auto-forward) AND recipient is external (outside the organization)", "action": "Reject and notify: 'Automatic forwarding to external addresses is disabled. Contact IT if a business need exists.' Alert security team on attempt.", "exceptions": "Legitimate business cases exist (e.g. executive assistant forwarding, shared mailbox routing). Handle via explicit approved connectors or journaling rules — never via user-created inbox rules. Exceptions require IT approval and documentation.", "dns": "", "overlap": "No", "status": "Deploy"}, {"section": "POST-BREACH / INCIDENT RESPONSE", "id": "MFR-14", "name": "Block-Outbound-AllExceptApprovedDomains", "direction": "Outbound", "conditions": "Recipient domain is NOT in an approved outbound domain allowlist (maintained per tenant). All outbound email to domains outside the allowlist is blocked.", "action": "Reject message — NDR to sender: 'Outbound email delivery is currently restricted. Contact IT.' Alert security team on all blocked attempts.", "exceptions": "EMERGENCY / INCIDENT RESPONSE TOOL — not a standing policy. Activate only during active breach with confirmed outbound exfiltration. Approved domain list must be pre-built before an incident — build it now. Minimum list: key business partners, payroll, banking, legal. Deactivate as soon as threat is contained.", "dns": "", "overlap": "No", "status": "Runbook"}], "tenant_settings": [{"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service purchase — Power BI", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy", "ps_only": "Yes", "notes": "Users can purchase Power BI Pro independently and introduce unlicensed data flows. Disable all self-service purchases by default. Re-enable only with explicit IT approval and licensing review."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service purchase — Power Apps", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy", "ps_only": "Yes", "notes": "Users can spin up Power Apps environments and create apps that connect to business data without IT visibility. Disable by default."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service purchase — Power Automate", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy", "ps_only": "Yes", "notes": "Users can purchase Power Automate and create automated flows exfiltrating data to external services. Disable by default."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service purchase — Teams Premium", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy", "ps_only": "Yes", "notes": "Prevents users from independently licensing Teams Premium features. Disable to maintain license control."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service purchase — Dynamics 365", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy", "ps_only": "Yes", "notes": "Disable all Dynamics 365 self-service trials to prevent shadow CRM deployments with business data."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial signups — all products", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell module:\nSet-MSCommercePolicy -PolicyId AllowSelfServicePurchase", "ps_only": "Yes", "notes": "Bulk-disable all self-service trials using AllowSelfServicePurchase policy applied to all product IDs. Run Get-MSCommerceProductPolicies to enumerate all available product IDs in the tenant."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Viral / self-service signup (work email on external services)", "recommended": "Disabled", "default": "Enabled", "where": "M365 Admin Center → Settings → Org settings → User owned apps & services\nOR PowerShell: Set-MsolCompanySettings", "ps_only": "No", "notes": "Prevents users from signing up for external Microsoft services (Flow, Power BI free, etc.) using their work email address without IT knowledge. Disable to maintain visibility."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial — Microsoft Purview (Compliance)", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy -PolicyId AllowSelfServicePurchase -ProductId [PurviewID] -Enabled $false", "ps_only": "Yes", "notes": "Purview trials activate compliance features (DLP, Information Protection, eDiscovery) that can alter data handling behavior. Changes to compliance configuration should be admin-controlled and documented."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial — Python in Microsoft 365 (Excel)", "recommended": "Disabled", "default": "Enabled", "where": "M365 Admin Center → Settings → Org settings → Python in Excel\nOR Microsoft 365 Apps admin center", "ps_only": "No", "notes": "Python in Excel allows arbitrary Python code execution within Excel worksheets, with data flowing to Microsoft cloud infrastructure for processing. Disable until org has assessed data handling implications and approved use."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service integration — Mailchimp connector", "recommended": "Blocked via OAuth consent policy + disable Office add-in", "default": "Available if user consent enabled", "where": "1. Entra ID → Enterprise apps → Revoke any existing Mailchimp consent\n2. M365 Admin Center → Settings → Integrated apps → Block Mailchimp\n3. Exchange Admin Center → Add-ins → Remove Mailchimp add-in", "ps_only": "No", "notes": "Mailchimp is a third-party SaaS — no native M365 self-service toggle exists. Control is enforced by: (1) disabling user OAuth app consent (App Consent section), (2) blocking the Mailchimp integrated app, (3) removing the Mailchimp Office add-in. All three layers needed."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial — Microsoft Viva (all modules)", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy per Viva product IDs\n(Viva Insights, Viva Learning, Viva Goals, Viva Engage)", "ps_only": "Yes", "notes": "Viva modules (Insights, Learning, Goals, Engage) process employee activity and HR data. Disable all Viva trials until org has reviewed data handling, privacy implications, and integration with HR systems."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial — Microsoft Project for the web", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy -PolicyId AllowSelfServicePurchase -ProductId [ProjectID] -Enabled $false", "ps_only": "Yes", "notes": "Project for the web creates Dataverse environments and stores project data outside standard M365 data governance controls. Disable self-service to prevent unmanaged Dataverse environment sprawl."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Self-service trial — Microsoft Visio", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy -PolicyId AllowSelfServicePurchase -ProductId [VisioID] -Enabled $false", "ps_only": "Yes", "notes": "Visio trials introduce an additional licensed workload outside IT control. Disable by default — provision through standard licensing process if business need exists."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft 365 E5 upgrade", "recommended": "Disabled — block via MSCommerce policy", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy -PolicyId AllowSelfServicePurchase\nAlso: M365 Admin Center → Billing → Licenses — monitor for unexpected trial licenses", "ps_only": "Yes", "notes": "E5 trials activate Defender for Office 365 Plan 2, Entra ID P2, Purview E5, and other premium features. While individually beneficial, uncontrolled E5 trials change the tenant security feature set without IT awareness. Admin should control licensing deliberately."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft Entra ID P2", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell:\nSet-MSCommercePolicy per Entra P2 product ID\nMonitor: M365 Admin Center → Billing → Licenses", "ps_only": "Yes", "notes": "Entra P2 trial enables Identity Protection (risk policies), PIM, and access reviews. Activating without planning CA risk policies (CA-05, CA-09, CA-10) in advance can create a false sense of security. Enable deliberately with policy planning."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft Defender for Office 365 Plan 2", "recommended": "Disabled — enable deliberately when ready", "default": "Enabled", "where": "MSCommerce PowerShell or\nM365 Defender portal → Trials\nMonitor: M365 Admin Center → Billing → Licenses", "ps_only": "Yes", "notes": "MDO Plan 2 trial adds Attack Simulator, Threat Explorer, and automated investigation. Beneficial but should be enabled deliberately — not via user self-service. Admin should plan deployment before activation."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft Defender for Endpoint Plan 2", "recommended": "Disabled — enable deliberately", "default": "Enabled", "where": "MSCommerce PowerShell or\nMicrosoft 365 Defender portal → Trials\nMonitor: M365 Admin Center → Billing → Licenses", "ps_only": "Yes", "notes": "MDE P2 trial adds EDR, threat hunting, and device isolation capabilities. High value post-breach but should be admin-activated with onboarding plan ready — not discovered via user self-service."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft Purview Compliance E5", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell per Purview E5 product ID\nMonitor: M365 Admin Center → Billing → Licenses", "ps_only": "Yes", "notes": "Purview E5 trial activates advanced eDiscovery, Insider Risk Management, and Communication Compliance. These features have significant data processing and privacy implications — activate deliberately with legal/compliance team involvement."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Trial — Microsoft Intune Plan 2 / Suite", "recommended": "Disabled", "default": "Enabled", "where": "MSCommerce PowerShell per Intune product ID\nMonitor: M365 Admin Center → Billing → Licenses", "ps_only": "Yes", "notes": "Intune Suite trial adds advanced endpoint management features. Should be enabled as part of a planned device management deployment, not ad-hoc. Unplanned Intune changes can affect device compliance policies linked to CA."}, {"section": "SELF-SERVICE PURCHASES & TRIALS", "category": "Self-Service", "setting": "Monitor for active trials — all products", "recommended": "Review monthly — revoke unauthorized trials", "default": "No monitoring by default", "where": "M365 Admin Center → Billing → Licenses → Filter by trial\nPowerShell: Get-MgSubscribedSku | Where-Object { $_.SkuPartNumber -match 'TRIAL' -or $_.CapabilityStatus -eq 'Warning' }", "ps_only": "Yes", "notes": "Even with self-service disabled, global admins can activate trials. Run monthly check for any active trial licenses. Unexpected trials may indicate a compromised admin account or unauthorized IT activity. Revoke and investigate any unrecognized trials."}, {"section": "APP CONSENT & REGISTRATION", "category": "App Consent", "setting": "User consent to third-party OAuth apps", "recommended": "Disabled — require admin consent", "default": "Enabled (users can consent)", "where": "Entra ID Portal → Enterprise applications → Consent and permissions → User consent settings", "ps_only": "No", "notes": "One of the most critical post-breach settings. Attackers use OAuth consent phishing (illicit consent grant) to gain persistent access. Disable user consent entirely and require admin approval for all third-party app consent requests."}, {"section": "APP CONSENT & REGISTRATION", "category": "App Consent", "setting": "Admin consent workflow", "recommended": "Enabled — route requests to designated reviewers", "default": "Disabled", "where": "Entra ID Portal → Enterprise applications → Consent and permissions → Admin consent workflow settings", "ps_only": "No", "notes": "When user consent is disabled, users need a way to request access to legitimate apps. Enable the admin consent workflow so requests are routed to designated reviewers rather than silently failing. Configure reviewer list."}, {"section": "APP CONSENT & REGISTRATION", "category": "App Consent", "setting": "User ability to register applications in Entra", "recommended": "Disabled — admins only", "default": "Enabled (all users)", "where": "Entra ID Portal → User settings → App registrations
