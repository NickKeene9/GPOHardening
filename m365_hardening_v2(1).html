let currentTab='ca-policies';
function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTab=tab;
  const t=TABS.find(x=>x.id===tab);
  document.getElementById('page-title').textContent=t.title;
  document.getElementById('page-subtitle').textContent=t.sub;
  document.getElementById('page-meta').innerHTML=(t.pills||[]).map(p=>`<span class="meta-pill">${esc(p)}</span>`).join('');
  renderPanel(tab);
}

function setCount(id,n){const el=document.getElementById('cnt-'+id);if(el)el.textContent=n;}

// Section header
let _lastSec={};
function secHdr(section,tabId){
  if(!section||section===_lastSec[tabId]) return '';
  _lastSec[tabId]=section;
  return `<div class="sec-hdr">// ${esc(section)}</div>`;
}

// Filters
function buildFilters(tabId, items, keyFn, containerId){
  const secs=[...new Set(items.map(keyFn).filter(Boolean))];
  const el=document.getElementById('filter-'+tabId)||document.getElementById(containerId);
  if(!el) return;
  el.innerHTML=['ALL',...secs].map((s,i)=>`<button class="filter-btn${i===0?' active':''}" onclick="applyFilter('${tabId}','${esc(s)}',this)">${esc(s==='ALL'?'ALL':s.replace(/▌\s*/,'').replace(/MANDATORY BASELINE — /i,'MANDATORY').replace(/RECOMMENDED — /i,'').replace(/POST-BREACH \/ INCIDENT RESPONSE/i,'POST-BREACH/IR').replace(/ — Configuration Steps/i,'').replace(/ — Assessment & Configuration/i,'').substring(0,30))}</button>`).join('');
}
function applyFilter(tabId,section,btn){
  document.querySelectorAll(`#filter-${tabId} .filter-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`#cards-${tabId} .policy-card`).forEach(c=>{c.style.display=(section==='ALL'||c.dataset.section===section)?'block':'none';});
  document.querySelectorAll(`#cards-${tabId} .sec-hdr`).forEach(h=>h.style.display=section==='ALL'?'block':'none');
  updateCount(tabId);
}
function applyTableFilter(tabId,section,btn){
  document.querySelectorAll(`#filter-${tabId} .filter-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll(`#table-wrap-${tabId} tr.row-clickable,#table-wrap-${tabId} tr.expand-row`).forEach(r=>{r.style.display=(section==='ALL'||r.dataset.section===section)?(r.classList.contains('expand-row')?'none':'table-row'):'none';});
  document.querySelectorAll(`#table-wrap-${tabId} .sec-hdr`).forEach(h=>h.style.display=section==='ALL'?'block':'none');
  updateTableCount(tabId);
}
function filterCards(tabId,q){
  q=q.toLowerCase();
  document.querySelectorAll(`#cards-${tabId} .policy-card`).forEach(c=>{c.style.display=(!q||c.dataset.search.includes(q))?'block':'none';});
  if(q) document.querySelectorAll(`#filter-${tabId} .filter-btn`).forEach((b,i)=>b.classList.toggle('active',i===0));
  updateCount(tabId);
}
function filterTable(tabId,q){
  q=q.toLowerCase();
  document.querySelectorAll(`#table-wrap-${tabId} tr.row-clickable`).forEach(r=>{r.style.display=(!q||r.dataset.search.includes(q))?'table-row':'none';});
  if(q) document.querySelectorAll(`#filter-${tabId} .filter-btn`).forEach((b,i)=>b.classList.toggle('active',i===0));
  updateTableCount(tabId);
}
function updateCount(tabId){
  const cards=[...document.querySelectorAll(`#cards-${tabId} .policy-card`)];
  const vis=cards.filter(c=>c.style.display!=='none').length;
  setCount(tabId,vis===cards.length?cards.length:`${vis}/${cards.length}`);
  const rc=document.getElementById('rc-'+tabId);
  if(rc) rc.textContent=vis===cards.length?`${cards.length} items`:`${vis} of ${cards.length} items`;
}
function updateTableCount(tabId){
  const rows=[...document.querySelectorAll(`#table-wrap-${tabId} tr.row-clickable`)];
  const vis=rows.filter(r=>r.style.display!=='none').length;
  setCount(tabId,vis===rows.length?rows.length:`${vis}/${rows.length}`);
  const rc=document.getElementById('rc-'+tabId);
  if(rc) rc.textContent=vis===rows.length?`${rows.length} items`:`${vis} of ${rows.length} items`;
}

function toggleCard(head){
  const body=head.nextElementSibling;
  const open=body.classList.contains('open');
  document.querySelectorAll(`#panel-${currentTab} .pc-body.open`).forEach(b=>{b.classList.remove('open');b.style.display='none';});
  if(!open){body.classList.add('open');body.style.display='grid';}
}
function toggleRow(id){
  const row=document.getElementById(id);
  const open=row.style.display!=='none';
  document.querySelectorAll(`#panel-${currentTab} .expand-row`).forEach(r=>{r.style.display='none';if(r.previousElementSibling)r.previousElementSibling.classList.remove('row-open');});
  if(!open){row.style.display='table-row';if(row.previousElementSibling)row.previousElementSibling.classList.add('row-open');}
}
function toggleDone(i){
  const item=document.getElementById('cli-'+i);
  item.classList.toggle('done-item',item.querySelector('.cl-check').checked);
}

function renderSettingsTable(tabId,rows,cols,searchKey){
  const secs=[...new Set(rows.map(r=>r.section).filter(Boolean))];
  let filterHtml=['ALL',...secs].map((s,i)=>`<button class="filter-btn${i===0?' active':''}" onclick="applyTableFilter('${tabId}','${esc(s)}',this)">${esc(s==='ALL'?'ALL':s.replace(/▌\s*/,'').substring(0,30))}</button>`).join('');
  let thHtml=cols.map(c=>`<th>${esc(c.label)}</th>`).join('');
  let tableHtml=`<table class="settings-table"><thead><tr>${thHtml}</tr></thead></table>`;
  _lastSec[tabId]='';
  rows.forEach((r,i)=>{
    const sh=secHdr(r.section,tabId);
    if(sh) tableHtml+=sh;
    const rid=`${tabId}-${i}`;
    const tdHtml=cols.map((c,ci)=>{
      const v=esc(r[c.key]||'');
      if(ci===0&&c.w) return `<td style="width:${c.w};font-size:.78rem">${v}</td>`;
      if(c.rec) return `<td class="val-rec" style="width:${c.w||'160px'}">${v}</td>`;
      if(c.def) return `<td class="val-def" style="width:${c.w||'120px'}">${v}</td>`;
      return `<td>${v}</td>`;
    }).join('');
    const search=esc((searchKey.map(k=>r[k]||'').join(' ')).toLowerCase());
    const isFix=tabId==='intune-compliance'&&(r.setting&&(r.setting.includes('no compliance policy')||r.setting.includes('validity period')));
    tableHtml+=`<table class="settings-table" style="margin:0"><tr class="row-clickable" id="tr-${rid}" onclick="toggleRow('ex-${rid}')" data-section="${esc(r.section)}" data-search="${search}">
      ${tdHtml}${isFix?'<td style="width:70px"><span class="fix-badge">FIXED</span></td>':''}
    </tr><tr id="ex-${rid}" class="expand-row" style="display:none" data-section="${esc(r.section)}">
      <td colspan="10"><div class="expand-inner">
        ${r.notes?`<p>${esc(r.notes)}</p>`:''}
        ${r.powershell?`<pre>${esc(r.powershell)}</pre>`:''}
        ${r.where?`<p style="margin-top:.4rem;font-family:var(--mono);font-size:.62rem;color:var(--dim2)">${esc(r.where)}</p>`:''}
      </div></td>
    </tr></table>`;
  });
  return `<div class="search-wrap"><input class="search-input" placeholder="// search..." oninput="filterTable('${tabId}',this.value)"/></div>
  <div class="filter-row" id="filter-${tabId}">${filterHtml}</div>
  <div class="result-count" id="rc-${tabId}"></div>
  <div id="table-wrap-${tabId}">${tableHtml}</div>`;
}

function renderChecklist(){
  const rows=D.checklist.filter(r=>r.step&&r.step!=='Step');

  let filterHtml=['ALL',...phases].map((s,i)=>`<button class="filter-btn${i===0?' active':''}" onclick="applyCheckFilter('${esc(s)}',this)">${esc(s)}</button>`).join('');
  let html='';
  rows.forEach((r,i)=>{
    const ph=(r.phase||'').toLowerCase();
    const pc=ph.includes('pre')?'phase-pre':ph.includes('report')||ph.includes('r/o')?'phase-ro':ph.includes('enforce')?'phase-en':ph.includes('post')?'phase-post':'phase-on';
    html+=`<div class="cl-item" id="cli-${i}" data-phase="${esc(r.phase)}">
      <span class="cl-num">${String(r.step).padStart(2,'0')}</span>
      <input type="checkbox" class="cl-check" onchange="toggleDone(${i})"/>
      <div class="cl-text">${esc(r.action)}<small>${esc(r.notes)}</small></div>
      <span class="cl-phase ${pc}">${esc(r.phase)}</span>
    </div>`;
  });
  setCount('checklist',rows.length);
  return `<div class="filter-row" id="filter-checklist">${filterHtml}</div>
  <div class="result-count" id="rc-checklist"></div>
  <div class="checklist-wrap">${html}</div>`;
}
function applyCheckFilter(phase,btn){
  document.querySelectorAll('#filter-checklist .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cl-item').forEach(item=>{item.style.display=(phase==='ALL'||item.dataset.phase===phase)?'grid':'none';});
}

// ── PANEL RENDERER ──
const rendered={};
function renderPanel(tab){
  const content=document.getElementById('page-content');
  // Remove old panel
  const old=document.getElementById('panel-'+tab);
  if(old) old.remove();

  const div=document.createElement('div');
  div.id='panel-'+tab;
  div.className='panel active';

  switch(tab){
    case 'ca-policies': div.innerHTML=renderCAPolicies(); break;
    case 'ca-config': div.innerHTML=renderCAConfig(); break;
    case 'standard-groups': div.innerHTML=renderStandardGroups(); break;
    case 'defender-policies': div.innerHTML=renderDefenderPolicies(); break;
    case 'defender-config': div.innerHTML=renderDefenderConfig(); break;
    case 'mail-flow': div.innerHTML=renderMailFlow(); break;
    case 'tenant-settings': div.innerHTML=renderSettingsTable('tenant-settings',D.tenant_settings,
      [{key:'setting',label:'Setting'},{key:'recommended',label:'Recommended Value',rec:true,w:'170px'},{key:'default',label:'Default',def:true,w:'120px'}],
      ['category','setting','notes']); break;
    case 'email-auth': div.innerHTML=renderEmailAuth(); break;
    case 'intune-compliance': div.innerHTML=renderSettingsTable('intune-compliance',D.intune_compliance,
      [{key:'setting',label:'Setting'},{key:'recommended',label:'Recommended',rec:true,w:'160px'},{key:'default',label:'Default',def:true,w:'110px'}],
      ['category','setting','notes']); break;
    case 'intune-config': div.innerHTML=renderIntuneConfig(); break;
    case 'checklist': div.innerHTML=renderChecklist(); break;
  }
  content.appendChild(div);

  // Post-render count updates
  if(['ca-policies','ca-config','mail-flow','defender-config','email-auth','intune-config'].includes(tab)){
    updateCount(tab);
    // Re-init filters now DOM exists
    const key=tab.replace(/-/g,'_');
    const dataMap={
      'ca-policies':'ca_policies','ca-config':'ca_config','mail-flow':'mail_flow',
      'defender-config':'defender_config','email-auth':'email_auth','intune-config':'intune_config'
    };
    if(dataMap[tab]){buildFilters(tab,D[dataMap[tab]],r=>r.section,'filter-'+tab);}
  }
  if(['defender-policies','tenant-settings','intune-compliance'].includes(tab)){
    updateTableCount(tab);
    const key=tab.replace(/-/g,'_');
    if(D[key]){
      const secs=[...new Set(D[key].map(r=>r.section).filter(Boolean))];
      const el=document.getElementById('filter-'+tab);
      if(el) el.innerHTML=['ALL',...secs].map((s,i)=>`<button class="filter-btn${i===0?' active':''}" onclick="applyTableFilter('${tab}','${esc(s)}',this)">${esc(s==='ALL'?'ALL':s.replace(/▌\s*/,'').substring(0,28))}</button>`).join('');
    }
  }
  content.scrollTop=0;
}

// ── BOOT ──
window.addEventListener('DOMContentLoaded',()=>{
  const t=TABS[0];
  document.getElementById('page-title').textContent=t.title;
  document.getElementById('page-subtitle').textContent=t.sub;
  document.getElementById('page-meta').innerHTML=t.pills.map(p=>`<span class="meta-pill">${esc(p)}</span>`).join('');
  renderPanel('ca-policies');
  // Pre-set counts from data lengths
  const counts={
    'ca-policies':D.ca_policies.length,'ca-config':D.ca_config.length,
    'standard-groups':D.standard_groups.length,'defender-policies':D.defender_policies.length,
    'defender-config':D.defender_config.length,'mail-flow':D.mail_flow.length,
    'tenant-settings':D.tenant_settings.length,'email-auth':D.email_auth.length,
    'intune-compliance':D.intune_compliance.length,'intune-config':D.intune_config.length,
    'checklist':D.checklist.filter(r=>r.step&&r.step!=='Step').length
  };
  Object.entries(counts).forEach(([k,v])=>setCount(k,v));
});
