<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>M365 Tenant Hardening Standard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04090f;--bg2:#070e17;--bg3:#0b1620;--surface:#0f1e2d;
  --border:#172a3e;--border2:#1e3a52;
  --cyan:#00d4ff;--cyan-d:rgba(0,212,255,.12);
  --green:#00ff88;--green-d:rgba(0,255,136,.1);
  --amber:#ffc454;--amber-d:rgba(255,196,84,.1);
  --red:#ff4466;--red-d:rgba(255,68,102,.1);
  --text:#b8d0e0;--dim:#3d5a6e;--dim2:#5a7a90;
  --mono:'Share Tech Mono',monospace;
  --head:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
  --sidebar:256px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;background:var(--bg);color:var(--text);font-family:var(--body);font-weight:300;font-size:14px}

#sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--border);overflow:hidden}
.sb-logo{padding:1.1rem 1.3rem .8rem;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.82rem;color:var(--cyan);letter-spacing:.06em;flex-shrink:0}
.sb-logo span{color:var(--green)}
.sb-logo small{display:block;font-size:.58rem;color:var(--dim2);margin-top:.28rem;letter-spacing:.08em}
.sb-nav{overflow-y:auto;flex:1;padding:.4rem 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2)}
.tab-btn{width:100%;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:.6rem;padding:.6rem 1.1rem;text-align:left;transition:background .15s;border-left:2px solid transparent}
.tab-btn:hover{background:var(--surface)}
.tab-btn.active{background:var(--surface);border-left-color:var(--cyan)}
.tab-icon{font-size:.95rem;flex-shrink:0;width:1.1rem;text-align:center}
.tab-label{font-family:var(--mono);font-size:.63rem;color:var(--dim2);letter-spacing:.07em;line-height:1.3;flex:1}
.tab-btn.active .tab-label{color:var(--cyan)}
.tab-btn:hover .tab-label{color:var(--text)}
.tab-count{font-family:var(--mono);font-size:.56rem;padding:.1rem .36rem;background:var(--border);color:var(--dim2);border-radius:2px;flex-shrink:0}
.tab-btn.active .tab-count{background:var(--cyan-d);color:var(--cyan)}
.sb-footer{padding:.75rem 1.1rem;border-top:1px solid var(--border);font-family:var(--mono);font-size:.58rem;color:var(--dim);letter-spacing:.06em;flex-shrink:0}
.status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:.35rem;animation:pulse 2.5s ease-in-out infinite}

#main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--border2)}

.page-hdr{padding:1.6rem 2rem 1.1rem;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;flex-shrink:0}
.page-hdr-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.page-title{font-family:var(--head);font-size:1.4rem;font-weight:800;color:#ddeeff;letter-spacing:-.02em;line-height:1}
.page-subtitle{font-size:.78rem;color:var(--dim2);margin-top:.3rem;line-height:1.5}
.page-meta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.meta-pill{font-family:var(--mono);font-size:.58rem;padding:.18rem .5rem;border:1px solid var(--border2);color:var(--dim2);letter-spacing:.06em}

.page-content{padding:1.4rem 1.8rem 3rem;flex:1}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .2s ease both}

.sec-hdr{font-family:var(--mono);font-size:.62rem;color:var(--dim2);letter-spacing:.14em;text-transform:uppercase;padding:.5rem 0 .35rem;margin-top:1.6rem;margin-bottom:.15rem;border-bottom:1px solid var(--border)}
.sec-hdr:first-child{margin-top:0}

.search-wrap{margin-bottom:1rem}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:.7rem;padding:.5rem .75rem;outline:none;letter-spacing:.05em;transition:border-color .2s}
.search-input::placeholder{color:var(--dim)}
.search-input:focus{border-color:var(--cyan)}

.filter-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.9rem}
.filter-btn{font-family:var(--mono);font-size:.6rem;padding:.26rem .62rem;border:1px solid var(--border2);background:none;color:var(--dim2);cursor:pointer;letter-spacing:.07em;transition:all .15s}
.filter-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.filter-btn.active{background:var(--cyan-d);border-color:var(--cyan);color:var(--cyan)}
.result-count{font-family:var(--mono);font-size:.6rem;color:var(--dim);margin-bottom:.7rem;letter-spacing:.05em}

/* Policy cards */
.policy-card{background:var(--bg3);border:1px solid var(--border);margin-bottom:.5rem;overflow:hidden;transition:border-color .2s}
.policy-card:hover{border-color:var(--border2)}
.pc-head{display:grid;grid-template-columns:78px 1fr auto;gap:.75rem;align-items:start;padding:.75rem .9rem;cursor:pointer}
.pc-id{font-family:var(--mono);font-size:.65rem;color:var(--cyan);padding-top:.12rem;letter-spacing:.05em}
.pc-name{font-size:.85rem;color:#c8dce8;line-height:1.35}
.pc-name em{display:block;font-style:normal;font-size:.7rem;color:var(--dim2);margin-top:.18rem}
.pc-badge{font-family:var(--mono);font-size:.56rem;padding:.16rem .42rem;letter-spacing:.06em;align-self:start;white-space:nowrap}
.badge-m{background:var(--red-d);color:var(--red);border:1px solid rgba(255,68,102,.28)}
.badge-r{background:var(--cyan-d);color:var(--cyan);border:1px solid rgba(0,212,255,.22)}
.badge-ir{background:var(--amber-d);color:var(--amber);border:1px solid rgba(255,196,84,.28)}
.badge-pr{background:var(--green-d);color:var(--green);border:1px solid rgba(0,255,136,.22)}
.pc-body{display:none;padding:.75rem .9rem .9rem;border-top:1px solid var(--border);background:var(--bg2)}
.pc-body.open{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.pc-field label{font-family:var(--mono);font-size:.56rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:.22rem}
.pc-field p{font-size:.78rem;color:var(--dim2);line-height:1.55}
.pc-field.full{grid-column:1/-1}
.pc-field pre{font-family:var(--mono);font-size:.64rem;background:var(--bg);border:1px solid var(--border);padding:.65rem .85rem;color:#9fc;overflow-x:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6;max-height:220px;overflow-y:auto}
.pc-field pre::-webkit-scrollbar{width:3px;height:3px}
.pc-field pre::-webkit-scrollbar-thumb{background:var(--border2)}

/* Settings table */
.settings-table{width:100%;border-collapse:collapse;font-size:.78rem}
.settings-table th{font-family:var(--mono);font-size:.58rem;color:var(--dim2);letter-spacing:.1em;text-transform:uppercase;padding:.45rem .65rem;border-bottom:1px solid var(--border);text-align:left;background:var(--bg2)}
.settings-table td{padding:.6rem .65rem;border-bottom:1px dashed var(--border);vertical-align:top;line-height:1.5}
.settings-table tr:last-child td{border-bottom:none}
.settings-table tr:hover td{background:var(--bg3)}
.val-rec{color:var(--green);font-family:var(--mono);font-size:.68rem}
.val-def{color:var(--dim2);font-size:.72rem}
.expand-row td{padding:0!important;border:none!important;background:var(--bg2)!important}
.expand-inner{padding:.75rem .9rem;font-size:.76rem;color:var(--dim2);line-height:1.6;border-top:1px solid var(--border)}
.expand-inner pre{font-family:var(--mono);font-size:.62rem;background:var(--bg);border:1px solid var(--border);padding:.6rem .8rem;color:#9fc;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin-top:.45rem;max-height:200px;overflow-y:auto}
.expand-inner pre::-webkit-scrollbar{width:3px;height:3px}
.expand-inner pre::-webkit-scrollbar-thumb{background:var(--border2)}
.row-clickable{cursor:pointer}
.row-clickable:hover td{background:var(--surface)!important}
.row-open td{background:var(--surface)!important;border-bottom:none!important}

/* Checklist */
.checklist-wrap{display:grid;gap:.45rem}
.cl-item{background:var(--bg3);border:1px solid var(--border);display:grid;grid-template-columns:2.2rem auto 1fr 115px;gap:.75rem;align-items:start;padding:.8rem .9rem;transition:border-color .2s,opacity .2s}
.cl-item.done-item{opacity:.45}
.cl-num{font-family:var(--mono);font-size:.68rem;color:var(--dim);padding-top:.08rem}
.cl-check{width:15px;height:15px;border:1px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;position:relative;margin-top:.08rem}
.cl-check:checked{background:var(--green);border-color:var(--green)}
.cl-check:checked::after{content:'✓';position:absolute;top:-2px;left:1px;color:var(--bg);font-size:.62rem;font-weight:700}
.cl-text{font-size:.81rem;color:var(--text);line-height:1.4}
.cl-text small{display:block;font-size:.7rem;color:var(--dim2);margin-top:.22rem}
.cl-phase{font-family:var(--mono);font-size:.58rem;padding:.16rem .45rem;border:1px solid;letter-spacing:.06em;text-align:center;align-self:start}
.phase-pre{color:var(--amber);border-color:rgba(255,196,84,.28);background:var(--amber-d)}
.phase-ro{color:var(--cyan);border-color:rgba(0,212,255,.22);background:var(--cyan-d)}
.phase-en{color:var(--green);border-color:rgba(0,255,136,.22);background:var(--green-d)}
.phase-post{color:var(--text);border-color:var(--border2);background:var(--surface)}
.phase-on{color:var(--dim2);border-color:var(--border);background:transparent}

/* Group cards */
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:.75rem}
.grp-card{background:var(--bg3);border:1px solid var(--border);padding:.95rem;transition:border-color .2s}
.grp-card:hover{border-color:var(--border2)}
.grp-name{font-family:var(--mono);font-size:.75rem;color:var(--cyan);margin-bottom:.35rem}
.grp-dir{display:inline-block;font-family:var(--mono);font-size:.56rem;padding:.13rem .38rem;margin-bottom:.5rem}
.dir-in{background:var(--green-d);color:var(--green);border:1px solid rgba(0,255,136,.22)}
.dir-ex{background:var(--amber-d);color:var(--amber);border:1px solid rgba(255,196,84,.28)}
.grp-purpose{font-size:.78rem;color:var(--text);line-height:1.5;margin-bottom:.4rem}
.grp-audit{font-family:var(--mono);font-size:.58rem;color:var(--dim2);margin-top:.4rem}
.grp-meta{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
.grp-meta-item{font-family:var(--mono);font-size:.56rem;color:var(--dim2);padding:.08rem .32rem;background:var(--surface);border:1px solid var(--border)}

/* Fixed correction badge */
.fix-badge{font-family:var(--mono);font-size:.56rem;padding:.14rem .4rem;background:rgba(255,196,84,.12);color:var(--amber);border:1px solid rgba(255,196,84,.3);margin-left:.4rem;vertical-align:middle}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}50%{box-shadow:0 0 0 3px rgba(0,255,136,.1)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2)}
</style>
</head>
<body>

  <div class="sb-logo">M365<span>::HARDENED</span><small>HARDENING STANDARD v2 — CORRECTED</small></div>
  <nav class="sb-nav" id="sb-nav"></nav>

<main id="main">

        <div class="page-subtitle" id="page-subtitle"></div>
      </div>
      <div class="page-meta" id="page-meta"></div>
    </div>
  </div>
  <div class="page-content" id="page-content"></div>
</main>

 "name": "Require-GuestUsers-MFA", "category": "MANDATORY", "target": "CA-IN-GuestUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Require multi-factor authentication", "license": "P1", "order": "4", "status": "Deploy", "report_only": "Yes", "notes": "Guest MFA is frequently absent. B2B guests inherit weak or no MFA policies from their home tenant — enforce explicitly in your tenant. Do not assume guest home tenant MFA is equivalent."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-08", "name": "Block-AllUsers-HighRiskSignIn", "category": "Identity & MFA", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Sign-in risk: High (Identity Protection)", "grant": "Block access", "license": "P2 ⚠️", "order": "5", "status": "Assess", "report_only": "Yes", "notes": "Requires Entra ID P2 / Identity Protection. Blocks sign-in when high-confidence compromise indicators are detected. If P1-only tenant, document as gap and compensate with named location blocks and MFR controls."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-09", "name": "Block-AllUsers-UserRisk-High", "category": "Identity & MFA", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "User risk: High (Identity Protection)", "grant": "Block access OR Require MFA + password change", "license": "P2 ⚠️", "order": "5", "status": "Assess", "report_only": "Yes", "notes": "Blocks sign-in when account compromise indicators are present at the user level (leaked credentials, atypical behavior). Requires P2. Complement to CA-08 which is sign-in level risk."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-10", "name": "Require-AllUsers-UserRisk-Medium", "category": "Identity & MFA", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "User risk: Medium (Identity Protection)", "grant": "Require MFA + Require password change", "license": "P2 ⚠️", "order": "5", "status": "Assess", "report_only": "Yes", "notes": "Step-up remediation at medium risk level. Forces self-service password reset + MFA before allowing access. Allows remediation rather than hard block for medium confidence signals."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-11", "name": "Require-AllUsers-SignInRisk-Medium", "category": "Identity & MFA", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Sign-in risk: Medium (Identity Protection)", "grant": "Require multi-factor authentication", "license": "P2 ⚠️", "order": "5", "status": "Assess", "report_only": "Yes", "notes": "MFA step-up at medium sign-in risk. Complements CA-08 — medium risk triggers MFA challenge rather than full block. Balances security with productivity for lower-confidence signals."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-12", "name": "Require-Admins-MFA", "category": "Identity & MFA", "target": "CA-IN-Admins", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Require multi-factor authentication", "license": "P1", "order": "4", "status": "Assess", "report_only": "Yes", "notes": "Admin-specific MFA layered on top of CA-03. Ensures admin accounts are explicitly covered even if excluded from broader policies. Target: phishing-resistant MFA (FIDO2/Windows Hello). Document as remediation item if not immediately deployable."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-13", "name": "Require-Admins-PhishingResistantMFA", "category": "Identity & MFA", "target": "CA-IN-Admins", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Require authentication strength: Phishing-resistant MFA", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Restricts admin sign-ins to phishing-resistant methods only (FIDO2 security keys, Windows Hello for Business). Gold standard for admin accounts post-breach. Requires FIDO2 key deployment — document as action item if hardware not yet available."}, {"section": "RECOMMENDED — IDENTITY & MFA  |  Risk policies require P2", "id": "CA-14", "name": "Require-AllUsers-AzurePortal-MFA", "category": "Identity & MFA", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: Microsoft Azure Management\n(Azure Portal, CLI, PowerShell, ARM)", "grant": "Require multi-factor authentication", "license": "P1", "order": "4", "status": "Assess", "report_only": "Yes", "notes": "Specifically targets Azure management surfaces. Catches non-admin users who may access Azure Portal. Separate from admin MFA — ensures all users reaching Azure management are MFA-challenged regardless of admin role status."}, {"section": "RECOMMENDED — DEVICE-BASED  |  Requires P1 + Intune", "id": "CA-15", "name": "Require-AllUsers-CompliantDevice", "category": "Device-Based", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass, CA-EX-Exclusions-CompliantDevice", "apps": "Cloud apps: All cloud apps", "grant": "Require device to be marked compliant OR Hybrid Entra joined", "license": "P1 + Intune", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Highest-impact post-breach control — ties authentication to a known-good managed device. STAGED ROLLOUT MANDATORY — start report-only, monitor 1+ week minimum before enforcing. Breaking this policy locks out all unmanaged devices."}, {"section": "RECOMMENDED — DEVICE-BASED  |  Requires P1 + Intune", "id": "CA-16", "name": "Require-Admins-CompliantDevice", "category": "Device-Based", "target": "CA-IN-Admins", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Require device to be marked compliant", "license": "P1 + Intune", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Admins must perform all privileged actions from a managed compliant device. No admin work from personal or unmanaged devices. Deploy before or alongside CA-15."}, {"section": "RECOMMENDED — DEVICE-BASED  |  Requires P1 + Intune", "id": "CA-17", "name": "Block-AllUsers-UnmanagedDevice-SensitiveApps", "category": "Device-Based", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: SharePoint Online, Exchange Online, Teams\nFilter: Device not compliant AND not Hybrid joined", "grant": "Block OR Require app protection policy (MAM)", "license": "P1 + Intune", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Scoped block on sensitive apps from unmanaged devices. MAM alternative allows BYOD access with app-level data protection without requiring full device enrollment. Good stepping stone before CA-15 full enforcement."}, {"section": "RECOMMENDED — GUEST & EXTERNAL ACCESS", "id": "CA-18", "name": "Block-GuestUsers-AdminPortals", "category": "Guest & External", "target": "CA-IN-GuestUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: Microsoft Azure Management, Intune, Microsoft 365 Defender, Microsoft Entra admin center", "grant": "Block access", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Guests should never reach admin portals. Block explicitly for all admin-adjacent surfaces. Review cloud app list per tenant — add any other sensitive admin apps specific to the org."}, {"section": "RECOMMENDED — GUEST & EXTERNAL ACCESS", "id": "CA-19", "name": "Require-GuestUsers-TermsOfUse", "category": "Guest & External", "target": "CA-IN-GuestUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Require Terms of Use acceptance", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Requires guests to accept org Terms of Use before accessing resources. Entra Terms of Use feature. Creates an audit trail of guest acceptance. Configure ToU document in Entra ID → Identity Governance → Terms of use."}, {"section": "RECOMMENDED — GUEST & EXTERNAL ACCESS", "id": "CA-20", "name": "Session-GuestUsers-RestrictedAccess", "category": "Guest & External", "target": "CA-IN-GuestUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps OR scoped to sensitive apps", "grant": "Use Conditional Access App Control (MCAS session policy)", "license": "P1 + MCAS", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Routes guest sessions through Defender for Cloud Apps for monitoring, DLP enforcement, and download controls. Requires Defender for Cloud Apps license. Configure session policy in MCAS to monitor and optionally block downloads from unmanaged devices."}, {"section": "RECOMMENDED — SESSION & TOKEN CONTROLS", "id": "CA-21", "name": "Session-AllUsers-SignInFrequency", "category": "Session & Token", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps (or scope to sensitive apps)", "grant": "Sign-in frequency: 1 hour (sensitive apps) / 8 hours (standard)", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Critical post-breach. Persistent tokens are heavily abused after harvest — stolen tokens expire quickly under this policy. 1 hour for SharePoint, Exchange, Teams. 8 hours for general apps. Tune based on user feedback."}, {"section": "RECOMMENDED — SESSION & TOKEN CONTROLS", "id": "CA-22", "name": "Session-AllUsers-PersistentBrowserBlock", "category": "Session & Token", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Persistent browser session: Never persistent", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Prevents 'Stay signed in' browser sessions. Pair with CA-21 for comprehensive token hardening. Users will need to sign in again after closing browser — set user expectations before deploying."}, {"section": "RECOMMENDED — SESSION & TOKEN CONTROLS", "id": "CA-23", "name": "Require-AllUsers-TokenProtection", "category": "Session & Token", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass, CA-EX-Exclusions-TokenProtection", "apps": "Cloud apps: Exchange Online, SharePoint Online (start scoped — expand gradually)", "grant": "Require token protection (token binding)", "license": "P1", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "⚠️ VERIFY GA STATUS IN TENANT before deploying — Token Protection was in preview as of late 2024 and GA rollout is ongoing. Binds tokens to the specific device they were issued to — stolen tokens cannot be replayed from a different device. Start scoped to Exchange/SharePoint. Some legacy clients do not support token binding and will be blocked."}, {"section": "RECOMMENDED — SESSION & TOKEN CONTROLS", "id": "CA-24", "name": "Session-AllUsers-ContinuousAccessEvaluation", "category": "Session & Token", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: All cloud apps", "grant": "Customize continuous access evaluation: Strictly enforce location policies", "license": "P1", "order": "—", "status": "Assess", "report_only": "No", "notes": "Enables CAE — revokes tokens in near real-time (minutes vs hours) when policy changes or risk is detected. One of the strongest post-breach controls. Configure at tenant level AND enable strict enforcement in policy session settings."}, {"section": "RECOMMENDED — SESSION & TOKEN CONTROLS", "id": "CA-25", "name": "Session-AllUsers-SensitiveApps-AppControl", "category": "Session & Token", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: SharePoint Online, Exchange Online, Teams", "grant": "Use Conditional Access App Control: Monitor + block download on unmanaged", "license": "MCAS", "order": "—", "status": "Assess", "report_only": "Yes", "notes": "Routes sensitive app sessions through Defender for Cloud Apps. Blocks data exfiltration via download on unmanaged devices without blocking access entirely. Requires MCAS license and app onboarding in the MCAS portal."}, {"section": "POST-BREACH / INCIDENT RESPONSE  |  Runbook policies — activate during IR", "id": "CA-26", "name": "Block-AllUsers-HighRiskSignIn-Enforce", "category": "Post-Breach / IR", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Sign-in risk: High (Identity Protection)", "grant": "Block access — immediate enforcement, no grace period", "license": "P2 ⚠️", "order": "IR only", "status": "Runbook", "report_only": "No", "notes": "IR escalation of CA-08. During active incident: enable immediately with no report-only phase. Blocks all high-risk sign-in attempts in real time. Requires P2 — if not licensed, use named location blocks and account disablement as compensating controls."}, {"section": "POST-BREACH / INCIDENT RESPONSE  |  Runbook policies — activate during IR", "id": "CA-27", "name": "Block-SpecificUser-AllApps", "category": "Post-Breach / IR", "target": "Specific compromised user (add directly by UPN)", "exclude": "—", "apps": "Cloud apps: All cloud apps", "grant": "Block access", "license": "P1", "order": "IR only", "status": "Runbook", "report_only": "No", "notes": "Incident response tool — not a standing policy. Immediately blocks a specific compromised account. Add user directly to policy (not via group) for speed. Also revoke refresh tokens: Revoke-MgUserSignInSession -UserId [UPN]. Document activation time in IR timeline."}, {"section": "POST-BREACH / INCIDENT RESPONSE  |  Runbook policies — activate during IR", "id": "CA-28", "name": "Require-AllUsers-MFA-Reregistration", "category": "Post-Breach / IR", "target": "CA-IN-AllUsers", "exclude": "CA-EX-BreakGlass", "apps": "Cloud apps: Microsoft Security Info registration\n(User Actions: Register security information)", "grant": "Require MFA + Require trusted location OR compliant device to register new security info", "license": "P1", "order": "IR only", "status": "Runbook", "report_only": "No", "notes": "Post-breach: forces all users to re-register MFA methods from a trusted location or compliant device. Invalidates any attacker-registered MFA methods. Activate after resetting all user passwords. Combine with forcing re-registration in Entra: set 'Require re-register' to 0 days."}], "ca_config": [{"section": "PREREQUISITES — Complete before deploying any CA policy", "id": "PRE-01", "name": "Connect to Microsoft Graph PowerShell", "category": "PREREQ", "portal": "Not a portal step — run locally before any PowerShell commands.\n1. Install module: Install-Module Microsoft.Graph -Force\n2. Connect with required scopes\n3. Verify connection", "powershell": "# Install:\nInstall-Module Microsoft.Graph -Force -AllowClobber\n\n# Connect (all CA scopes):\nConnect-MgGraph -Scopes 'Policy.ReadWrite.ConditionalAccess','Policy.Read.All','Directory.Read.All','Agreement.ReadWrite.All','Application.Read.All'\n\n# Verify:\nGet-MgContext | Select Account, Scopes", "groups": "None — prerequisite step", "gotchas": "Run this before any other PowerShell command on this sheet. The Microsoft.Graph module replaces the deprecated AzureAD module. Never use AzureAD or MSOnline modules for new CA work — they are deprecated and will stop working."}, {"section": "PREREQUISITES — Complete before deploying any CA policy", "id": "PRE-02", "name": "Create Break Glass accounts", "category": "PREREQ", "portal": "entra.microsoft.com → Users → New user\n1. Create 2 cloud-only accounts (e.g. breakglass1@contoso.com)\n2. Assign Global Administrator role\n3. Set strong password (20+ chars, store in physical safe)\n4. Exclude from ALL MFA policies\n5. Configure monitoring alert on any sign-in\n6. Verify sign-in works BEFORE deploying any CA policy", "powershell": "# Create break glass account:\n$BG = New-MgUser -DisplayName 'Break Glass 1' -UserPrincipalName 'breakglass1@contoso.com' -PasswordProfile @{Password='[STRONG-PASSWORD]'; ForceChangePasswordNextSignIn=$false} -AccountEnabled $true -MailNickname 'breakglass1'\n\n# Assign Global Admin role:\n$RoleId = (Get-MgDirectoryRole | Where DisplayName -eq 'Global Administrator').Id\nNew-MgDirectoryRoleMember -DirectoryRoleId $RoleId -BodyParameter @{\"@odata.id\"=\"https://graph.microsoft.com/v1.0/directoryObjects/$($BG.Id)\"}", "groups": "CA-EX-BreakGlass", "gotchas": "NEVER skip break glass creation. If CA policies lock out all accounts and break glass doesn't exist, tenant recovery requires a Microsoft support ticket which can take hours. Minimum 2 accounts. Cloud-only (not synced from on-prem). No MFA registered. Credentials in a physical safe, not a password manager."}, {"section": "PREREQUISITES — Complete before deploying any CA policy", "id": "PRE-03", "name": "Create all standard CA groups", "category": "PREREQ", "portal": "entra.microsoft.com → Groups → New group\nCreate each group as Security type, Assigned membership.\nSee Standard Groups tab for full list.\nMinimum before any policy deployment:\n1. CA-EX-BreakGlass\n2. CA-IN-AllUsers\n3. CA-EX-ServiceAccounts\n4. CA-EX-LegacyDevices", "powershell": "# Create group:\nNew-MgGroup -DisplayName 'CA-EX-BreakGlass' -MailEnabled $false -SecurityEnabled $true -MailNickname 'CA-EX-BreakGlass' -GroupTypes @()\n\n# Add member to group:\n$GroupId = (Get-MgGroup -Filter \"DisplayName eq 'CA-EX-BreakGlass'\").Id\n$UserId  = (Get-MgUser -Filter \"UserPrincipalName eq 'breakglass1@contoso.com'\").Id\nNew-MgGroupMember -GroupId $GroupId -DirectoryObjectId $UserId\n\n# Verify membership:\nGet-MgGroupMember -GroupId $GroupId | Select Id", "groups": "CA-EX-BreakGlass\nCA-IN-AllUsers\nCA-EX-ServiceAccounts\nCA-EX-LegacyDevices\nCA-IN-Admins\nCA-IN-GuestUsers\nCA-EX-Exclusions-GeoIP\nCA-EX-Exclusions-DeviceCodeFlow", "gotchas": "Create ALL groups before creating any policies. Policies that reference non-existent groups will fail silently or not save. Group creation takes a few minutes to replicate — wait before assigning to policies."}, {"section": "PREREQUISITES — Complete before deploying any CA policy", "id": "PRE-04", "name": "Create Named Locations (GeoIP allowlist)", "category": "PREREQ", "portal": "entra.microsoft.com → Protection → Conditional Access → Named locations → + Countries location\n1. Name: 'Approved Countries — [TenantName]'\n2. Select all countries the org operates in\n3. Check 'Include unknown countries/regions': No\n4. Save\n\nFor trusted IP ranges (corporate network):\n→ + IP ranges location\n1. Name: 'Corporate Network — [TenantName]'\n2. Add all corporate IP ranges (IPv4/IPv6)\n3. Mark as Trusted Location: Yes", "powershell": "# Create country-based named location:\n$Params = @{\n  '@odata.type' = '#microsoft.graph.countryNamedLocation'\n  displayName = 'Approved Countries'\n  countriesAndRegions = @('US','CA','GB','AU')\n  includeUnknownCountriesAndRegions = $false\n}\nNew-MgIdentityConditionalAccessNamedLocation -BodyParameter $Params\n\n# List named locations:\nGet-MgIdentityConditionalAccessNamedLocation | Select DisplayName, Id", "groups": "Used by CA-05\nUsed by CA-24 (CAE)", "gotchas": "Build the named locations list BEFORE creating CA-05. Deploying the geo-block without named locations blocks everyone including internal users. Country list must cover all locations where employees legitimately work — remote workers, travelers, international offices. Review and update quarterly."}, {"section": "PREREQUISITES — Complete before deploying any CA policy", "id": "PRE-05", "name": "Disable Security Defaults", "category": "PREREQ", "portal": "entra.microsoft.com → Overview → Properties → Manage Security Defaults\n→ Toggle Security Defaults: Disabled\n→ Reason: My organization is using Conditional Access\n→ Save\n\nWARNING: Disabling Security Defaults removes baseline MFA enforcement. Deploy CA-03 immediately after or simultaneously.", "powershell": "# Check current state:\nGet-MgPolicyIdentitySecurityDefaultEnforcementPolicy | Select IsEnabled\n\n# Disable Security Defaults:\nUpdate-MgPolicyIdentitySecurityDefaultEnforcementPolicy -IsEnabled $false", "groups": "None — tenant-wide setting", "gotchas": "Security Defaults and Conditional Access are MUTUALLY EXCLUSIVE. Running both simultaneously causes unpredictable behavior — double MFA prompts, policy conflicts, unexpected blocks. Disable Security Defaults BEFORE or at the exact same time as enabling CA policies. There is a window of no MFA enforcement between the two — minimize it."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-01", "name": "Block-AllUsers-LegacyAuthentication", "category": "MANDATORY", "portal": "entra.microsoft.com → Protection → Conditional Access → + New policy\n1. Name: CA-01-Block-AllUsers-LegacyAuthentication\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-LegacyDevices\n3. Target resources: All cloud apps\n4. Conditions → Client apps: Select 'Exchange ActiveSync clients' + 'Other clients'\n5. Grant: Block access\n6. Enable policy: Report-only first, then On", "powershell": "# Create via Graph API:\n$Policy = @{\n  displayName = 'CA-01-Block-AllUsers-LegacyAuthentication'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-LegacyDevices-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    clientAppTypes = @('exchangeActiveSync','other')\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-LegacyDevices", "gotchas": "The Client apps condition must explicitly select 'Exchange ActiveSync clients' AND 'Other clients' — not just one. Missing either leaves a gap. 'Browser' and 'Mobile apps and desktop clients' (modern auth) should NOT be selected here — those are covered by other policies."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-02", "name": "Allow-LegacyDevices-LegacyAuthentication", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-02-Allow-LegacyDevices-LegacyAuthentication\n2. Users: Include → CA-EX-LegacyDevices only | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Conditions → Client apps: Exchange ActiveSync + Other clients\n5. Grant: Allow access (no controls)\n6. Enable policy: On (deploy alongside CA-01)", "powershell": "# Create allow policy for legacy devices:\n$Policy = @{\n  displayName = 'CA-02-Allow-LegacyDevices-LegacyAuthentication'\n  state = 'enabled'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-EX-LegacyDevices-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    clientAppTypes = @('exchangeActiveSync','other')\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @()\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-LegacyDevices\nCA-EX-BreakGlass", "gotchas": "This policy must be deployed AT THE SAME TIME as CA-01 or CA-01 will block legitimate legacy devices before exceptions are in place. CA-02 only applies to users IN CA-EX-LegacyDevices — it does not create a broad exception. Empty CA-EX-LegacyDevices group = no impact from CA-02."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-03", "name": "Require-AllUsers-MFA", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-03-Require-AllUsers-MFA\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-ServiceAccounts\n3. Target resources: All cloud apps\n4. Grant: Require multi-factor authentication\n5. Enable policy: Report-only first (48-72hrs), then On", "powershell": "$Policy = @{\n  displayName = 'CA-03-Require-AllUsers-MFA'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-ServiceAccounts-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-ServiceAccounts", "gotchas": "Highest user-impact policy — ensure helpdesk is prepared for MFA registration calls before enforcing. Users must have MFA methods registered before enforcement or they will be locked out. Run MFA registration report first: Get-MgReportAuthenticationMethodUserRegistrationDetail. Allow 48-72hrs in report-only to identify unregistered users."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-04", "name": "Block-AllUsers-DeviceCodeFlow", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-04-Block-AllUsers-DeviceCodeFlow\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-Exclusions-DeviceCodeFlow\n3. Target resources: All cloud apps\n4. Conditions → Authentication flows: Device code flow\n5. Grant: Block access\n6. Enable policy: Report-only first, then On", "powershell": "$Policy = @{\n  displayName = 'CA-04-Block-AllUsers-DeviceCodeFlow'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-Exclusions-DeviceCodeFlow-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    authenticationFlows = @{ transferMethods = 'deviceCodeFlow' }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-Exclusions-DeviceCodeFlow", "gotchas": "Authentication flows condition may not be visible in older tenants — look for it under Conditions → Authentication flows. If not present, the tenant may need feature flag enablement. Device code flow is the primary mechanism in AiTM phishing kits — this block is post-breach critical."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-05", "name": "Block-AllUsers-UnknownGeoIP", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-05-Block-AllUsers-UnknownGeoIP\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-Exclusions-GeoIP\n3. Target resources: All cloud apps\n4. Conditions → Locations: Include → Any location | Exclude → [Approved Countries named location]\n5. Grant: Block access\n6. Enable policy: Report-only first (review for travel/remote workers), then On", "powershell": "$NamedLocId = (Get-MgIdentityConditionalAccessNamedLocation | Where DisplayName -eq 'Approved Countries').Id\n\n$Policy = @{\n  displayName = 'CA-05-Block-AllUsers-UnknownGeoIP'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-Exclusions-GeoIP-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    locations = @{\n      includeLocations = @('All')\n      excludeLocations = @($NamedLocId)\n    }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-Exclusions-GeoIP\nNamed location: Approved Countries", "gotchas": "Named location MUST exist and be populated before deploying. Deploy CA-05 AFTER the named location is saved and confirmed. Common mistake: including 'All trusted locations' in the exclude list — this bypasses the geo-block for any IP marked trusted. Exclude the named countries location specifically, not all trusted locations."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-06", "name": "Require-AllUsers-MFA-EntraJoinedDevices", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-06-Require-AllUsers-MFA-EntraJoinedDevices\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-ServiceAccounts\n3. Target resources: All cloud apps\n4. Conditions → Filter for devices: Include filtered devices → Rule: device.joinType -eq 'AzureADJoined' -or device.joinType -eq 'ServerAD'\n5. Grant: Require MFA\n6. Enable policy: Report-only first, then On", "powershell": "$Policy = @{\n  displayName = 'CA-06-Require-AllUsers-MFA-EntraJoinedDevices'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-ServiceAccounts-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    devices = @{\n      deviceFilter = @{\n        mode = 'includeDevices'\n        rule = 'device.joinType -eq \"AzureADJoined\" -or device.joinType -eq \"ServerAD\"'\n      }\n    }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-ServiceAccounts", "gotchas": "Device filter syntax is case-sensitive. AzureADJoined = Entra ID joined. ServerAD = Hybrid Entra joined. This policy ensures device join status alone does not grant access without MFA — closes the gap where compliant device grant might bypass MFA in some policy combinations."}, {"section": "MANDATORY BASELINE — CA-01 through CA-07", "id": "CA-07", "name": "Require-GuestUsers-MFA", "category": "MANDATORY", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-07-Require-GuestUsers-MFA\n2. Users: Include → CA-IN-GuestUsers | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Grant: Require MFA\n5. Enable policy: Report-only first, then On", "powershell": "$GuestGroupId = (Get-MgGroup -Filter \"DisplayName eq 'CA-IN-GuestUsers'\").Id\n\n$Policy = @{\n  displayName = 'CA-07-Require-GuestUsers-MFA'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @($GuestGroupId)\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-GuestUsers\nCA-EX-BreakGlass", "gotchas": "Alternatively scope by user type instead of group: includeGuestsOrExternalUsers with guestOrExternalUserTypes = 'internalGuest,b2bCollaborationGuest,b2bCollaborationMember'. Group-based is simpler. Confirm CA-IN-GuestUsers is populated — an empty group means no guests are covered."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-08", "name": "Block-AllUsers-HighRiskSignIn", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-08-Block-AllUsers-HighRiskSignIn\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Conditions → Sign-in risk: High\n5. Grant: Block access\n6. Enable policy: Report-only first, then On\n\nRequires: Entra ID P2 / Identity Protection", "powershell": "$Policy = @{\n  displayName = 'CA-08-Block-AllUsers-HighRiskSignIn'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    signInRiskLevels = @('high')\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "Sign-in risk condition only appears if tenant has Entra ID P2 license. If condition is not visible, the license is not provisioned. Do not approximate with other conditions — document as a gap and recommend P2 licensing."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-09", "name": "Block-AllUsers-UserRisk-High", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-09-Block-AllUsers-UserRisk-High\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Conditions → User risk: High\n5. Grant: Block access OR Require MFA + password change\n6. Enable policy: Report-only first, then On\n\nRequires: Entra ID P2", "powershell": "$Policy = @{\n  displayName = 'CA-09-Block-AllUsers-UserRisk-High'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n    userRiskLevels = @('high')\n  }\n  grantControls = @{\n    operator = 'AND'\n    builtInControls = @('mfa','passwordChange')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "passwordChange grant requires SSPR to be enabled — if SSPR is disabled, users cannot complete the remediation flow and will be permanently blocked. Confirm SSPR is enabled and tested before deploying with passwordChange grant."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-10", "name": "Require-AllUsers-UserRisk-Medium", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-10-Require-AllUsers-UserRisk-Medium\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Conditions → User risk: Medium\n4. Grant: Require MFA + Require password change\n5. Enable policy: Report-only, then On\n\nRequires: Entra ID P2", "powershell": "$Policy = @{\n  displayName = 'CA-10-Require-AllUsers-UserRisk-Medium'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{ includeUsers = @('All'); excludeGroups = @('[CA-EX-BreakGlass-GroupId]') }\n    applications = @{ includeApplications = @('All') }\n    userRiskLevels = @('medium')\n  }\n  grantControls = @{\n    operator = 'AND'\n    builtInControls = @('mfa','passwordChange')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "Same SSPR dependency as CA-09. Medium risk is more common than high — expect more user impact. Monitor SSPR completion rates after enabling to confirm users can self-remediate successfully."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-11", "name": "Require-AllUsers-SignInRisk-Medium", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-11-Require-AllUsers-SignInRisk-Medium\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Conditions → Sign-in risk: Medium\n4. Grant: Require MFA\n5. Enable policy: Report-only, then On\n\nRequires: Entra ID P2", "powershell": "$Policy = @{\n  displayName = 'CA-11-Require-AllUsers-SignInRisk-Medium'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{ includeUsers = @('All'); excludeGroups = @('[CA-EX-BreakGlass-GroupId]') }\n    applications = @{ includeApplications = @('All') }\n    signInRiskLevels = @('medium')\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "Medium sign-in risk is relatively common in tenants with traveling users or VPN usage. Monitor the report-only logs carefully before enforcing — high false positive rate may indicate anomaly detection tuning is needed in Identity Protection."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-12", "name": "Require-Admins-MFA", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-12-Require-Admins-MFA\n2. Users: Include → CA-IN-Admins OR select Directory roles directly | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Grant: Require MFA\n5. Enable policy: Report-only, then On", "powershell": "$AdminGroupId = (Get-MgGroup -Filter \"DisplayName eq 'CA-IN-Admins'\").Id\n\n$Policy = @{\n  displayName = 'CA-12-Require-Admins-MFA'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @($AdminGroupId)\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-Admins\nCA-EX-BreakGlass", "gotchas": "Alternatively target by Directory roles instead of group: use includeRoles with role IDs. Role-based targeting automatically captures new admins without manual group management. Get role IDs: Get-MgDirectoryRole | Select DisplayName, Id. Trade-off: role-based policies are harder to audit than group-based."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-13", "name": "Require-Admins-PhishingResistantMFA", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-13-Require-Admins-PhishingResistantMFA\n2. Users: Include → CA-IN-Admins | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Grant: Require authentication strength → Phishing-resistant MFA\n5. Enable policy: Report-only until FIDO2/WHfB keys deployed, then On", "powershell": "# Get auth strength ID for phishing-resistant:\n$AuthStrength = Get-MgPolicyAuthenticationStrengthPolicy | Where DisplayName -eq 'Phishing-resistant MFA'\n\n$Policy = @{\n  displayName = 'CA-13-Require-Admins-PhishingResistantMFA'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-IN-Admins-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    authenticationStrength = @{ id = $AuthStrength.Id }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-Admins\nCA-EX-BreakGlass", "gotchas": "Do NOT enforce this policy until FIDO2 keys or Windows Hello for Business is deployed for all admins. Enforcing without hardware keys locks out all admins. Keep in report-only and use it to measure readiness — monitor how many admin sign-ins would be blocked before switching to enforced."}, {"section": "RECOMMENDED — IDENTITY & MFA — CA-08 through CA-14", "id": "CA-14", "name": "Require-AllUsers-AzurePortal-MFA", "category": "Identity & MFA", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-14-Require-AllUsers-AzurePortal-MFA\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: Select apps → Microsoft Azure Management (app ID: 797f4846-ba00-4fd7-ba43-dac1f8f63013)\n4. Grant: Require MFA\n5. Enable policy: Report-only, then On", "powershell": "# Azure Management app ID:\n$AzureMgmtAppId = '797f4846-ba00-4fd7-ba43-dac1f8f63013'\n\n$Policy = @{\n  displayName = 'CA-14-Require-AllUsers-AzurePortal-MFA'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @($AzureMgmtAppId) }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('mfa')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "The Microsoft Azure Management app ID (797f4846-ba00-4fd7-ba43-dac1f8f63013) covers Azure Portal, Azure CLI, Azure PowerShell, and ARM API. This is a fixed well-known app ID — the same across all tenants. Scoping to this app ID is more precise than trying to enumerate individual Azure services."}, {"section": "RECOMMENDED — DEVICE-BASED — CA-15 through CA-17", "id": "CA-15", "name": "Require-AllUsers-CompliantDevice", "category": "Device-Based", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-15-Require-AllUsers-CompliantDevice\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-Exclusions-CompliantDevice\n3. Target resources: All cloud apps\n4. Grant: Require device to be marked as compliant OR Require Hybrid Azure AD joined device\n5. Enable policy: Report-only MINIMUM 1 WEEK, then On\n\nWARNING: Enforcing this without sufficient Intune enrollment will lock out all unmanaged devices.", "powershell": "$Policy = @{\n  displayName = 'CA-15-Require-AllUsers-CompliantDevice'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-Exclusions-CompliantDevice-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('compliantDevice','domainJoinedDevice')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-Exclusions-CompliantDevice", "gotchas": "HIGHEST RISK POLICY TO ENFORCE. Check Intune enrollment status before enforcing: Get-MgDeviceManagementManagedDevice | Group-Object ComplianceState. Every non-enrolled device will lose access. Run report-only for at least 1 week, review sign-in logs daily, enroll remaining devices, then enforce in waves by department."}, {"section": "RECOMMENDED — DEVICE-BASED — CA-15 through CA-17", "id": "CA-16", "name": "Require-Admins-CompliantDevice", "category": "Device-Based", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-16-Require-Admins-CompliantDevice\n2. Users: Include → CA-IN-Admins | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Grant: Require compliant device\n5. Enable policy: Report-only, then On", "powershell": "$Policy = @{\n  displayName = 'CA-16-Require-Admins-CompliantDevice'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-IN-Admins-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('compliantDevice')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-Admins\nCA-EX-BreakGlass", "gotchas": "Admin devices must be Intune-enrolled and compliant before enforcing. Confirm all admin accounts have an enrolled compliant device — check: Get-MgDeviceManagementManagedDevice -Filter \"userPrincipalName eq 'admin@contoso.com'\" | Select DeviceName, ComplianceState."}, {"section": "RECOMMENDED — DEVICE-BASED — CA-15 through CA-17", "id": "CA-17", "name": "Block-AllUsers-UnmanagedDevice-SensitiveApps", "category": "Device-Based", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-17-Block-AllUsers-UnmanagedDevice-SensitiveApps\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: Select apps → SharePoint Online, Exchange Online, Microsoft Teams\n4. Conditions → Filter for devices: Include → device.isCompliant -ne True -and device.trustType -ne 'ServerAD'\n5. Grant: Block access OR Require app protection policy\n6. Enable policy: Report-only first", "powershell": "$Policy = @{\n  displayName = 'CA-17-Block-AllUsers-UnmanagedDevice-SensitiveApps'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{\n      includeApplications = @(\n        '00000003-0000-0ff1-ce00-000000000000',\n        '00000002-0000-0ff1-ce00-000000000000',\n        '1fec8e78-bce4-4aaf-ab1b-5451cc387264'\n      )\n    }\n    devices = @{\n      deviceFilter = @{\n        mode = 'includeDevices'\n        rule = 'device.isCompliant -ne True -and device.trustType -ne \"ServerAD\"'\n      }\n    }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "App IDs: SharePoint=00000003-0000-0ff1-ce00-000000000000, Exchange=00000002-0000-0ff1-ce00-000000000000, Teams=1fec8e78-bce4-4aaf-ab1b-5451cc387264. These are well-known fixed app IDs consistent across all tenants. The device filter uses -ne (not equal) to target unmanaged devices rather than targeting managed ones."}, {"section": "RECOMMENDED — GUEST & EXTERNAL — CA-18 through CA-20", "id": "CA-18", "name": "Block-GuestUsers-AdminPortals", "category": "Guest & External", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-18-Block-GuestUsers-AdminPortals\n2. Users: Include → CA-IN-GuestUsers | Exclude → CA-EX-BreakGlass\n3. Target resources: Select apps → Microsoft Azure Management, Microsoft Entra admin center, Microsoft Intune, Microsoft 365 Defender\n4. Grant: Block access\n5. Enable policy: On (no report-only needed — guests should never reach admin portals)", "powershell": "$AdminApps = @(\n  '797f4846-ba00-4fd7-ba43-dac1f8f63013',  # Azure Mgmt\n  'c44b4083-3bb0-49c1-b47d-974e53cbdf3c',  # Entra Admin Center (corrected from 00000007)\n  '0000000a-0000-0000-c000-000000000000',  # Intune\n  'fc780465-2017-40d4-a0c5-307022471b92'   # M365 Defender\n)\n$Policy = @{\n  displayName = 'CA-18-Block-GuestUsers-AdminPortals'\n  state = 'enabled'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-IN-GuestUsers-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = $AdminApps }\n  }\n  grantControls = @{\n    operator = 'OR'\n    builtInControls = @('block')\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-GuestUsers\nCA-EX-BreakGlass", "gotchas": "This policy can be enforced immediately without report-only — there is no legitimate reason for a guest to access admin portals. Add any additional admin-adjacent apps specific to the org (e.g. third-party SIEM portals, privileged access workstations)."}, {"section": "RECOMMENDED — GUEST & EXTERNAL — CA-18 through CA-20", "id": "CA-19", "name": "Require-GuestUsers-TermsOfUse", "category": "Guest & External", "portal": "Step 1 — Create Terms of Use document:\nentra.microsoft.com → Identity Governance → Terms of use → + New terms\n1. Upload PDF of org Terms of Use\n2. Set language, require re-acceptance on change\n3. Save and note the ToU ID\n\nStep 2 — Create CA policy:\n1. Name: CA-19-Require-GuestUsers-TermsOfUse\n2. Users: Include → CA-IN-GuestUsers | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Grant: Require Terms of Use → select created ToU\n5. Enable: Report-only, then On", "powershell": "# Get Terms of Use ID:\n$TouId = (Get-MgAgreement | Where DisplayName -eq 'Guest Terms of Use').Id\n\n$Policy = @{\n  displayName = 'CA-19-Require-GuestUsers-TermsOfUse'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-IN-GuestUsers-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  grantControls = @{\n    operator = 'OR'\n    termsOfUse = @($TouId)\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-GuestUsers\nCA-EX-BreakGlass\nTerms of Use document (create first)", "gotchas": "The Terms of Use document must be created BEFORE the CA policy. ToU requires a PDF upload — prepare the document in advance. Guests will see a full-screen acceptance prompt on first sign-in. Re-acceptance can be triggered by updating the ToU document version."}, {"section": "RECOMMENDED — GUEST & EXTERNAL — CA-18 through CA-20", "id": "CA-20", "name": "Session-GuestUsers-RestrictedAccess", "category": "Guest & External", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-20-Session-GuestUsers-RestrictedAccess\n2. Users: Include → CA-IN-GuestUsers | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Session: Use Conditional Access App Control → Use custom policy\n5. Enable policy: Report-only, then On\n\nThen configure session policy in:\nMicrosoft Defender for Cloud Apps portal → Policies → Conditional Access App Control", "powershell": "$Policy = @{\n  displayName = 'CA-20-Session-GuestUsers-RestrictedAccess'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeGroups = @('[CA-IN-GuestUsers-GroupId]')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  sessionControls = @{\n    cloudAppSecurity = @{\n      isEnabled = $true\n      cloudAppSecurityType = 'mcasConfigured'\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-IN-GuestUsers\nCA-EX-BreakGlass", "gotchas": "This policy only routes the session through MCAS — the actual session controls (monitor, block download, etc.) are configured in the Defender for Cloud Apps portal separately. Without configuring MCAS session policies, the CA policy does nothing beyond routing. Requires Defender for Cloud Apps license."}, {"section": "RECOMMENDED — SESSION & TOKEN — CA-21 through CA-25", "id": "CA-21", "name": "Session-AllUsers-SignInFrequency", "category": "Session & Token", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-21-Session-AllUsers-SignInFrequency\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps (or scope to SharePoint, Exchange, Teams)\n4. Session: Sign-in frequency → Periodic reauthentication → 8 hours\n5. Enable policy: Report-only, then On\n\nFor sensitive apps: create a separate policy with 1 hour frequency scoped to SharePoint/Exchange/Teams", "powershell": "$Policy = @{\n  displayName = 'CA-21-Session-AllUsers-SignInFrequency'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  sessionControls = @{\n    signInFrequency = @{\n      isEnabled = $true\n      type = 'hours'\n      value = 8\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "Sign-in frequency applies to browser sessions and modern auth clients. Some legacy clients ignore this setting. Users will see more frequent sign-in prompts — Windows Hello and passwordless methods reduce friction significantly. Combine with CA-22 (persistent browser block) for full effect."}, {"section": "RECOMMENDED — SESSION & TOKEN — CA-21 through CA-25", "id": "CA-22", "name": "Session-AllUsers-PersistentBrowserBlock", "category": "Session & Token", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-22-Session-AllUsers-PersistentBrowserBlock\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Session: Persistent browser session → Never persistent\n5. Enable policy: Report-only, then On", "powershell": "$Policy = @{\n  displayName = 'CA-22-Session-AllUsers-PersistentBrowserBlock'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  sessionControls = @{\n    persistentBrowser = @{\n      isEnabled = $true\n      mode = 'never'\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "This setting overrides the 'Stay signed in?' prompt configured in Entra branding. If both are configured, CA policy wins. Also disable the Stay Signed In prompt in Entra Company Branding for belt-and-suspenders. Affects browser sessions only — desktop apps use refresh tokens which are governed by token lifetime policies."}, {"section": "RECOMMENDED — SESSION & TOKEN — CA-21 through CA-25", "id": "CA-23", "name": "Require-AllUsers-TokenProtection", "category": "Session & Token", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-23-Require-AllUsers-TokenProtection\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass, CA-EX-Exclusions-TokenProtection\n3. Target resources: Exchange Online, SharePoint Online (start scoped)\n4. Session: Require token protection for sign-in sessions\n5. Enable policy: Report-only FIRST — verify GA status in tenant\n\n⚠️ VERIFY GA STATUS before deploying — check Microsoft roadmap for current availability", "powershell": "$Policy = @{\n  displayName = 'CA-23-Require-AllUsers-TokenProtection'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]','[CA-EX-Exclusions-TokenProtection-GroupId]')\n    }\n    applications = @{\n      includeApplications = @(\n        '00000002-0000-0ff1-ce00-000000000000',\n        '00000003-0000-0ff1-ce00-000000000000'\n      )\n    }\n  }\n  sessionControls = @{\n    secureSignInSession = @{\n      isEnabled = $true\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nCA-EX-Exclusions-TokenProtection", "gotchas": "⚠️ Token Protection was in preview as of late 2024. VERIFY current GA status in your tenant before deploying. Clients that do not support token binding will fail authentication entirely — this is not a soft failure. Start with Exchange Online only, monitor for failures, then expand. Legacy clients and some Office versions do not support token binding."}, {"section": "RECOMMENDED — SESSION & TOKEN — CA-21 through CA-25", "id": "CA-24", "name": "Session-AllUsers-ContinuousAccessEvaluation", "category": "Session & Token", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-24-Session-AllUsers-ContinuousAccessEvaluation\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: All cloud apps\n4. Session: Customize continuous access evaluation → Strictly enforce location policies\n5. Enable policy: On\n\nAlso enable tenant-wide CAE:\nentra.microsoft.com → Security → Continuous access evaluation", "powershell": "$Policy = @{\n  displayName = 'CA-24-Session-AllUsers-ContinuousAccessEvaluation'\n  state = 'enabled'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{ includeApplications = @('All') }\n  }\n  sessionControls = @{\n    continuousAccessEvaluation = @{\n      mode = 'strictLocation'\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "CAE strictLocation mode means token revocation happens within minutes of leaving an approved location rather than waiting for token expiry (up to 1 hour). Users on mobile/VPN switching networks may experience more frequent re-auth prompts. CAE is only effective for CAE-capable clients (modern Outlook, Teams, SharePoint in browser)."}, {"section": "RECOMMENDED — SESSION & TOKEN — CA-21 through CA-25", "id": "CA-25", "name": "Session-AllUsers-SensitiveApps-AppControl", "category": "Session & Token", "portal": "entra.microsoft.com → Conditional Access → + New policy\n1. Name: CA-25-Session-AllUsers-SensitiveApps-AppControl\n2. Users: Include → All users | Exclude → CA-EX-BreakGlass\n3. Target resources: SharePoint Online, Exchange Online, Teams\n4. Session: Use Conditional Access App Control → Block downloads (or Monitor only to start)\n5. Enable policy: Report-only / Monitor first\n\nConfigure app control policy in Defender for Cloud Apps portal separately.", "powershell": "$Policy = @{\n  displayName = 'CA-25-Session-AllUsers-SensitiveApps-AppControl'\n  state = 'enabledForReportingButNotEnforced'\n  conditions = @{\n    users = @{\n      includeUsers = @('All')\n      excludeGroups = @('[CA-EX-BreakGlass-GroupId]')\n    }\n    applications = @{\n      includeApplications = @(\n        '00000003-0000-0ff1-ce00-000000000000',\n        '00000002-0000-0ff1-ce00-000000000000',\n        '1fec8e78-bce4-4aaf-ab1b-5451cc387264'\n      )\n    }\n  }\n  sessionControls = @{\n    cloudAppSecurity = @{\n      isEnabled = $true\n      cloudAppSecurityType = 'blockDownloads'\n    }\n  }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass", "gotchas": "cloudAppSecurityType options: monitorOnly, blockDownloads, mcasConfigured. Start with monitorOnly to assess impact, then move to blockDownloads. blockDownloads prevents file downloads from unmanaged devices in browser sessions — users can still view content online. Desktop sync clients are not affected by session controls."}, {"section": "POST-BREACH / IR — CA-26 through CA-28  |  Activate during incident", "id": "CA-26", "name": "Block-AllUsers-HighRiskSignIn-Enforce", "category": "Post-Breach / IR", "portal": "INCIDENT RESPONSE — activate immediately during active breach\nentra.microsoft.com → Conditional Access → CA-08 (if exists) → change state to Enabled\nOR create new:\n1. Name: CA-26-Block-AllUsers-HighRiskSignIn-Enforce\n2. Users: All users | Exclude: CA-EX-BreakGlass only\n3. Conditions: Sign-in risk: High\n4. Grant: Block\n5. Enable: ON immediately — no report-only during IR", "powershell": "# Activate existing policy immediately:\nUpdate-MgIdentityConditionalAccessPolicy -ConditionalAccessPolicyId '[PolicyId]' -State 'enabled'\n\n# Or create and enable immediately:\n$Policy = @{\n  displayName = 'CA-26-Block-AllUsers-HighRiskSignIn-Enforce'\n  state = 'enabled'\n  conditions = @{\n    users = @{ includeUsers = @('All'); excludeGroups = @('[CA-EX-BreakGlass-GroupId]') }\n    applications = @{ includeApplications = @('All') }\n    signInRiskLevels = @('high')\n  }\n  grantControls = @{ operator = 'OR'; builtInControls = @('block') }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass only", "gotchas": "During IR: skip report-only entirely. Enable immediately. Log the activation time in the IR timeline. If P2 is not licensed, compensating controls: disable compromised account (Set-MgUser -AccountEnabled $false), revoke sessions (Revoke-MgUserSignInSession), reset password, add to named location block."}, {"section": "POST-BREACH / IR — CA-26 through CA-28  |  Activate during incident", "id": "CA-27", "name": "Block-SpecificUser-AllApps", "category": "Post-Breach / IR", "portal": "FASTEST METHOD — directly in portal:\nentra.microsoft.com → Users → [Compromised User] → Edit → Account status: Block sign-in\n\nOR via CA policy:\n1. Name: CA-27-Block-SpecificUser-AllApps\n2. Users: Include → [Specific UPN — add directly, not via group]\n3. All cloud apps\n4. Grant: Block\n5. Enable: ON immediately\n\nALSO immediately:\n→ Revoke all active sessions\n→ Reset password\n→ Review mailbox rules", "powershell": "# Fastest — block sign-in directly:\nUpdate-MgUser -UserId 'compromised@contoso.com' -AccountEnabled $false\n\n# Revoke all active sessions/tokens:\nRevoke-MgUserSignInSession -UserId 'compromised@contoso.com'\n\n# Reset password:\n$NewPwd = ConvertTo-SecureString '[TEMP-PASSWORD]' -AsPlainText -Force\nUpdate-MgUser -UserId 'compromised@contoso.com' -PasswordProfile @{Password='[TEMP-PASSWORD]'; ForceChangePasswordNextSignIn=$true}\n\n# Check for attacker-created inbox rules:\nGet-MgUserMailFolderMessageRule -UserId 'compromised@contoso.com' -MailFolderId 'inbox' | Select DisplayName, Actions", "groups": "Specific user — added directly\nCA-EX-BreakGlass", "gotchas": "Blocking sign-in via user account (Set-MgUser -AccountEnabled $false) is faster than a CA policy and doesn't require policy creation. CA policy is belt-and-suspenders. ALWAYS run Revoke-MgUserSignInSession — blocking sign-in does not revoke existing tokens. Tokens can persist for up to 1 hour without revocation."}, {"section": "POST-BREACH / IR — CA-26 through CA-28  |  Activate during incident", "id": "CA-28", "name": "Require-AllUsers-MFA-Reregistration", "category": "Post-Breach / IR", "portal": "Step 1 — Force MFA re-registration in Entra:\nentra.microsoft.com → Protection → Authentication methods → User registration details → Require re-register\nOR: Per user → Authentication methods → Require re-register MFA\n\nStep 2 — Create CA policy to protect re-registration:\n1. Name: CA-28-Require-AllUsers-MFA-Reregistration\n2. Users: All users | Exclude: CA-EX-BreakGlass\n3. User Actions: Register security information\n4. Conditions: Locations: All EXCEPT trusted/named corporate locations\n5. Grant: Block (prevent registration from untrusted locations)\n6. Enable: ON immediately during IR", "powershell": "# Force re-registration — delete existing authenticator methods per user:\n$Users = Get-MgUser -All | Select Id, UserPrincipalName\nforeach ($User in $Users) {\n  $methods = Invoke-MgGraphRequest -Method GET -Uri \"https://graph.microsoft.com/v1.0/users/$($User.Id)/authentication/microsoftAuthenticatorMethods\"\n  foreach ($method in $methods.value) {\n    Invoke-MgGraphRequest -Method DELETE -Uri \"https://graph.microsoft.com/v1.0/users/$($User.Id)/authentication/microsoftAuthenticatorMethods/$($method.id)\"\n  }\n}\n\n# Protect registration via CA policy:\n$Policy = @{\n  displayName = 'CA-28-Require-AllUsers-MFA-Reregistration'\n  state = 'enabled'\n  conditions = @{\n    users = @{ includeUsers = @('All'); excludeGroups = @('[CA-EX-BreakGlass-GroupId]') }\n    applications = @{ includeUserActions = @('urn:user:registersecurityinfo') }\n    locations = @{ includeLocations = @('All'); excludeLocations = @('[Corporate-Network-NamedLocation-Id]') }\n  }\n  grantControls = @{ operator = 'OR'; builtInControls = @('block') }\n}\nNew-MgIdentityConditionalAccessPolicy -BodyParameter $Policy", "groups": "CA-EX-BreakGlass\nNamed location: Corporate Network", "gotchas": "This is a two-step control: (1) force re-registration so attacker-registered MFA methods are invalidated, AND (2) block registration from untrusted locations so the attacker cannot re-register new methods remotely. The CA policy uses User Actions (not cloud apps) — select 'Register security information' under User Actions, not under cloud apps."}], "standard_groups": [{"section": "", "name": "CA-IN-AllUsers", "direction": "INCLUDE", "purpose": "Broad include scope for policies targeting all users", "policies": "CA-01, CA-03, CA-04, CA-05, CA-06, CA-08, CA-09, CA-10, CA-11, CA-14, CA-15, CA-17, CA-21, CA-22, CA-23, CA-24, CA-25, CA-26, CA-28", "audit": "Monthly", "notes": "Typically scoped to all member users. Verify no service accounts are inadvertently included. Dynamic membership rule: (user.userType -eq 'Member') is an option for auto-population."}, {"section": "", "name": "CA-IN-Admins", "direction": "INCLUDE", "purpose": "Privileged/admin role members", "policies": "CA-12, CA-13, CA-16", "audit": "Monthly", "notes": "Cross-reference with Entra Directory Roles. Minimum: Global Admin, Exchange Admin, SharePoint Admin, Security Admin, Compliance Admin, User Admin. Consider dynamic rule synced from role assignments."}, {"section": "", "name": "CA-IN-GuestUsers", "direction": "INCLUDE", "purpose": "External B2B guest accounts", "policies": "CA-07, CA-18, CA-19, CA-20", "audit": "Quarterly", "notes": "All B2B guests. Review for stale guest accounts — remove inactive guests older than 90 days. Can use dynamic rule: (user.userType -eq 'Guest')."}, {"section": "", "name": "CA-EX-BreakGlass", "direction": "EXCLUDE", "purpose": "Emergency access accounts — excluded from ALL policies", "policies": "ALL policies (CA-01 through CA-28)", "audit": "Monthly", "notes": "Minimum 2 accounts. Cloud-only. No MFA registered. Credentials in physical safe. Monitor sign-in logs — any sign-in = incident response trigger. Verify accounts work BEFORE deploying any CA policy."}, {"section": "", "name": "CA-EX-ServiceAccounts", "direction": "EXCLUDE", "purpose": "Non-interactive service/app accounts using legacy or cert auth", "policies": "CA-03, CA-06", "audit": "Quarterly", "notes": "Each member must have documented justification and owner. Transition to Managed Identities where possible. These accounts bypass MFA — review access permissions carefully."}, {"section": "", "name": "CA-EX-LegacyDevices", "direction": "EXCLUDE", "purpose": "Devices that cannot support modern authentication", "policies": "CA-01, CA-02", "audit": "Quarterly", "notes": "High-risk exclusion. Every member must be documented with device type, owner, and remediation timeline. Goal is to eliminate this group. CA-02 provides the scoped allow for these devices."}, {"section": "", "name": "CA-EX-Exclusions-DeviceCodeFlow", "direction": "EXCLUDE", "purpose": "Approved exceptions to the device code flow block", "policies": "CA-04", "audit": "Quarterly", "notes": "Only add with written approval. Document device type, use case, and owner. Examples: TV apps, restricted Azure CLI environments. Every member is a security risk — minimize."}, {"section": "", "name": "CA-EX-Exclusions-GeoIP", "direction": "EXCLUDE", "purpose": "Approved geo-location exceptions", "policies": "CA-05", "audit": "Monthly", "notes": "Traveling executives, remote workers in unusual locations. Time-box memberships where possible. Review monthly — stale entries create persistent geo-bypass."}, {"section": "", "name": "CA-EX-Exclusions-CompliantDevice", "direction": "EXCLUDE", "purpose": "Approved exceptions to the compliant device requirement", "policies": "CA-15", "audit": "Quarterly", "notes": "Use sparingly. Document business justification per member. Compensating controls required (e.g. MCAS session policy via CA-20/CA-25). Every member bypasses device compliance enforcement."}, {"section": "", "name": "CA-EX-Exclusions-TokenProtection", "direction": "EXCLUDE", "purpose": "Approved exceptions to the token protection requirement", "policies": "CA-23", "audit": "Quarterly", "notes": "⚠️ Token Protection may still be in preview — verify GA status before creating this group. Add only clients confirmed incompatible with token binding. Document device type, client version, and remediation timeline."}, {"section": "", "name": "CA-EX-Exclusions-[PolicyName]", "direction": "EXCLUDE", "purpose": "Per-policy exclusion template — create named copy per policy", "policies": "Specific policies as needed", "audit": "Quarterly", "notes": "TEMPLATE ROW — do not deploy as-is. Create a named copy (e.g. CA-EX-Exclusions-GeoIP) for each specific policy requiring a narrow carveout. Always prefer a specific named group over broad exclusions."}], "defender_policies": [{"section": "", "policy": "Policy Name", "type": "Policy Type", "setting": "Setting Name", "recommended": "Recommended Value", "default": "Default Value", "license": "License Req.", "applies": "Applies To", "notes": "Notes / Justification"}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Policy name", "recommended": "Hardened Anti-Phish Policy", "default": "Default", "license": "EOP", "applies": "All users / all domains", "notes": "Name clearly to distinguish from Microsoft default policy. Apply to all users or scope to all accepted domains."}, {"section": "ANTI-PHISHING POLICY", "policy": "Hardened Anti-Phish Policy", "type": "Anti-Phish", "setting": "Phishing email threshold", "recommended": "4 — Most aggressive",
