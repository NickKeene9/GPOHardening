→ Users can register applications", "ps_only": "No", "notes": "Prevents users from creating app registrations that could be used for persistence or privilege escalation. Set to No. Any legitimate app registration need should go through IT."}, {"section": "APP CONSENT & REGISTRATION", "category": "App Consent", "setting": "User consent to apps accessing company data on their behalf", "recommended": "Do not allow user consent", "default": "Allow user consent for apps from verified publishers", "where": "Entra ID Portal → Enterprise applications → Consent and permissions → User consent settings", "ps_only": "No", "notes": "Even the 'verified publishers' exception can be abused. Post-breach, set to Do Not Allow entirely. Review all existing granted consents as part of IR — compromised accounts may have granted consent to attacker-controlled apps."}, {"section": "APP CONSENT & REGISTRATION", "category": "App Consent", "setting": "Guest user app consent permissions", "recommended": "Same as member users — restrict to admin consent only", "default": "Limited access (guests have fewer permissions)", "where": "Entra ID Portal → External Identities → External collaboration settings → Guest user access", "ps_only": "No", "notes": "Ensure guest users cannot consent to apps on behalf of the organization. Guest permissions should be the most restricted tier available."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Users can create Microsoft 365 Groups", "recommended": "Restricted — designated group creators only", "default": "All users can create", "where": "Entra ID Portal → Groups → General → Users can create Microsoft 365 groups in Azure portals, API or PowerShell\nPowerShell: Set group creation policy", "ps_only": "Yes", "notes": "Unrestricted group creation leads to sprawl and unmanaged data containers. Restrict to a designated group creators security group. All M365 Group creation (Teams, Planner, SharePoint) flows through this control."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Users can create Teams", "recommended": "Restricted — controlled via M365 Group creation policy", "default": "All users can create", "where": "Teams Admin Center → Teams policies → Create private channels / Create channels\nControlled via M365 Group creation policy in Entra", "ps_only": "No", "notes": "Teams creation is gated by M365 Group creation policy. Restricting group creation automatically restricts Team creation. Teams Admin Center policies control additional granular Team settings."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Users can create SharePoint sites", "recommended": "Restricted — admins only or designated creators", "default": "All users can create", "where": "SharePoint Admin Center → Settings → Site creation → Let users create sites from the SharePoint start page", "ps_only": "No", "notes": "Uncontrolled SharePoint site creation leads to data sprawl and unmanaged external sharing surfaces. Restrict to admins or a designated list. All legitimate site creation should go through a provisioning process."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Self-service group management", "recommended": "Disabled", "default": "Enabled", "where": "Entra ID Portal → Groups → General → Self Service Group Management", "ps_only": "No", "notes": "Prevents users from creating and managing their own security groups. Disable to maintain group governance and prevent privilege escalation through group membership manipulation."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Users can create security groups", "recommended": "Disabled — admins only", "default": "Enabled", "where": "Entra ID Portal → Groups → General → Users can create security groups in Azure portals, API or PowerShell", "ps_only": "No", "notes": "Security group creation should be admin-controlled. User-created security groups can be used for CA policy bypass if accidentally added to exclusion groups."}, {"section": "GROUP & TEAM CREATION", "category": "Group & Teams", "setting": "Expiration policy for Microsoft 365 Groups", "recommended": "Enable — 180 days with auto-renewal on activity", "default": "No expiration", "where": "Entra ID Portal → Groups → Expiration", "ps_only": "No", "notes": "Enables automatic cleanup of inactive groups/Teams. Groups with activity auto-renew. Orphaned groups are flagged for review. Reduces attack surface of abandoned data containers."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "Who can invite guest users", "recommended": "Admins and designated guest inviters only", "default": "Members and admins can invite", "where": "Entra ID Portal → External Identities → External collaboration settings → Guest invite settings", "ps_only": "No", "notes": "Restrict guest invitation to admins and a designated Guest Inviter role group. Prevents users from inviting external parties to access organizational data without IT visibility or approval."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "Guest user access restrictions", "recommended": "Guest users have limited access to directory properties", "default": "Guest users have the same access as members (most permissive)", "where": "Entra ID Portal → External Identities → External collaboration settings → Guest user access", "ps_only": "No", "notes": "Set to most restrictive option: guests cannot enumerate directory users, groups, or other tenants. Prevents reconnaissance by compromised guest accounts or malicious external users."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "Enable one-time passcode for guests", "recommended": "Enabled", "default": "Disabled / varies", "where": "Entra ID Portal → External Identities → All identity providers → Email one-time passcode", "ps_only": "No", "notes": "One-time passcode provides authentication for guest users who do not have a Microsoft or Google account. Enables consistent guest authentication without requiring external identity providers."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "Guest access to Teams channels", "recommended": "Restricted — disable guest access to specific sensitive teams", "default": "Guests can access Teams", "where": "Teams Admin Center → Org-wide settings → Guest access", "ps_only": "No", "notes": "Review Teams-level guest access settings. Ensure sensitive Teams (Finance, Legal, HR, IT, Executive) have guest access disabled explicitly at the Team level, not just org-wide."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "External collaboration — allow/block specific domains", "recommended": "Configure allowlist or blocklist per tenant business requirements", "default": "All external domains allowed", "where": "Entra ID Portal → External Identities → External collaboration settings → Collaboration restrictions", "ps_only": "No", "notes": "Post-breach: consider restricting B2B collaboration to an explicit allowlist of approved partner domains. This prevents guest invitations to unknown or attacker-controlled domains."}, {"section": "GUEST & EXTERNAL COLLABORATION", "category": "Guest Access", "setting": "Guest user expiration / access reviews", "recommended": "Enable access reviews — quarterly", "default": "No expiration or review", "where": "Entra ID Portal → Identity Governance → Access Reviews", "ps_only": "No", "notes": "Stale guest accounts are a persistent access risk. Configure quarterly access reviews for all guest users. Requires Entra ID P2 for full access review functionality."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Organization-level external sharing — SharePoint", "recommended": "New and existing guests (require sign-in)", "default": "Anyone (most permissive — anonymous links)", "where": "SharePoint Admin Center → Policies → Sharing → External sharing", "ps_only": "No", "notes": "Anyone links allow completely unauthenticated access to files and folders. Disable Anyone links at minimum. Set to 'New and existing guests' to require authentication. For high-security orgs set to 'Only people in your organization'."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Anyone links (anonymous sharing)", "recommended": "Disabled", "default": "Enabled", "where": "SharePoint Admin Center → Policies → Sharing → 'Anyone' links section", "ps_only": "No", "notes": "Anyone links bypass all authentication and CA policies. A link shared externally provides permanent access with no audit trail of who accessed the content. Disable entirely in hardened posture."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Default sharing link type", "recommended": "Specific people (most restrictive)", "default": "Anyone with the link", "where": "SharePoint Admin Center → Policies → Sharing → Default link type", "ps_only": "No", "notes": "Controls the pre-selected option when users click Share. Setting to 'Specific people' forces users to explicitly type recipient email addresses rather than creating broad links by default."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Default sharing link permissions", "recommended": "View only", "default": "Edit", "where": "SharePoint Admin Center → Policies → Sharing → Default link permissions", "ps_only": "No", "notes": "Default Edit permissions on sharing links grant write access by default. Change to View — users can escalate to Edit explicitly if needed. Principle of least privilege at the sharing layer."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Expiration for Anyone links", "recommended": "30 days maximum", "default": "No expiration", "where": "SharePoint Admin Center → Policies → Sharing → Expiration of Anyone links", "ps_only": "No", "notes": "If Anyone links cannot be disabled (business requirement), enforce a maximum expiration of 30 days. Prevents permanent anonymous access links from persisting indefinitely."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "Restrict sharing by domain", "recommended": "Configure approved domains allowlist", "default": "No restrictions", "where": "SharePoint Admin Center → Policies → Sharing → Restrict sharing by domain", "ps_only": "No", "notes": "Limits external sharing invitations to approved partner domains. Prevents accidental or malicious sharing to personal email addresses or unknown domains."}, {"section": "SHAREPOINT & ONEDRIVE EXTERNAL SHARING", "category": "SharePoint", "setting": "SharePoint site-level external sharing", "recommended": "Audit all sites — restrict sensitive sites to internal only", "default": "Inherits org-level setting", "where": "SharePoint Admin Center → Sites → Active sites → Sharing column", "ps_only": "No", "notes": "Org-level setting is the ceiling but sites can be more restrictive. Audit all sites and set Finance, Legal, HR, IT, and Executive sites to 'Only people in your organization' regardless of org-level setting."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "SSPR — who can reset passwords", "recommended": "Selected group (not all users unless mature SSPR deployment)", "default": "None or All users", "where": "Entra ID Portal → Password reset → Properties", "ps_only": "No", "notes": "SSPR reduces helpdesk load but introduces risk if authentication methods are weak. In post-breach scenario, consider temporarily disabling SSPR or requiring admin verification until MFA re-enrollment is complete."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "SSPR — number of authentication methods required", "recommended": "2 methods required", "default": "1 method", "where": "Entra ID Portal → Password reset → Authentication methods", "ps_only": "No", "notes": "Requiring 2 methods for SSPR prevents single-factor account takeover via password reset. Approved methods: Microsoft Authenticator app, phone (call or SMS), email (external), security questions (weakest — avoid)."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "LinkedIn account connections", "recommended": "Disabled", "default": "Enabled", "where": "M365 Admin Center → Settings → Org settings → LinkedIn account connections\nOR Entra ID Portal → User settings", "ps_only": "No", "notes": "LinkedIn integration syncs profile data between M365 and LinkedIn. Disable to prevent data leakage of org chart, employee names, and roles to LinkedIn's data ecosystem."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "Stay signed in prompt", "recommended": "Disabled — controlled via CA persistent browser session policy", "default": "Enabled", "where": "Entra ID Portal → Company branding → Show option to remain signed in", "ps_only": "No", "notes": "The 'Stay signed in?' prompt creates persistent browser sessions. Disable here and enforce via CA-16 (Block persistent browser sessions) for consistent control."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "Combined security info registration", "recommended": "Enabled — use combined registration portal", "default": "Varies by tenant age", "where": "Entra ID Portal → User settings → User feature settings → Use the combined security information registration experience", "ps_only": "No", "notes": "Combined registration provides a single portal for MFA and SSPR method registration. Enable to ensure consistent registration experience and full visibility of registered methods."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "Tenant-wide MFA registration enforcement", "recommended": "Enabled — enforce via CA policy (CA-03)", "default": "Not enforced", "where": "Managed via CA-03 in this framework. Do not use legacy per-user MFA enforcement — it conflicts with CA policies.", "ps_only": "No", "notes": "Use Conditional Access (CA-03) for MFA enforcement, not the legacy per-user MFA portal. Per-user MFA and CA MFA interact unpredictably and can create enforcement gaps or double-prompt issues."}, {"section": "ENTRA / IDENTITY SETTINGS", "category": "Entra Identity", "setting": "Privileged Identity Management — activate PIM", "recommended": "Enabled — all admin roles should be eligible, not permanent", "default": "Permanent admin assignments", "where": "Entra ID Portal → Identity Governance → Privileged Identity Management", "ps_only": "No", "notes": "PIM converts permanent admin role assignments to eligible (just-in-time) assignments. Admins must activate their role with MFA and justification before use. Requires Entra ID P2. One of the highest-impact identity hardening controls."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "Automatic external forwarding — org-wide", "recommended": "Disabled — Remote Domain * AutoForwardEnabled = False", "default": "Enabled", "where": "Exchange Admin Center → Mail flow → Remote domains → Default → Edit\nOR PowerShell: Set-RemoteDomain * -AutoForwardEnabled $false", "ps_only": "No", "notes": "Critical post-breach control. Attackers frequently configure inbox rules to auto-forward all email to external addresses for persistent surveillance. Disable at the Remote Domain level as belt-and-suspenders alongside MFR-13."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "Shared mailbox sign-in", "recommended": "Blocked — shared mailboxes should have sign-in disabled", "default": "Enabled (sign-in allowed)", "where": "Microsoft 365 Admin Center → Users → Active users → Select shared mailbox → Block sign-in\nOR PowerShell: Set-MsolUser -BlockCredential $true", "ps_only": "Yes", "notes": "Shared mailboxes should never be used for interactive sign-in. Block sign-in on all shared mailboxes. If a shared mailbox has a valid password and no MFA, it is an easy target for account compromise."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "SMTP AUTH — org-wide", "recommended": "Disabled org-wide — enable per-mailbox only if required", "default": "Enabled", "where": "Exchange Admin Center → Settings → Mail flow → Turn off SMTP AUTH\nOR PowerShell: Set-TransportConfig -SmtpClientAuthenticationDisabled $true", "ps_only": "Yes", "notes": "SMTP AUTH is a legacy protocol that allows authenticated SMTP relay from clients. It bypasses modern auth and CA policies. Disable org-wide and enable only on specific mailboxes with documented business justification (e.g. multifunction printers, legacy line-of-business apps)."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "POP3 access — org-wide", "recommended": "Disabled", "default": "Enabled", "where": "Exchange Admin Center → Settings → Mail flow\nOR PowerShell: Get-CASMailboxPlan | Set-CASMailboxPlan -PopEnabled $false", "ps_only": "Yes", "notes": "POP3 is a legacy protocol that bypasses modern auth and CA policies. Disable org-wide. Audit per-mailbox POP3 settings to confirm no mailboxes have it explicitly enabled."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "IMAP access — org-wide", "recommended": "Disabled", "default": "Enabled", "where": "Exchange Admin Center → Settings → Mail flow\nOR PowerShell: Get-CASMailboxPlan | Set-CASMailboxPlan -ImapEnabled $false", "ps_only": "Yes", "notes": "Same as POP3 — legacy protocol, bypasses modern auth and CA. Disable org-wide. IMAP is commonly abused in credential stuffing attacks against M365 tenants."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "External MailTips (warn on external recipients)", "recommended": "Enabled", "default": "Enabled (but often misconfigured)", "where": "Exchange Admin Center → Settings → Mail tips\nOR PowerShell: Set-OrganizationConfig -MailTipsExternalRecipientsTipsEnabled $true", "ps_only": "Yes", "notes": "MailTips warn users when they are about to send email externally. Helps prevent accidental data disclosure. Confirm enabled — sometimes disabled due to perceived noise."}, {"section": "EXCHANGE / MAIL SETTINGS", "category": "Exchange", "setting": "Modern authentication — Exchange Online", "recommended": "Enabled", "default": "Enabled (newer tenants) / Disabled (legacy tenants)", "where": "M365 Admin Center → Settings → Org settings → Modern authentication", "ps_only": "No", "notes": "Modern auth must be enabled for CA policies to apply to Exchange Online. Confirm enabled on every tenant — legacy tenants provisioned before 2017 may have it disabled. Disabling modern auth makes all CA blocking of legacy auth ineffective."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Audit log — unified audit logging", "recommended": "Enabled", "default": "Enabled by default (newer tenants) — verify", "where": "M365 Admin Center → Settings → Org settings → Security & privacy → Audit log\nOR PowerShell: Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled $true", "ps_only": "Yes", "notes": "Critical — without unified audit logging, you have no forensic trail for IR. Verify it is enabled on every tenant. Some older tenants have it disabled. Retention: E3 = 90 days, E5 = 1 year. Consider Microsoft Purview Audit (Premium) for longer retention."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Customer Lockbox", "recommended": "Enabled", "default": "Disabled", "where": "M365 Admin Center → Settings → Org settings → Security & privacy → Customer Lockbox", "ps_only": "No", "notes": "Requires Microsoft engineer access to tenant data to be explicitly approved by a tenant admin. Adds an approval gate for Microsoft support access. Requires M365 E5 or Compliance add-on."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "User-owned apps and services (Office Store)", "recommended": "Disabled — users cannot acquire apps from Office Store", "default": "Enabled", "where": "M365 Admin Center → Settings → Org settings → User owned apps and services", "ps_only": "No", "notes": "Prevents users from installing Office add-ins and apps from the Office Store without IT approval. Reduces shadow IT and app consent attack surface."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "User installation of Office add-ins", "recommended": "Disabled — admin deployment only", "default": "Enabled", "where": "M365 Admin Center → Settings → Org settings → User owned apps and services → Let users install Office add-ins", "ps_only": "No", "notes": "Office add-ins run in the context of Office apps and can access document content and make network requests. Admin-deploy only approved add-ins via Centralized Deployment."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Integrated apps — third-party app integration", "recommended": "Enabled with admin consent control enforced", "default": "Enabled", "where": "M365 Admin Center → Settings → Integrated apps", "ps_only": "No", "notes": "Integrated apps portal controls which third-party apps are approved for the tenant. Review all apps currently approved. Remove any unrecognized or unnecessary apps. New app approvals should require admin review."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Productivity Score", "recommended": "Disabled or anonymized — individual-level data off", "default": "Enabled with individual data", "where": "M365 Admin Center → Reports → Productivity Score → Privacy settings", "ps_only": "No", "notes": "Productivity Score collects and exposes individual-level usage data. Depending on org policy and jurisdiction, this may have privacy implications. At minimum, disable individual-level insights and use only org-level aggregated data."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Usage reports — anonymized identifiers", "recommended": "Enabled — anonymize user data in reports", "default": "Disabled (real user names shown)", "where": "M365 Admin Center → Settings → Org settings → Reports → Display concealed user, group and site names in reports", "ps_only": "No", "notes": "M365 usage reports can expose individual user activity. Enable anonymization for reports visible to non-admin roles. Admins with appropriate permissions can still de-anonymize for legitimate IR purposes."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Password expiration policy", "recommended": "Set to never expire — rely on MFA and risk-based policies", "default": "90 days (legacy default)", "where": "M365 Admin Center → Settings → Org settings → Security & privacy → Password expiration policy", "ps_only": "No", "notes": "NIST and Microsoft guidance recommends passwords that never expire when combined with MFA. Frequent expiration drives weak password patterns (Password1! → Password2!). Rely on CA risk policies (CA-09, CA-10) and breach detection instead of expiration."}, {"section": "MICROSOFT 365 ADMIN CENTER — ORG SETTINGS", "category": "M365 Admin", "setting": "Self-service password reset — re-registration after breach", "recommended": "Force re-registration for all users post-breach", "default": "N/A — one-time IR action", "where": "Entra ID Portal → Password reset → Registration → Require users to re-register", "ps_only": "No", "notes": "Post-breach critical action. Force all users to re-register their authentication methods. This invalidates any attacker-registered MFA methods. Set 'Number of days before users are asked to re-confirm their authentication information' to 0 to force immediate re-registration."}], "email_auth": [{"section": "SPF — Assessment & Configuration", "category": "SPF", "check": "SPF record exists", "current": "— Not assessed", "target": "TXT record starting with v=spf1 exists on all accepted domains", "status": "— Not assessed", "remediation": "If missing: Create a TXT record on the domain DNS zone.\nMinimum record: v=spf1 include:spf.protection.outlook.com -all\nAdd additional include: statements for any third-party senders (marketing, HR, ticketing).", "powershell": "# PowerShell:\nResolve-DnsName -Name contoso.com -Type TXT | Where {$_.Strings -match 'spf'}\n\n# nslookup:\nnslookup -type=TXT contoso.com", "notes": "Every accepted domain must have an SPF record, including domains that do not send email — those should have: v=spf1 -all (hard fail, no senders authorized)."}, {"section": "SPF — Assessment & Configuration", "category": "SPF", "check": "SPF enforcement level (-all vs ~all vs ?all)", "current": "— Not assessed", "target": "-all (hard fail) on all domains", "status": "— Not assessed", "remediation": "Change ~all (soft fail) to -all (hard fail) on all domains.\nNote: Do NOT change to -all until you are confident all legitimate senders are in the record. Changing prematurely will block legitimate mail.\nTest with MXToolbox or CheckPhish before enforcing.", "powershell": "# Check current enforcement tag:\nResolve-DnsName -Name contoso.com -Type TXT | Select -ExpandProperty Strings | Where {$_ -match 'spf'}", "notes": "~all = soft fail (mark but deliver). -all = hard fail (reject). ?all = neutral (no policy — avoid). Most tenants default to ~all. The goal is -all. The DMARC policy is more important than SPF enforcement level in M365 but -all is still best practice."}, {"section": "SPF — Assessment & Configuration", "category": "SPF", "check": "SPF DNS lookup count (10 lookup limit)", "current": "— Not assessed", "target": "9 or fewer DNS lookups", "status": "— Not assessed", "remediation": "Use MXToolbox SPF analyzer to count lookups.\nIf over 10: flatten the SPF record (replace include: statements with IP ranges) or use an SPF flattening service.\nEvery include:, a:, mx: mechanism counts as a lookup. ptr: counts as 2.", "powershell": "# Test with MXToolbox (browser):\nhttps://mxtoolbox.com/spf.aspx\n\n# Manual count — each include: = 1 lookup:\nnslookup -type=TXT contoso.com", "notes": "SPF has a hard limit of 10 DNS lookups per evaluation. Exceeding this causes SPFPermError which some receivers treat as a fail. Common cause: too many include: statements for marketing platforms, CRMs, ticketing systems."}, {"section": "SPF — Assessment & Configuration", "category": "SPF", "check": "All legitimate senders included", "current": "— Not assessed", "target": "All authorized sending services in SPF record", "status": "— Not assessed", "remediation": "Audit all services that send email as your domain:\n1. Check mail flow rule MFR-01 exceptions for known third-party senders\n2. Review inbound connector list for authorized relay IPs\n3. Check with marketing, HR, legal for external sending platforms\nAdd missing services as include: statements or ip4: ranges.", "powershell": "# List all accepted domains:\nGet-AcceptedDomain | Select DomainName, DomainType\n\n# Review outbound connectors:\nGet-OutboundConnector | Select Name, SmartHosts, TlsDomain", "notes": "Common missing senders: Mailchimp, HubSpot, Salesforce, Zendesk, Workday, DocuSign, payroll platforms. If a third-party sender is not in SPF, their mail will soft/hard fail SPF and may be affected by DMARC enforcement."}, {"section": "SPF — Assessment & Configuration", "category": "SPF", "check": "Non-sending domains have null SPF", "current": "— Not assessed", "target": "v=spf1 -all on all non-sending domains", "status": "— Not assessed", "remediation": "For every domain that does not send email (parked domains, subdomains, legacy domains): set SPF to v=spf1 -all.\nAlso set DMARC p=reject and a null MX record: MX 0 . (dot)\nThis prevents these domains from being used in spoofing attacks.", "powershell": "# Check all accepted domains for SPF:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $spf = Resolve-DnsName $d -Type TXT -EA SilentlyContinue | Where {$_.Strings -match 'spf'}\n  Write-Output \"$d : $($spf.Strings)\"\n}", "notes": "Non-sending domains without SPF records are commonly used by attackers for spoofing. Parking a domain with v=spf1 -all and p=reject DMARC closes this attack surface entirely."}, {"section": "DKIM — Assessment & Configuration", "category": "DKIM", "check": "DKIM signing enabled in Exchange Online", "current": "— Not assessed", "target": "DKIM enabled and active for all domains", "status": "— Not assessed", "remediation": "Enable DKIM for each domain in the Defender portal:\nEmail Authentication → DKIM → Select domain → Enable.\nM365 will generate two CNAME records (selector1 and selector2) that must be published in DNS.\nDo not enable until DNS records are published — mail will fail DKIM until records propagate.", "powershell": "# Check DKIM status for all domains:\nGet-DkimSigningConfig | Select Domain, Enabled, Status, Selector1CNAME, Selector2CNAME\n\n# Enable DKIM for a domain:\nSet-DkimSigningConfig -Identity contoso.com -Enabled $true", "notes": "M365 DKIM uses rotating selectors (selector1 and selector2). Microsoft automatically rotates keys. The CNAME records in DNS point to Microsoft-managed keys — you publish CNAMEs, not the keys directly."}, {"section": "DKIM — Assessment & Configuration", "category": "DKIM", "check": "DKIM DNS CNAME records published", "current": "— Not assessed", "target": "selector1._domainkey and selector2._domainkey CNAME records exist and resolve correctly", "status": "— Not assessed", "remediation": "After enabling DKIM in the portal, publish the two CNAME records provided.\nFormat:\nselector1._domainkey.contoso.com → selector1-contoso-com._domainkey.contoso.onmicrosoft.com\nselector2._domainkey.contoso.com → selector2-contoso-com._domainkey.contoso.onmicrosoft.com\nWait for DNS propagation (up to 48hrs) then verify.", "powershell": "# Verify CNAME records resolve:\nResolve-DnsName selector1._domainkey.contoso.com -Type CNAME\nResolve-DnsName selector2._domainkey.contoso.com -Type CNAME\n\n# Verify DKIM public key resolves:\nResolve-DnsName selector1._domainkey.contoso.com -Type TXT", "notes": "Common failure: CNAME records published with wrong format or extra characters. Copy the exact CNAME values from the Defender portal — do not retype. TTL should be 3600 or lower to allow faster updates."}, {"section": "DKIM — Assessment & Configuration", "category": "DKIM", "check": "DKIM status — Active (not errors)", "current": "— Not assessed", "target": "Status: Valid for all domains", "status": "— Not assessed", "remediation": "In the Defender portal, DKIM status should show 'Valid' for each enabled domain.\nIf showing errors:\n- CnameMissing: DNS records not yet published or not propagated\n- KeyMismatch: DNS records published incorrectly\n- InternalFailure: Contact Microsoft support\nRe-run Get-DkimSigningConfig to check Status field.", "powershell": "# Check detailed DKIM status:\nGet-DkimSigningConfig | Select Domain, Enabled, Status, KeyCreatedTime, LastChecked\n\n# Force a recheck:\nSet-DkimSigningConfig -Identity contoso.com -Enabled $true", "notes": "If DKIM was previously enabled and is now showing errors, it may indicate DNS record tampering or TTL expiry issues. Investigate promptly — DKIM failure affects DMARC alignment and mail deliverability."}, {"section": "DKIM — Assessment & Configuration", "category": "DKIM", "check": "DKIM key rotation", "current": "— Not assessed", "target": "Automatic rotation enabled (M365 manages this)", "status": "— Not assessed", "remediation": "M365 automatically rotates DKIM keys using the selector1/selector2 alternating mechanism.\nNo manual action required for M365-managed DKIM.\nVerify rotation is working by checking KeyCreatedTime — should update periodically.\nIf using a custom DKIM setup (not M365 managed), establish a manual rotation schedule (annual minimum).", "powershell": "# Check key creation time to verify rotation:\nGet-DkimSigningConfig | Select Domain, Selector1KeySize, Selector2KeySize, KeyCreatedTime", "notes": "M365 handles DKIM key rotation automatically — this is one advantage of using M365-managed DKIM over self-managed. If you see a key that was created years ago and never rotated, the automation may have failed."}, {"section": "DKIM — Assessment & Configuration", "category": "DKIM", "check": "DKIM for custom/subdomain senders", "current": "— Not assessed", "target": "DKIM enabled for all domains that send email including subdomains", "status": "— Not assessed", "remediation": "If org sends from subdomains (e.g. mail.contoso.com, newsletters.contoso.com), DKIM must be enabled separately for each.\nEach subdomain needs its own DKIM signing configuration and DNS records.\nSubdomains that do not send should still have DMARC records.", "powershell": "# List all DKIM configurations:\nGet-DkimSigningConfig | Select Domain, Enabled\n\n# Check if subdomain has DKIM:\nResolve-DnsName selector1._domainkey.mail.contoso.com -Type CNAME -EA SilentlyContinue", "notes": "Subdomains used for marketing email (newsletters, notifications) are commonly missing DKIM. These often go through third-party senders who have their own DKIM setup — verify DKIM alignment in message headers from those senders."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC record exists", "current": "— Not assessed", "target": "_dmarc TXT record exists on all domains", "status": "— Not assessed", "remediation": "Create a TXT record on _dmarc.contoso.com.\nMinimum starting record (monitoring only):\nv=DMARC1; p=none; rua=mailto:dmarc-reports@contoso.com\nThis starts collecting reports without affecting mail flow.", "powershell": "# Check DMARC record:\nResolve-DnsName _dmarc.contoso.com -Type TXT\n\n# nslookup:\nnslookup -type=TXT _dmarc.contoso.com\n\n# Check all domains:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $r = Resolve-DnsName \"_dmarc.$d\" -Type TXT -EA SilentlyContinue\n  Write-Output \"$d : $($r.Strings)\"\n}", "notes": "The DMARC record must be on the _dmarc subdomain of the root domain — not on the root domain itself. Common mistake: publishing on contoso.com instead of _dmarc.contoso.com."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC policy level (p=)", "current": "— Not assessed", "target": "p=reject on all domains (ultimate target)\np=quarantine as minimum acceptable", "status": "— Not assessed", "remediation": "Progression path:\n1. p=none (monitor, collect reports, no action)\n2. p=quarantine pct=10 (quarantine 10% of failing mail)\n3. p=quarantine pct=100 (quarantine all failing mail)\n4. p=reject (reject all failing mail — target state)\nDo not jump directly to p=reject without completing monitoring phase.", "powershell": "# Check current policy:\nResolve-DnsName _dmarc.contoso.com -Type TXT | Select -ExpandProperty Strings", "notes": "p=none is the most common state found on assessments — it means DMARC is configured but not enforced. The mail flow rule MFR-01 and Defender anti-phish honor DMARC policy settings both depend on p=quarantine or p=reject to be effective."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC aggregate reporting (rua=)", "current": "— Not assessed", "target": "rua= set to a monitored mailbox or third-party DMARC reporting service", "status": "— Not assessed", "remediation": "Add rua tag to DMARC record:\nv=DMARC1; p=none; rua=mailto:dmarc-reports@contoso.com\nAlternatively use a DMARC reporting service (Valimail, Dmarcian, Postmark, EasyDMARC).\nAggregate reports (XML) are sent daily by receiving mail servers and show pass/fail statistics per sending source.", "powershell": "# Current rua setting:\nResolve-DnsName _dmarc.contoso.com -Type TXT | Select -ExpandProperty Strings", "notes": "Without rua= you are flying blind — you cannot see what is failing DMARC or identify legitimate senders missing from SPF. Always configure rua= before attempting to move from p=none to p=quarantine. Third-party reporting services parse the XML into readable dashboards."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC forensic reporting (ruf=)", "current": "— Not assessed", "target": "ruf= optional — assess privacy implications before enabling", "status": "— Not assessed", "remediation": "Forensic reports contain individual message samples that failed DMARC. They can include message headers and content.\nPrivacy consideration: ruf= reports may contain employee email content — review legal/privacy implications before enabling.\nMany orgs omit ruf= and rely on rua= aggregate reports only.", "powershell": "# Check ruf setting:\nResolve-DnsName _dmarc.contoso.com -Type TXT | Select -ExpandProperty Strings", "notes": "Many receiving mail servers no longer send forensic reports due to privacy concerns. rua= aggregate reports are more universally supported and sufficient for most monitoring needs. ruf= is optional."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC alignment (SPF and DKIM alignment)", "current": "— Not assessed", "target": "At least one of SPF or DKIM passes in aligned mode", "status": "— Not assessed", "remediation": "DMARC requires alignment — the domain in the From: header must match either:\n- SPF: the envelope From (Return-Path) domain, OR\n- DKIM: the d= domain in the DKIM signature\nIf neither aligns, DMARC fails regardless of SPF/DKIM results.\nCheck message headers to verify alignment: look for dmarc=pass or dmarc=fail in Authentication-Results.", "powershell": "# Check message headers for DMARC alignment:\n# In Outlook: File → Properties → Internet headers\n# Look for:\n# Authentication-Results: ... dmarc=pass\n# spf=pass ... smtp.mailfrom=contoso.com\n# dkim=pass ... header.d=contoso.com", "notes": "DMARC alignment is the key concept most misunderstood. A message can pass SPF and DKIM individually but still fail DMARC if the domains don't align with the From: header. Third-party senders must either be in SPF with domain alignment OR sign with DKIM using your domain."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC subdomain policy (sp=)", "current": "— Not assessed", "target": "sp=reject on all subdomains or inherit from parent p= policy", "status": "— Not assessed", "remediation": "If the org has subdomains that should not send email, add sp=reject to the parent domain DMARC record:\nv=DMARC1; p=quarantine; sp=reject; rua=mailto:dmarc@contoso.com\nThis applies reject policy to all subdomains even if parent is still at quarantine.\nUseful for locking down subdomains while parent domain is still transitioning.", "powershell": "# Check sp= tag:\nResolve-DnsName _dmarc.contoso.com -Type TXT | Select -ExpandProperty Strings", "notes": "sp= defaults to the same value as p= if not specified. Explicitly setting sp=reject closes subdomain spoofing even during the p=none → p=reject transition on the parent domain."}, {"section": "DMARC — Assessment & Configuration", "category": "DMARC", "check": "DMARC for non-sending domains", "current": "— Not assessed", "target": "p=reject on all non-sending domains", "status": "— Not assessed", "remediation": "For every domain that does not send email, set DMARC to p=reject immediately — no need for a monitoring phase since there is no legitimate mail to protect.\nRecord: v=DMARC1; p=reject; rua=mailto:dmarc@contoso.com\nCombine with v=spf1 -all SPF and null MX for complete lockdown.", "powershell": "# Enumerate non-sending domains and check DMARC:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $mx = Resolve-DnsName $d -Type MX -EA SilentlyContinue\n  $dmarc = Resolve-DnsName \"_dmarc.$d\" -Type TXT -EA SilentlyContinue\n  Write-Output \"$d MX:$($mx.Count) DMARC:$($dmarc.Strings)\"\n}", "notes": "Non-sending domains with p=none or no DMARC are actively exploitable for phishing. There is no business reason to leave them unprotected. Set to p=reject on day one."}, {"section": "PER-DOMAIN STATUS TRACKER — Complete for every accepted domain", "category": "Domain", "check": "SPF Record", "current": "SPF Enforcement", "target": "SPF Lookup Count", "status": "DKIM Enabled", "remediation": "DKIM Status", "powershell": "DMARC Record", "notes": "DMARC Policy (p=)"}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Check SPF record", "current": "—", "target": "SPF record retrieved", "status": "— Not assessed", "remediation": "Run against each accepted domain. Look for: v=spf1, include: statements, enforcement tag (-all/~all/?all), and count DNS lookups.", "powershell": "# PowerShell — all accepted domains:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $spf = Resolve-DnsName $d -Type TXT -EA SilentlyContinue | Where {$_.Strings -match 'v=spf1'}\n  Write-Output \"$d`n  $($spf.Strings)`n\"\n}\n\n# Single domain:\nResolve-DnsName contoso.com -Type TXT | Where {$_.Strings -match 'spf'}", "notes": "Run this at the start of every assessment. Export results to the per-domain tracker."}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Check DKIM status (M365)", "current": "—", "target": "DKIM config retrieved for all domains", "status": "— Not assessed", "remediation": "Shows DKIM enabled/disabled status, key size, selector CNAME values, and last check time for all M365 domains.", "powershell": "# All domains:\nGet-DkimSigningConfig | Select Domain, Enabled, Status, Selector1CNAME, Selector2CNAME, KeyCreatedTime | Format-Table -AutoSize\n\n# Verify CNAME in DNS:\nResolve-DnsName selector1._domainkey.contoso.com -Type CNAME\nResolve-DnsName selector2._domainkey.contoso.com -Type CNAME", "notes": "DKIM Status field values: Valid, CnameMissing, KeyMismatch, InternalFailure. Any value other than Valid requires investigation."}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Check DMARC record", "current": "—", "target": "DMARC record retrieved for all domains", "status": "— Not assessed", "remediation": "Run against _dmarc subdomain for each accepted domain. Note the p= policy level and whether rua= is configured.", "powershell": "# PowerShell — all accepted domains:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $dmarc = Resolve-DnsName \"_dmarc.$d\" -Type TXT -EA SilentlyContinue\n  if ($dmarc) {\n    Write-Output \"$d : $($dmarc.Strings)\"\n  } else {\n    Write-Output \"$d : NO DMARC RECORD\"\n  }\n}\n\n# Single domain:\nResolve-DnsName _dmarc.contoso.com -Type TXT", "notes": "Domains returning NO DMARC RECORD are the highest priority remediation items. Document all in the per-domain tracker."}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Check MX records (identify mail routing)", "current": "—", "target": "MX records retrieved for all domains", "status": "— Not assessed", "remediation": "Identifies where mail is routed. Confirms mail flows through Exchange Online (mail.protection.outlook.com). Non-sending domains should have null MX (MX 0 .).", "powershell": "# All accepted domains:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $mx = Resolve-DnsName $d -Type MX -EA SilentlyContinue\n  Write-Output \"$d : $($mx.NameExchange)\"\n}\n\n# Verify EXO MX:\n# Should resolve to: contoso-com.mail.protection.outlook.com", "notes": "If MX does not point to Exchange Online, mail flow rules and Defender policies may not apply. Third-party email gateways (Proofpoint, Mimecast) may be in the MX path — document and adjust policy expectations accordingly."}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Check accepted domains in tenant", "current": "—", "target": "All accepted domains listed", "status": "— Not assessed", "remediation": "Lists all domains registered in the M365 tenant. Every domain here needs SPF, DKIM, and DMARC assessment.", "powershell": "# List all accepted domains:\nGet-AcceptedDomain | Select DomainName, DomainType, Default | Format-Table -AutoSize\n\n# DomainType values:\n# Authoritative = org owns and receives mail for this domain\n# InternalRelay = mail forwarded to on-prem\n# ExternalRelay = mail forwarded externally", "notes": "Run this first on every engagement. The accepted domain list is your scope for the email authentication assessment. Every domain type needs assessment — not just the default/primary domain."}, {"section": "POWERSHELL & QUERY COMMANDS", "category": "Queries", "check": "Validate DMARC alignment in message headers", "current": "—", "target": "Authentication-Results header reviewed", "status": "— Not assessed", "remediation": "Send a test message and inspect the full message headers to verify SPF, DKIM, and DMARC results and alignment.", "powershell": "# In Outlook — view message headers:\n1. Open message → File → Properties → Internet headers\n\n# Look for Authentication-Results header:\n# spf=pass smtp.mailfrom=contoso.com\n# dkim=pass header.d=contoso.com\n# dmarc=pass action=none header.from=contoso.com\n\n# Online header analyzer:\n# https://mxtoolbox.com/EmailHeaders.aspx", "notes": "The Authentication-Results header is the ground truth for what the receiving server evaluated. dmarc=pass confirms full alignment. dmarc=fail with spf=pass means SPF is passing but not aligned — the envelope From domain doesn't match the From: header domain."}, {"section": "REMEDIATION ROADMAP — p=none → p=reject Progression", "category": "Roadmap", "check": "Phase 1 — Discovery (Week 1)", "current": "All domains at p=none or no DMARC", "target": "All domains have DMARC p=none with rua= configured", "status": "Critical", "remediation": "1. Run domain audit (Queries section)\n2. Publish DMARC p=none with rua= on all domains\n3. Publish v=spf1 -all on all non-sending domains\n4. Set p=reject on all non-sending domains immediately\n5. Begin receiving aggregate DMARC reports", "powershell": "# Bulk check — domains missing DMARC:\n$domains = Get-AcceptedDomain | Select -ExpandProperty DomainName\nforeach ($d in $domains) {\n  $r = Resolve-DnsName \"_dmarc.$d\" -Type TXT -EA SilentlyContinue\n  if (-not $r) { Write-Output \"MISSING DMARC: $d\" }\n}", "notes": "Do not skip this phase. Moving directly to p=reject without monitoring will block legitimate mail. The discovery phase identifies all legitimate sending sources that need to be in SPF or DKIM-aligned."}, {"section": "REMEDIATION ROADMAP — p=none → p=reject Progression", "category": "Roadmap", "check": "Phase 2 — Analysis (Weeks 2-4)", "current": "Reports received but not yet analyzed", "target": "All legitimate senders identified and documented", "status": "High", "remediation": "1. Analyze DMARC aggregate reports (rua= inbox or reporting service)\n2. Identify all sources sending as your domain\n3. For each source: confirm SPF include or DKIM alignment\n4. Add missing legitimate senders to SPF record\n5. Confirm DKIM enabled for all sending domains\n6. Verify SPF lookup count stays under 10", "powershell": "# Check SPF after adding new senders:\nResolve-DnsName contoso.com -Type TXT | Where {$_.Strings -match 'spf'}\n\n# Count SPF lookups:\n# Use: https://mxtoolbox.com/spf.aspx", "notes": "Common discoveries during analysis: marketing platforms (Mailchimp, HubSpot), HR systems (Workday, BambooHR), ticketing systems (Zendesk), payroll, DocuSign, Salesforce. Each needs SPF coverage or DKIM alignment."}, {"section": "REMEDIATION ROADMAP — p=none → p=reject Progression", "category": "Roadmap", "check": "Phase 3 — Quarantine (Weeks 4-8)", "current": "DMARC at p=none", "target": "DMARC at p=quarantine pct=100", "status": "High", "remediation": "1. Change DMARC to p=quarantine; pct=10 (quarantine 10% of failing mail)\n2. Monitor for 1 week — check quarantine for legitimate mail\n3. Increase to pct=50, then pct=100 over 2-3 weeks\n4. Confirm no legitimate mail is being quarantined\n5. Address any remaining SPF/DKIM gaps found at this stage", "powershell": "# Update DMARC to quarantine:\n# Modify DNS TXT record for _dmarc.contoso.com:\n# v=DMARC1; p=quarantine; pct=10; rua=mailto:dmarc@contoso.com\n\n# Increase pct gradually:\n# pct=10 → pct=50 → pct=100", "notes": "pct= allows gradual rollout. Only the specified percentage of failing messages are quarantined — the rest are still delivered (but still reported). This safety valve prevents a full outage if a legitimate sender was missed."}, {"section": "REMEDIATION ROADMAP — p=none → p=reject Progression", "category": "Roadmap", "check": "Phase 4 — Enforcement (Week 8+)", "current": "DMARC at p=quarantine", "target": "DMARC at p=reject — all domains", "status": "Medium", "remediation": "1. Change DMARC to p=reject on primary sending domain\n2. Monitor for 1 week — check for any unexpected NDRs from legitimate senders\n3. Promote all remaining domains to p=reject\n4. Enable Honor DMARC policy in Defender anti-phish (already in framework)\n5. Enable DMARC-based block in MFR-01 (already in framework)\n6. Document completion date and domain-by-domain status", "powershell": "# Final DMARC record:\n# v=DMARC1; p=reject; sp=reject; rua=mailto:dmarc@contoso.com\n\n# Verify enforcement:\nResolve-DnsName _dmarc.contoso.com -Type TXT | Select -ExpandProperty Strings", "notes": "p=reject is the target state. At this point MFR-01 and the Defender Honor DMARC policy setting are fully effective. Unauthenticated mail claiming to be from your domain is rejected at the protocol level before it reaches Defender policies."}, {"section": "REMEDIATION ROADMAP — p=none → p=reject Progression", "category": "Roadmap", "check": "Ongoing — Maintenance", "current": "Enforcement achieved", "target": "Monthly SPF/DKIM/DMARC review", "status": "Low", "remediation": "1. Monthly: Review DMARC aggregate reports for new unknown senders\n2. Quarterly: Audit SPF record for stale include: statements (decommissioned services)\n3. Quarterly: Verify DKIM status for all domains\n4. When onboarding new sending service: add to SPF before going live\n5. When offboarding service: remove from SPF within 30 days", "powershell": "# Monthly DKIM health check:\nGet-DkimSigningConfig | Select Domain, Enabled, Status, KeyCreatedTime\n\n# Check for new unknown senders in DMARC reports:\n# Review rua= mailbox or reporting service dashboard", "notes": "Email authentication is not set-and-forget. New SaaS tools get added, old ones get decommissioned. SPF records accumulate stale entries. A monthly 15-minute review catches drift before it becomes a problem."}], "intune_compliance": [{"section": "POLICY SETUP & GLOBAL SETTINGS", "category": "Compliance", "setting": "Compliance policy name", "recommended": "WIN-Compliance-Hardened", "default": "No policy", "portal": "Devices → Compliance → Create policy → Windows 10 and later", "powershell": "# Connect:\nConnect-MgGraph -Scopes 'DeviceManagementConfiguration.ReadWrite.All'\n\n# List existing compliance policies:\nGet-MgDeviceManagementDeviceCompliancePolicy | Select DisplayName, Id", "notes": "Create a single hardened compliance policy applied to all Windows devices via an All Devices or dynamic device group. Name clearly to distinguish from any existing default policies."}, {"section": "POLICY SETUP & GLOBAL SETTINGS", "category": "Compliance", "setting": "Mark devices with no compliance policy as", "recommended": "Not compliant", "default": "Compliant", "portal": "Devices → Compliance → Compliance policy settings → Mark devices with no compliance policy as", "powershell": "# This is a tenant-wide setting (requires Graph beta):\nInvoke-MgGraphRequest -Method PATCH `\n  -Uri 'https://graph.microsoft.com/beta/deviceManagement/settings' `\n  -Body '{\"secureByDefault\": true}' `\n  -ContentType 'application/json'", "notes": "Critical — the default setting marks devices with NO compliance policy as Compliant. This means unmanaged devices pass CA device compliance checks. Change to Not Compliant immediately."}, {"section": "POLICY SETUP & GLOBAL SETTINGS", "category": "Compliance", "setting": "Compliance status validity period (days)", "recommended": "30 days", "default": "30 days", "portal": "Devices → Compliance → Compliance policy settings → Compliance status validity period", "powershell": "# Check current validity period:\nInvoke-MgGraphRequest -Method GET -Uri 'https://graph.microsoft.com/beta/deviceManagement/settings' |\n  Select-Object -ExpandProperty deviceComplianceCheckinThresholdDays", "notes": "Devices must check in within this period or are marked non-compliant. 30 days is acceptable. Consider 15 days for high-security environments. Very short periods (1-3 days) cause issues for users on extended leave."}, {"section": "MICROSOFT DEFENDER REQUIREMENTS", "category": "Compliance", "setting": "Require Microsoft Defender Antimalware", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → Windows Health → Require Microsoft Defender Antimalware", "powershell": "# In compliance policy JSON:\n'defenderEnabled': true", "notes": "Confirms Defender AV service is running. Devices without active AV are marked non-compliant and blocked from accessing resources via CA-15."}, {"section": "MICROSOFT DEFENDER REQUIREMENTS", "category": "Compliance", "setting": "Require real-time protection", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → Windows Health → Require real-time protection", "powershell": "# In compliance policy JSON:\n'defenderRealTimeMonitoringEnabled': true", "notes": "Marks devices non-compliant if Defender real-time protection is disabled. Users who disable AV to install software will lose resource access until re-enabled."}, {"section": "MICROSOFT DEFENDER REQUIREMENTS", "category": "Compliance", "setting": "Microsoft Defender ATP — require device at or under machine risk score", "recommended": "Clear", "default": "Not configured", "portal": "Devices → Compliance → Policy → Microsoft Defender for Endpoint → Require the device to be at or under the machine risk score", "powershell": "# In compliance policy JSON:\n'deviceThreatProtectionRequiredSecurityLevel': 'clear'", "notes": "Requires MDE onboarding. When set to Clear, any active MDE threat signal marks the device non-compliant and CA-15 blocks resource access until threat is remediated. Requires MDE Plan 1 or Plan 2."}, {"section": "OPERATING SYSTEM REQUIREMENTS", "category": "Compliance", "setting": "Minimum OS version", "recommended": "10.0.19045 (Windows 10 22H2) or higher", "default": "Not configured", "portal": "Devices → Compliance → Policy → Device Properties → Minimum OS version", "powershell": "# In compliance policy JSON:\n'osMinimumVersion': '10.0.19045'", "notes": "Prevents access from devices running unsupported or unpatched Windows versions. Set to minimum supported version in the org. Update this value when org moves to new minimum supported build."}, {"section": "OPERATING SYSTEM REQUIREMENTS", "category": "Compliance", "setting": "Maximum OS version", "recommended": "Not configured (allow all current versions)", "default": "Not configured", "portal": "Devices → Compliance → Policy → Device Properties → Maximum OS version", "powershell": "# In compliance policy JSON:\n'osMaximumVersion': null", "notes": "Leave unconfigured unless org needs to block specific OS versions (e.g. blocking Windows 11 before it is tested and approved). Configuring a max version blocks devices that auto-update to newer builds."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Require BitLocker", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Require BitLocker encryption", "powershell": "# In compliance policy JSON:\n'bitLockerEnabled': true", "notes": "Marks device non-compliant if BitLocker is not enabled on the OS drive. Pair with BitLocker configuration profile (Config Profiles tab) to enforce encryption proactively rather than just checking for it."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Require Secure Boot", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Require Secure Boot to be enabled on the device", "powershell": "# In compliance policy JSON:\n'secureBootEnabled': true", "notes": "Confirms Secure Boot is enabled in device firmware. Prevents boot-level rootkits and bootkits. Requires UEFI firmware. Legacy BIOS devices will always fail this check — document as exception with remediation plan."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Require code integrity", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Require code integrity", "powershell": "# In compliance policy JSON:\n'codeIntegrityEnabled': true", "notes": "Verifies Windows Code Integrity feature is active — checks that driver and system files are validated by a trusted authority. Works alongside Device Guard / WDAC policies."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Password required", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Require a password to unlock mobile devices", "powershell": "# In compliance policy JSON:\n'passwordRequired': true", "notes": "Ensures all devices have a password/PIN set. Devices without a password are marked non-compliant."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Minimum password length", "recommended": "12 characters", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Minimum password length", "powershell": "# In compliance policy JSON:\n'passwordMinimumLength': 12", "notes": "12 characters minimum. If Windows Hello for Business is deployed, PIN complexity and biometrics reduce reliance on traditional passwords — adjust based on auth method mix in the org."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Password complexity", "recommended": "Require digits, lowercase, uppercase, and special characters", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Required password type", "powershell": "# In compliance policy JSON:\n'passwordRequiredType': 'deviceDefault'", "notes": "Set to alphanumeric with complexity. Alphanumeric requires letters and numbers. Device default uses the Windows password policy — ensure Windows local policy is also configured for complexity."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Maximum minutes of inactivity before password required", "recommended": "5 minutes", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Maximum minutes of inactivity before password is required", "powershell": "# In compliance policy JSON:\n'passwordMinutesOfInactivityBeforeLock': 5", "notes": "5 minutes is the recommended balance between security and usability. Post-breach consider reducing to 3 minutes. Users with Windows Hello biometrics experience minimal friction from shorter timeouts."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Firewall required", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → System Security → Require firewall", "powershell": "# In compliance policy JSON:\n'firewallEnabled': true", "notes": "Marks devices non-compliant if Windows Firewall is disabled on any profile (domain, private, public). Pair with Firewall configuration profile to enforce specific rules."}, {"section": "SECURITY & PASSWORD REQUIREMENTS", "category": "Compliance", "setting": "Trusted Platform Module (TPM) required", "recommended": "Required", "default": "Not configured", "portal": "Devices → Compliance → Policy → Device Health → Require TPM", "powershell": "# In compliance policy JSON:\n'tpmRequired': true", "notes": "TPM is required for BitLocker with PIN, Windows Hello for Business, and Credential Guard. Devices without TPM 2.0 cannot meet the full security baseline. Flag TPM-less devices for hardware remediation."}, {"section": "NON-COMPLIANCE ACTIONS", "category": "Compliance", "setting": "Non-compliance action — Mark device non-compliant", "recommended": "Immediately (0 days)", "default": "Immediately", "portal": "Devices → Compliance → Policy → Actions for noncompliance → Mark device noncompliant", "powershell": "# Non-compliance actions are set in the policy actions section.\n# Schedule: 0 = immediately", "notes": "Set to immediately. No grace period for compliance — devices are non-compliant the moment they fail a check. CA-15 then blocks access based on compliance state."}, {"section": "NON-COMPLIANCE ACTIONS", "category": "Compliance", "setting": "Non-compliance action — Send email to end user", "recommended": "1 day after non-compliance", "default": "Not configured", "portal": "Devices → Compliance → Policy → Actions for noncompliance → Send email to end user", "powershell": "# Configure notification message template first:\n# Devices → Compliance → Notifications → Create notification", "notes": "Notifies user their device is non-compliant and they may lose access. Template should include: what is non-compliant, how to fix it, IT helpdesk contact. Set to 1 day to give user visibility before access is fully blocked."}, {"section": "NON-COMPLIANCE ACTIONS", "category": "Compliance", "setting": "Non-compliance action — Retire device", "recommended": "90 days after non-compliance (or per org policy)", "default": "Not configured", "portal": "Devices → Compliance → Policy → Actions for noncompliance → Retire the noncompliant device", "powershell": "# Retire action is set in policy actions:\n# gracePeriodHours: 2160 (90 days)", "notes": "Initiates Intune retirement (removes org data and management) for devices that remain non-compliant for extended periods. Primarily relevant for BYOD — be careful with corporate devices. Coordinate with HR/legal before enabling."}], "intune_config": [{"section": "USB & REMOVABLE MEDIA", "category": "USB / Media", "setting": "Disable USB storage devices", "recommended": "Blocked", "default": "Not configured (allowed)", "portal": "Devices → Configuration → Create → Windows 10+ → Templates → Device restrictions → General → Removable storage", "powershell": "# OMA-URI method (custom profile):\n# OMA-URI: ./Device/Vendor/MSFT/Policy/Config/Storage/RemovableDiskDenyWriteAccess\n# Data type: Integer\n# Value: 1 (block write access)\n\n# Read access block:\n# OMA-URI: ./Vendor/MSFT/Policy/Config/Storage/AllowStorageCard\n# Value: 0", "notes": "Blocks write access to USB storage devices (thumb drives, external HDDs). Critical post-breach — prevents data exfiltration via removable media and introduction of malware via USB. Consider starting with audit before hard block."}, {"section": "USB & REMOVABLE MEDIA", "category": "USB / Media", "setting": "Disable removable media autorun", "recommended": "Disabled (autorun off)", "default": "Not configured", "portal": "Devices → Configuration → Create → Settings Catalog → search 'Autoplay'\n→ Disallow Autoplay for non-volume devices: Enabled\n→ Set the default behavior for AutoRun: Do not execute any autorun commands\n→ Turn off Autoplay: Enabled — All drives", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/Autoplay/DisallowAutoplayForNonVolumeDevices\n# Value: <enabled/>\n\n# ./Device/Vendor/MSFT/Policy/Config/Autoplay/SetDefaultAutoRunBehavior\n# Value: <enabled/><data id='NoAutorun_Dropdown' value='1'/>", "notes": "Disables AutoRun and AutoPlay for all drives including USB, CD/DVD, and network drives. Prevents classic USB malware delivery (autorun.inf exploitation). Should be deployed on every device regardless of USB storage policy."}, {"section": "BITLOCKER DISK ENCRYPTION", "category": "Disk Encrypt", "setting": "BitLocker — OS drive encryption", "recommended": "Enabled — XTS-AES 256-bit", "default": "Not configured", "portal": "Devices → Configuration → Create → Templates → Endpoint protection → Windows Encryption → BitLocker OS drive settings", "powershell": "# Settings Catalog OMA-URI:\n# ./Device/Vendor/MSFT/BitLocker/RequireDeviceEncryption\n# Value: 1\n\n# Encryption method:\n# ./Device/Vendor/MSFT/BitLocker/EncryptionMethodByDriveType\n# Value: <enabled/><data id='EncryptionMethodWithXtsOsDropDown_Name' value='7'/>\n# Value 7 = XTS-AES-256", "notes": "Enable BitLocker on OS drive with XTS-AES 256-bit encryption. XTS-AES 256 is stronger than the default AES-CBC 128. Must be paired with TPM requirement in compliance policy."}, {"section": "BITLOCKER DISK ENCRYPTION", "category": "Disk Encrypt", "setting": "BitLocker — startup authentication", "recommended": "TPM + PIN required", "default": "TPM only", "portal": "Devices → Configuration → Templates → Endpoint protection → Windows Encryption → BitLocker OS drive → Additional authentication at startup", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/BitLocker/SystemDrivesRequireStartupAuthentication\n# Value: <enabled/><data id='ConfigureNonTPMStartupKeyUsage_Name' value='2'/>\n# 2 = Require startup PIN with TPM", "notes": "TPM-only BitLocker can be bypassed on physical access. Requiring a startup PIN adds a second factor — the device won't boot without it even if the drive is removed. Trade-off: unattended reboots require PIN entry."}, {"section": "BITLOCKER DISK ENCRYPTION", "category": "Disk Encrypt", "setting": "BitLocker — recovery key escrow to Entra ID", "recommended": "Required — back up to Entra ID before encryption", "default": "Not configured", "portal": "Devices → Configuration → Templates → Endpoint protection → Windows Encryption → BitLocker OS drive → Save BitLocker recovery info to Azure AD / Entra ID", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/BitLocker/RequireDeviceEncryption\n# Combined with:\n# ./Device/Vendor/MSFT/BitLocker/AllowWarningForOtherDiskEncryption\n# Value: 0 (silent encryption with key escrow)\n\n# Verify key in Entra:\n# Entra Portal → Devices → [Device] → Recovery keys", "notes": "Recovery keys must be escrowed to Entra ID before encryption completes. Without this, device lockout = permanent data loss. Admins can retrieve keys from Entra ID → Devices → Recovery keys. Verify escrow is working after first policy deployment."}, {"section": "BITLOCKER DISK ENCRYPTION", "category": "Disk Encrypt", "setting": "BitLocker — fixed data drive encryption", "recommended": "Enabled — XTS-AES 256-bit", "default": "Not configured", "portal": "Devices → Configuration → Templates → Endpoint protection → Windows Encryption → BitLocker fixed drive settings", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/BitLocker/FixedDrivesEncryptionMethod\n# Value: <enabled/><data id='EncryptionMethodWithXtsFixedDropDown_Name' value='7'/>", "notes": "Encrypt all fixed (non-OS) drives. Secondary data drives often hold sensitive data and are frequently overlooked. Apply same XTS-AES 256-bit standard."}, {"section": "SCREEN LOCK & SESSION SECURITY", "category": "Device", "setting": "Screen lock timeout", "recommended": "5 minutes (300 seconds)", "default": "Not configured", "portal": "Devices → Configuration → Settings Catalog → search 'Lock screen'\n→ Machine Inactivity Limit: 300", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/LocalPoliciesSecurityOptions/InteractiveLogon_MachineInactivityLimit\n# Data type: Integer\n# Value: 300", "notes": "Locks workstation after 5 minutes of inactivity. Prevents physical access to unlocked sessions. 300 seconds (5 min) balances security and usability. For high-security areas (finance, HR, C-suite) consider 180 seconds (3 min)."}, {"section": "SCREEN LOCK & SESSION SECURITY", "category": "Device", "setting": "Password reveal button on login screen", "recommended": "Disabled", "default": "Enabled", "portal": "Devices → Configuration → Settings Catalog → search 'Do not display password reveal button'\n→ Do not display the password reveal button: Enabled", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/CredentialsUI/DisablePasswordReveal\n# Value: <enabled/>", "notes": "Removes the eye icon that reveals password in plain text on the login screen. Prevents shoulder-surfing of credentials at the login prompt."}, {"section": "WINDOWS HELLO FOR BUSINESS & CREDENTIAL GUARD", "category": "Identity", "setting": "Windows Hello for Business — enable", "recommended": "Enabled for all domain users", "default": "Not configured", "portal": "Devices → Configuration → Create → Templates → Identity protection → Configure Windows Hello for Business: Enable", "powershell": "# Graph API:\nPOST /deviceManagement/deviceConfigurations\n{\n  'displayName': 'WHfB-Hardened',\n  'state': 'enabled',\n  '@odata.type': '#microsoft.graph.windowsIdentityProtectionConfiguration',\n  'useSecurityKeyForSignin': true,\n  'enhancedAntiSpoofingForFacialFeaturesEnabled': true\n}", "notes": "Windows Hello for Business replaces passwords with PIN + biometric tied to device TPM. Phishing-resistant by design — credentials never leave the device. Requires TPM 2.0. Coordinate with CA-13 (Phishing-Resistant MFA) policy."}, {"section": "WINDOWS HELLO FOR BUSINESS & CREDENTIAL GUARD", "category": "Identity", "setting": "Windows Hello for Business — minimum PIN length", "recommended": "8 digits minimum", "default": "6 digits", "portal": "Devices → Configuration → Templates → Identity protection → Minimum PIN length: 8", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/PassportForWork/[TenantId]/Policies/PINComplexity/MinimumPINLength\n# Data type: Integer\n# Value: 8", "notes": "8-digit minimum PIN provides significantly more entropy than 6-digit. PINs are device-bound and TPM-protected — not equivalent to passwords, but longer is still stronger."}, {"section": "WINDOWS HELLO FOR BUSINESS & CREDENTIAL GUARD", "category": "Identity", "setting": "Windows Hello for Business — enhanced anti-spoofing", "recommended": "Enabled", "default": "Not configured", "portal": "Devices → Configuration → Templates → Identity protection → Use enhanced anti-spoofing, when available: Enabled", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/PassportForWork/Biometrics/FacialFeaturesUseEnhancedAntiSpoofing\n# Value: true", "notes": "Enables liveness detection for facial recognition. Prevents photo or video spoofing of Windows Hello facial auth. Enable on all devices that support it — has no effect on devices without IR cameras."}, {"section": "WINDOWS HELLO FOR BUSINESS & CREDENTIAL GUARD", "category": "Identity", "setting": "Credential Guard", "recommended": "Enabled with UEFI lock", "default": "Not configured", "portal": "Devices → Configuration → Settings Catalog → search 'Credential Guard'\n→ Turn On Virtualization Based Security: Enabled\n→ Credential Guard: Enabled with UEFI Lock", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/DeviceGuard/EnableVirtualizationBasedSecurity\n# Value: 1\n\n# ./Device/Vendor/MSFT/Policy/Config/DeviceGuard/LsaCfgFlags\n# Value: 1 (Enabled with UEFI lock)\n# Value 2 = Enabled without lock (can be disabled remotely)", "notes": "Credential Guard uses virtualization-based security to isolate LSASS in a separate security boundary. Makes Mimikatz-style credential harvesting significantly harder — hashed credentials are protected by the hypervisor. UEFI lock prevents remote disabling via registry — use value 1 not 2."}, {"section": "APPLICATION SETTINGS & TELEMETRY", "category": "App Settings", "setting": "Block access to Windows Store", "recommended": "Blocked", "default": "Allowed", "portal": "Devices → Configuration → Settings Catalog → search 'Store'\n→ Turn off the Store application: Enabled", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/ApplicationManagement/RequirePrivateStoreOnly\n# Value: 1\n\n# Or block entirely:\n# ./Vendor/MSFT/Policy/Config/ApplicationManagement/AllowAppStoreAutoUpdate\n# Value: 0", "notes": "Prevents users from installing personal apps from Microsoft Store on corporate devices. Reduces shadow IT, malware risk from unvetted apps, and personal app data mixing with org data."}, {"section": "APPLICATION SETTINGS & TELEMETRY", "category": "App Settings", "setting": "Telemetry / diagnostic data level", "recommended": "Required (Security) — 0 or 1", "default": "Full (3) or Enhanced (2)", "portal": "Devices → Configuration → Settings Catalog → search 'Allow Telemetry'\n→ Allow Telemetry: 1 — Required (Security data only for Enterprise/EDU)", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/System/AllowTelemetry\n# Data type: Integer\n# Value: 0 (Security — Enterprise only)\n# Value: 1 (Required — minimum recommended)", "notes": "Level 0 (Security) sends only minimum required telemetry. Level 1 (Required) sends basic health data. Reduce from default Full (3) or Enhanced (2) to minimize data sent to Microsoft. Level 0 requires Enterprise/Education SKU."}, {"section": "LOCAL ADMIN RESTRICTION & WINDOWS LAPS", "category": "Admin", "setting": "Restrict local administrator accounts", "recommended": "Enabled — disable built-in Administrator, restrict local admin creation", "default": "Built-in admin enabled", "portal": "Devices → Configuration → Settings Catalog → search 'Accounts'\n→ Accounts: Block Microsoft Accounts: Enabled\n→ Local Policies Security Options: Accounts Rename Administrator Account", "powershell": "# Disable built-in admin via OMA-URI:\n# ./Device/Vendor/MSFT/Policy/Config/LocalPoliciesSecurityOptions/Accounts_EnableAdministratorAccountStatus\n# Value: 0\n\n# Or use Windows LAPS (Local Admin Password Solution):\n# ./Device/Vendor/MSFT/LAPS/Policies/BackupDirectory\n# Value: 1 (Azure AD / Entra ID backup)", "notes": "Local admin accounts are a primary lateral movement target. Disable the built-in Administrator account and deploy Windows LAPS (Local Administrator Password Solution) to manage unique rotating local admin passwords per device, escrowed to Entra ID."}, {"section": "LOCAL ADMIN RESTRICTION & WINDOWS LAPS", "category": "Admin", "setting": "Windows LAPS — enable and configure", "recommended": "Enabled — back up local admin password to Entra ID", "default": "Not configured", "portal": "Devices → Configuration → Settings Catalog → search 'LAPS'\n→ Backup Directory: Azure Active Directory\n→ Password Age Days: 30\n→ Password Length: 20\n→ Password Complexity: Large letters + small letters + numbers + special characters", "powershell": "# OMA-URI:\n# ./Device/Vendor/MSFT/LAPS/Policies/BackupDirectory\n# Value: 1 (Azure AD backup)\n\n# Password age:\n# ./Device/Vendor/MSFT/LAPS/Policies/PasswordAgeDays\n# Value: 30\n\n# Retrieve LAPS password:\n# Get-LapsAADPassword -DeviceIds [DeviceId] -IncludePasswords", "notes": "Windows LAPS generates unique, rotating local admin passwords per device and escrows them to Entra ID. Eliminates the common vulnerability of shared local admin passwords across all devices (pass-the-hash lateral movement). Requires Windows 10 22H2+ or Windows 11 22H2+ with April 2023 update."}, {"section": "ATTACK SURFACE REDUCTION ion → Endpoint Security → Attack Surface Reduction", "powershell": "# Rule GUID:\n# 26190899-1602-49E8-8B27-EB1D0A1CE869", "notes": "Scoped to Outlook specifically. Prevents Outlook from spawning child processes. Stops malicious email attachments or scripts launched from Outlook."}, {"section": "ATTACK SURFACE REDUCTION (ASR) RULES — ALL 19", "category": "ASR — Block", "setting": "Block Adobe Reader from creating child processes", "recommended": "Block", "default": "Not configured", "portal": "Devices → Configuration → Endpoint Security → Attack Surface Reduction", "powershell": "# Rule GUID:\n# 7674BA52-37EB-4A4F-A9A1-F0F9A1619A2C", "notes": "Prevents PDF readers from launching child processes. Stops PDF exploit payloads that attempt to execute code. Low false positive risk — PDFs rarely have legitimate reason to spawn processes."}, {"section": "ATTACK SURFACE REDUCTION (ASR) RULES — ALL 19", "category": "ASR — Block", "setting": "Block execution of potentially obfuscated scripts", "recommended": "Block", "default": "Not configured", "portal": "Devices → Configuration → Endpoint Security → Attack Surface Reduction", "powershell": "# Rule GUID:\n# 5BEB7EFE-FD9A-4556-801D-275E5FFC04CC", "notes": "Detects and blocks obfuscated JavaScript, VBScript, or PowerShell. Targets obfuscation patterns used to evade signature detection. Can have false positives with legitimate obfuscated scripts (e.g. some software installers). Deploy in Audit first."}, {"section": "ATTACK SURFACE REDUCTION (ASR) RULES — ALL 19", "category": "ASR — Block", "setting": "Block JavaScript or VBScript from launching downloaded executable content", "recommended": "Block", "default": "Not configured", "portal": "Devices → Configuration → Endpoint Security → Attack Surface Reduction", "powershell": "# Rule GUID:\n# D3E037E1-3EB8-44C8-A917-57927947596D", "notes": "Prevents .js and .vbs files from downloading and executing payloads. Stops drive-by download scripts. Low false positive risk for corporate en function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function badge(cat){
  const c=String(cat||'').toUpperCase();
  if(c.includes('MANDATORY')) return '<span class="pc-badge badge-m">MANDATORY</span>';
  if(c.includes('IR')||c.includes('BREACH')||c.includes('RUNBOOK')) return '<span class="pc-badge badge-ir">IR RUNBOOK</span>';
  if(c.includes('PREREQ')) return '<span class="pc-badge badge-pr">PREREQ</span>';
  return '<span class="pc-badge badge-r">RECOMMENDED</span>';
}
function statusBadge(s){
  const v=String(s||'').toLowerCase();
  if(v.includes('deploy')) return '<span style="font-family:var(--mono);font-size:.58rem;color:var(--green);border:1px solid rgba(0,255,136,.28);padding:.1rem .38rem">DEPLOY</span>';
  if(v.includes('assess')) return '<span style="font-family:var(--mono);font-size:.58rem;color:var(--amber);border:1px solid rgba(255,196,84,.28);padding:.1rem .38rem">ASSESS</span>';
  if(v.includes('runbook')) return '<span style="font-family:var(--mono);font-size:.58rem;color:var(--red);border:1px solid rgba(255,68,102,.28);padding:.1rem .38rem">RUNBOOK</span>';
  return '';
}
function fixBadge(id){return FIXED_IDS.has(id)?'<span class="fix-badge">CORRECTED v2</span>':'';}
